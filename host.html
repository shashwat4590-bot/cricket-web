<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Admin | Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        input { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-red { background: #ef4444; color: white; }
        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .lib-card { background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; font-size: 0.85rem; }
        /* Result Buttons */
        #result-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .res-btn { background: #fbbf24; color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>1. Setup & Deploy</h3>
        <input type="text" id="q-text" placeholder="Question Text">
        <input type="text" id="q-opts" placeholder="Options (comma separated)">
        <input type="text" id="q-score" placeholder="Current Score">
        <button class="btn btn-blue" onclick="deploy()">🚀 DEPLOY QUESTION</button>
        <button class="btn btn-red" onclick="clearMatch()">⏹ STOP & SET WAITING STATE</button>
        
        <h3 style="margin-top:20px;">2. Quick Declare Winner</h3>
        <div id="result-buttons">
            <p style="color:gray; font-size:0.8rem;">Deploy a question to see result buttons here...</p>
        </div>
    </div>

    <div class="panel">
        <h3>Question Library</h3>
        <div class="lib-grid">
            <div class="lib-card" onclick="setQ('Who will win the toss?', 'CSK, MI')">🪙 Toss Winner</div>
            <div class="lib-card" onclick="setQ('Wickets in first 5 overs?', '0, 1, 2, 3+')">🧤 Wickets (5 Ov)</div>
            <div class="lib-card" onclick="setQ('Runs in first 5 overs?', '0-35, 36-45, 46-55, 55+')">🏏 Runs (5 Ov)</div>
            <div class="lib-card" onclick="setQ('Runs in first 10 overs?', '0-75, 76-95, 96-115, 115+')">🏏 Runs (10 Ov)</div>
            <div class="lib-card" onclick="setQ('Outcome of next ball?', 'Dot, 1-3 Runs, 4, 6, Wicket')">⚡ Live Ball</div>
            <div class="lib-card" onclick="setQ('Next Over Runs?', '0-5, 6-10, 11-15, 16+')">📈 Over Runs</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setQ(q, o) {
        document.getElementById('q-text').value = q;
        document.getElementById('q-opts').value = o;
    }

    function deploy() {
        const q = document.getElementById('q-text').value;
        const opts = document.getElementById('q-opts').value.split(',').map(s => s.trim());
        const score = document.getElementById('q-score').value || "LIVE";

        db.ref("currentQuestion").set({
            question: q,
            options: opts,
            matchScore: score,
            timestamp: Date.now(),
            result: null,
            active: true
        }).then(() => {
            updateResultButtons(opts);
            alert("Question is now LIVE on player screens!");
        });
    }

    function updateResultButtons(opts) {
        const container = document.getElementById('result-buttons');
        container.innerHTML = "";
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "res-btn";
            btn.innerText = opt;
            btn.onclick = () => setWinner(opt);
            container.appendChild(btn);
        });
    }

    function setWinner(val) {
        db.ref("currentQuestion/result").set(val).then(() => {
            alert("Winner set to: " + val + ". Players paid!");
        });
    }

    function clearMatch() {
        db.ref("currentQuestion").update({ active: false, result: null }).then(() => {
            document.getElementById('result-buttons').innerHTML = "";
            alert("Players are now in WAITING state.");
        });
    }
</script>
</body>
</html>
