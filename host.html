<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Admin | Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        input { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-red { background: #ef4444; color: white; }
        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .lib-card { background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; font-size: 0.85rem; }
        #result-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .res-btn { background: #fbbf24; color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>1. Setup Prediction</h3>
        <input type="text" id="q-text" placeholder="Question Text">
        <input type="text" id="q-opts" placeholder="Options (Max 4, comma separated)">
        <div style="display:flex; gap:10px;">
            <input type="number" id="q-mult" placeholder="Multiplier (e.g. 2.5)" value="2.0">
            <input type="number" id="q-time" placeholder="Timer (sec)" value="30">
        </div>
        <input type="text" id="q-score" placeholder="Current Score">
        
        <button class="btn btn-blue" onclick="deploy()">🚀 DEPLOY (START TIMER)</button>
        <button class="btn btn-red" onclick="clearMatch()">⏹ STOP / WAITING STATE</button>
        
        <h3>2. Quick Result</h3>
        <div id="result-buttons"></div>
    </div>

    <div class="panel">
        <h3>Smart Library (Auto-Formatted)</h3>
        <div class="lib-grid">
            <div class="lib-card" onclick="setQ('Next Ball Outcome?', 'Dot,1-3 Runs,4 or 6,Wicket', 2.0)">⚡ Standard Ball</div>
            <div class="lib-card" onclick="setQ('Will it be a Wicket?', 'Yes,No', 5.0)">🧤 Wicket Special (5x)</div>
            <div class="lib-card" onclick="setQ('Boundaries in Over?', '0,1,2,3+', 3.0)">🏏 Boundary Count</div>
            <div class="lib-card" onclick="setQ('Toss Winner?', 'CSK,MI', 1.9)">🪙 Toss</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setQ(q, o, m) {
        document.getElementById('q-text').value = q;
        document.getElementById('q-opts').value = o;
        document.getElementById('q-mult').value = m;
    }

    function deploy() {
        const q = document.getElementById('q-text').value;
        const opts = document.getElementById('q-opts').value.split(',').slice(0,4).map(s => s.trim());
        const mult = parseFloat(document.getElementById('q-mult').value);
        const time = parseInt(document.getElementById('q-time').value);

        db.ref("currentQuestion").set({
            question: q,
            options: opts,
            multiplier: mult,
            matchScore: document.getElementById('q-score').value || "LIVE",
            endTime: Date.now() + (time * 1000),
            timestamp: Date.now(),
            result: null,
            active: true
        }).then(() => {
            updateResultButtons(opts);
        });
    }

    function updateResultButtons(opts) {
        const container = document.getElementById('result-buttons');
        container.innerHTML = "";
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "res-btn";
            btn.innerText = opt;
            btn.onclick = () => db.ref("currentQuestion/result").set(opt);
            container.appendChild(btn);
        });
    }

    function clearMatch() {
        db.ref("currentQuestion").update({ active: false });
    }
</script>
</body>
</html>
