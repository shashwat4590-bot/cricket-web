<!DOCTYPE html>
<html>
<head>
    <title>PredictLive ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">
    <h2>ADMIN PANEL</h2>
    
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendData() {
            const q = document.getElementById('qIn').value;
            const score = document.getElementById('sIn').value;
            const opt = document.getElementById('oIn').value.split(',');

            db.ref("currentQuestion").set({
                question: q,
                matchScore: score,
                options: opt,
                status: "open",
                timestamp: Date.now()
            }).then(() => alert("PUSHED TO PLAYER!"));
        }
    </script>

    <input type="text" id="qIn" placeholder="Question" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="sIn" placeholder="Score" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="oIn" placeholder="Options (comma separated: Yes,No)" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="sendData()" style="width:100%; padding:15px; background:cyan; font-weight:bold;">PUSH TO PLAYER</button>
</body>
</html>
