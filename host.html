<!DOCTYPE html>
<html>
<head>

<title>Host Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
padding-top:40px;
}

.panel{
width:400px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.question{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

button{
background:#0a84ff;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="panel">

<h2>🎮 Host Panel</h2>

<div class="question">
<span>Next ball > 1.5 runs?</span>
<button onclick="send('Next ball > 1.5 runs?')">Send</button>
</div>

<div class="question">
<span>Next ball > 3.5 runs?</span>
<button onclick="send('Next ball > 3.5 runs?')">Send</button>
</div>

<div class="question">
<span>Boundary on next ball?</span>
<button onclick="send('Boundary on next ball?')">Send</button>
</div>

<div class="question">
<span>Wicket this over?</span>
<button onclick="send('Wicket this over?')">Send</button>
</div>

</div>

<script>

const firebaseConfig = {

apiKey: "PASTE_YOUR_API_KEY",

authDomain: "cricket-web-predict.firebaseapp.com",

databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",

projectId: "cricket-web-predict",

storageBucket: "cricket-web-predict.appspot.com",

messagingSenderId: "PASTE",

appId: "PASTE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function send(q){

firebase.database().ref("currentQuestion").set({
question:q,
startTime: Date.now()
});

}

</script>

</body>
</html>
