<!DOCTYPE html>
<html>
<head>
    <title>Host Control Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        *{box-sizing:border-box;font-family:Inter,system-ui,Arial;}
        body{margin:0;background:#0e1117;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
        .panel{width:420px;background:#151a22;padding:25px;border-radius:12px;border:1px solid #333;}
        .title{font-size:20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        #live-status{font-size:12px;color:#2ed573;background:#000;padding:4px 8px;border-radius:4px;}
        .current{font-size:18px;margin:20px 0;padding:15px;background:#0e1117;border-radius:8px;border-left:4px solid #1e90ff;}
        button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:0.2s;}
        .send{background:#2ed573;color:black;}
        .lock{background:#ffa502;color:black;}
        .next{background:#1e90ff;color:white;}
        .correctYes{background:#2ed573;color:black;width:48%;display:inline-block;}
        .correctNo{background:#ff4757;color:white;width:48%;display:inline-block;}
        button:active{transform:scale(0.96);}
    </style>
</head>
<body>
<div class="panel">
    <div class="title">
        <span>🎮 Host Panel</span>
        <span id="live-status">Ready</span>
    </div>
    <div id="currentQuestion" class="current">Boundary on next ball?</div>
    
    <button class="send" onclick="send()">🚀 PUSH QUESTION</button>
    <button class="lock" onclick="lock()">🔒 LOCK BETS</button>
    <button class="next" onclick="nextQuestion()">⏭️ NEXT IN LIST</button>
    
    <div style="margin-top:15px; display:flex; justify-content:space-between;">
        <button class="correctYes" onclick="reveal('YES')">Reveal YES</button>
        <button class="correctNo" onclick="reveal('NO')">Reveal NO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "PASTE_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questionRef = db.ref("currentQuestion");

    const questions = [
        "Boundary on next ball?",
        "Next ball > 1.5 runs?",
        "Wicket this over?",
        "Dot ball next delivery?",
        "Will there be a Wide?"
    ];
    let index = 0;

    function send() {
        // .set() replaces everything at this node, clearing the old result
        questionRef.set({
            question: questions[index],
            status: "open",
            endTime: Date.now() + 10500, 
            result: null
        });
        document.getElementById("live-status").innerText = "LIVE NOW";
        document.getElementById("live-status").style.color = "#2ed573";
    }

    function lock() {
        questionRef.update({ status: "locked" });
        document.getElementById("live-status").innerText = "LOCKED";
        document.getElementById("live-status").style.color = "#ffa502";
    }

    function reveal(ans) {
        questionRef.update({ 
            result: ans,
            status: "locked" 
        });
        document.getElementById("live-status").innerText = "RESULT: " + ans;
    }

    function nextQuestion() {
        index = (index + 1) % questions.length;
        document.getElementById("currentQuestion").innerText = questions[index];
    }
</script>
</body>
</html>
