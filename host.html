<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Admin | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .flex { display: flex; gap: 20px; }
        .panel { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; flex: 1; }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        input, select { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-gold { background: #fbbf24; color: #000; margin-top: 10px; }
        .btn-red { background: #ef4444; color: white; margin-top: 10px; }

        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .lib-card { background: #0f172a; padding: 12px; border-radius: 10px; border: 1px solid #334155; cursor: pointer; font-size: 0.9rem; }
        .lib-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="flex">
        <div class="panel">
            <h3>Active Question</h3>
            <label>Question Text</label>
            <input type="text" id="q-text" placeholder="Type or select from library">
            
            <label>Options (comma separated)</label>
            <input type="text" id="q-opts" placeholder="e.g. CSK, MI">
            
            <label>Current Match Score</label>
            <input type="text" id="q-score" placeholder="e.g. 102/3 (12.4 ov)">

            <button class="btn btn-blue" onclick="deploy()">🚀 DEPLOY TO PLAYERS</button>
            <button class="btn btn-red" onclick="clearMatch()">⏹ END QUESTION / WAIT STATE</button>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #334155;">
            
            <h3>Declare Result</h3>
            <input type="text" id="winner-val" placeholder="Winning Option Name Exactly">
            <button class="btn btn-gold" onclick="setWinner()">🏆 SET WINNER (PAYOUT 2x)</button>
        </div>

        <div class="panel">
            <h3>Question Library</h3>
            <div class="lib-grid">
                <div class="lib-card" onclick="setQ('Who will win the toss?', 'CSK, MI')">🪙 Toss Winner</div>
                <div class="lib-card" onclick="setQ('Wickets in first 5 overs?', '0, 1, 2, 3+')">🧤 Wickets (5 Ov)</div>
                <div class="lib-card" onclick="setQ('Wickets in first 10 overs?', '0-2, 3-4, 5+')">🧤 Wickets (10 Ov)</div>
                <div class="lib-card" onclick="setQ('Wickets in first 15 overs?', '0-3, 4-6, 7+')">🧤 Wickets (15 Ov)</div>
                <div class="lib-card" onclick="setQ('Wickets in full 20 overs?', '0-5, 6-8, All Out')">🧤 Wickets (20 Ov)</div>
                <div class="lib-card" onclick="setQ('Runs in first 5 overs?', '0-30, 31-45, 46-60, 60+')">🏏 Runs (5 Ov)</div>
                <div class="lib-card" onclick="setQ('Runs in first 10 overs?', '0-70, 71-90, 91-110, 110+')">🏏 Runs (10 Ov)</div>
                <div class="lib-card" onclick="setQ('Runs in first 15 overs?', '0-120, 121-145, 146-170, 170+')">🏏 Runs (15 Ov)</div>
                <div class="lib-card" onclick="setQ('Runs in full 20 overs?', 'Under 160, 160-190, 191-220, 220+')">🏏 Runs (20 Ov)</div>
                <div class="lib-card" onclick="setQ('Outcome of next ball?', 'Dot, 1-3 Runs, 4, 6, Wicket')">⚡ Live Ball</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setQ(q, o) {
        document.getElementById('q-text').value = q;
        document.getElementById('q-opts').value = o;
    }

    function deploy() {
        const q = document.getElementById('q-text').value;
        const o = document.getElementById('q-opts').value.split(',').map(s => s.trim());
        const s = document.getElementById('q-score').value;

        db.ref("currentQuestion").set({
            question: q,
            options: o,
            matchScore: s || "LIVE",
            timestamp: Date.now(),
            result: null,
            active: true
        }).then(() => alert("Question Live!"));
    }

    function clearMatch() {
        db.ref("currentQuestion").update({
            active: false,
            question: "Waiting for next ball...",
            result: null
        }).then(() => alert("Waiting state activated"));
    }

    function setWinner() {
        const win = document.getElementById('winner-val').value;
        if(!win) return alert("Type the winner name!");
        db.ref("currentQuestion/result").set(win).then(() => alert("Winner set! Players being paid."));
    }
</script>
</body>
</html>
