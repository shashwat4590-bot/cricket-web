<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617; --card: #0f172a; --accent: #38bdf8;
            --success: #22c55e; --error: #ef4444; --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; }

        .app-shell { width: 100%; max-width: 650px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

        /* Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 650px; background: #0f172a;
            display: flex; justify-content: space-around; padding: 20px;
            border-top: 2px solid #1e293b; z-index: 9999;
        }
        .nav-item { color: #64748b; font-size: 1rem; font-weight: 900; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .page { display: none; padding: 40px 20px 140px; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* HOME PAGE */
        .hero-banner {
            background: linear-gradient(135deg, #1e293b, #020617);
            width: 100%; border-radius: 40px; padding: 50px 30px;
            border: 2px solid #1e293b; text-align: center; margin-top: 20px;
        }
        .match-card { display: flex; justify-content: space-around; align-items: center; margin: 40px 0; }
        
        /* Fixed Logo Styling */
        .logo-frame { background: white; padding: 15px; border-radius: 25px; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(56,189,248,0.3); }
        .logo-frame img { width: 100%; height: auto; display: block; }
        .vs-circle { background: #334155; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--accent); }

        /* ARENA */
        .score-display { background: var(--card); border-radius: 30px; padding: 30px; width: 100%; border: 1px solid #1e293b; margin-bottom: 20px; text-align: center; }
        .score-val { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-top: 10px; color: white; }
        
        .question-box { background: var(--card); border-radius: 35px; padding: 40px 25px; width: 100%; border: 2px solid #1e293b; text-align: center; }
        #qText { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; color: #f8fafc; }

        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .opt-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 25px 10px; border-radius: 20px; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .opt-btn.active-sel { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); box-shadow: 0 0 15px rgba(56,189,248,0.3); }
        .opt-btn.win { background: var(--success) !important; color: #052e16 !important; border: none; }
        .opt-btn.lose { background: var(--error) !important; opacity: 0.5; border: none; }

        /* WALLET */
        .wallet-box { background: var(--card); border-radius: 30px; padding: 40px; width: 100%; border: 2px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #334155; background: #020617; color: white; font-size: 1.5rem; text-align: center; margin: 20px 0; }

        /* BUTTONS */
        .main-btn { background: var(--accent); color: #082f49; border: none; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; width: 100%; cursor: pointer; transition: 0.2s; }
        .main-btn:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div id="home" class="page active">
        <h1 style="font-size: 3rem; font-weight: 900; color: var(--accent);">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="hero-banner">
            <h3 style="color: var(--gold); letter-spacing: 4px; font-size: 1rem;">LIVE FINALS</h3>
            <div class="match-card">
                <div class="logo-frame">
                    <img src="https://hatchpro.club/images/csk.png" alt="CSK">
                </div>
                <div class="vs-circle">VS</div>
                <div class="logo-frame">
                    <img src="https://hatchpro.club/images/mi.png" alt="MI">
                </div>
            </div>
            <button class="main-btn" onclick="switchPage('arena')">START PREDICTING</button>
        </div>
        <div style="margin-top: 40px; text-align: center; color: #94a3b8; font-size: 1.1rem; padding: 0 20px;">
            <p>Predict every ball live and win 3x tokens instantly in your wallet!</p>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="score-display">
            <p style="color: var(--accent); font-weight: 800; font-size: 0.9rem; letter-spacing: 2px;">MATCH SCORE</p>
            <div id="batTeam" style="font-weight: 800; margin-top: 10px; font-size: 1.2rem;">MATCH STARTING</div>
            <div id="liveScore" class="score-val">0/0</div>
        </div>

        <div class="question-box">
            <div id="qText">Waiting for next ball...</div>
            <div id="optGrid" class="opt-grid"></div>
            
            <button id="lockBtn" class="main-btn" style="display:none; margin-top: 25px;" onclick="handleLock()">LOCK BET (10 Tokens)</button>
            <p id="lockStatus" style="margin-top: 20px; font-weight: 900; color: var(--accent); display: none; font-size: 1.2rem;"></p>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="wallet-box">
            <p style="font-weight: 800; color: #94a3b8;">YOUR TOKENS</p>
            <div id="tokenBal" style="font-size: 4rem; font-weight: 900; color: var(--gold);">0</div>
            
            <div style="margin-top: 40px;">
                <p style="font-weight: 800; color: var(--gold); font-size: 0.9rem;">RECHARGE (₹1 = 3 Tokens)</p>
                <input type="number" id="amtIn" placeholder="Enter Amount">
                <button class="main-btn" style="background: var(--gold);" onclick="addTokens()">BUY TOKENS</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchPage('home')">HOME</div>
        <div class="nav-item" id="nav-arena" onclick="switchPage('arena')">ARENA</div>
        <div class="nav-item" id="nav-wallet" onclick="switchPage('wallet')">WALLET</div>
    </div>

</div>

<script>
    // --- 1. FIREBASE SETUP (IMPORTANT: COPY PASTE YOUR KEYS EXACTLY) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_DOMAIN",
        databaseURL: "YOUR_URL",
        projectId: "YOUR_ID",
        storageBucket: "YOUR_BUCKET",
        messagingSenderId: "YOUR_SENDER",
        appId: "YOUR_APP"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    // --- 2. GLOBAL STATE ---
    let tokens = parseInt(localStorage.getItem("tokens")) || 0;
    let selectedOption = null;
    let currentQuestionID = "";

    function updateUI() {
        document.getElementById('tokenBal').innerText = tokens;
        localStorage.setItem("tokens", tokens);
    }
    updateUI();

    // --- 3. PAGE SWITCHER ---
    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
    }

    // --- 4. WALLET LOGIC ---
    function addTokens() {
        const val = parseInt(document.getElementById('amtIn').value);
        if(!val || val < 50) return alert("Minimum recharge is ₹50");
        tokens += (val * 3);
        updateUI();
        alert("Added " + (val*3) + " Tokens!");
    }

    // --- 5. LIVE SYNC (THE FIX) ---
    qRef.on("value", (snapshot) => {
        const data = snapshot.val();
        if(!data) {
            document.getElementById('qText').innerText = "Host is offline.";
            return;
        }

        // RESET LOGIC: If question text or status changes, unlock the UI
        const newID = data.question + data.status;
        if(newID !== currentQuestionID) {
            currentQuestionID = newID;
            resetArena();
        }

        // Update Text
        document.getElementById('liveScore').innerText = data.matchScore || "0/0";
        document.getElementById('batTeam').innerText = data.battingTeam || "LIVE";
        document.getElementById('qText').innerText = data.question;

        // Render Options
        if(!data.result) {
            const grid = document.getElementById('optGrid');
            grid.innerHTML = "";
            const opts = data.options || [];
            opts.filter(o => o !== "DRAW").forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                if(selectedOption === opt) btn.classList.add('active-sel');
                btn.innerText = opt;
                btn.onclick = () => selectOpt(opt);
                grid.appendChild(btn);
            });
        } else {
            showWinner(data.result, data.options);
        }
    });

    function selectOpt(opt) {
        if(localStorage.getItem("isLocked") === "true") return;
        selectedOption = opt;
        
        // Visual select
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active-sel'));
        event.target.classList.add('active-sel');
        
        // Show Lock Button
        document.getElementById('lockBtn').style.display = "block";
    }

    function handleLock() {
        if(tokens < 10) return alert("Not enough tokens!");
        
        tokens -= 10;
        updateUI();
        
        localStorage.setItem("isLocked", "true");
        localStorage.setItem("myPick", selectedOption);
        
        document.getElementById('lockBtn').style.display = "none";
        document.getElementById('lockStatus').style.display = "block";
        document.getElementById('lockStatus').innerText = "BET LOCKED: " + selectedOption;
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    }

    function showWinner(win, allOpts) {
        const myPick = localStorage.getItem("myPick");
        const grid = document.getElementById('optGrid');
        grid.innerHTML = "";

        allOpts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = o;
            if(o === win) btn.classList.add('win');
            else if(o === myPick) btn.classList.add('lose');
            grid.appendChild(btn);
        });

        // Winning logic
        if(myPick === win && localStorage.getItem("processed") !== currentQuestionID) {
            confetti({ particleCount: 150, spread: 70 });
            tokens += 30; // 3x payout
            updateUI();
            localStorage.setItem("processed", currentQuestionID);
        }
        
        document.getElementById('lockBtn').style.display = "none";
        document.getElementById('lockStatus').style.display = "none";
    }

    function resetArena() {
        selectedOption = null;
        localStorage.setItem("isLocked", "false");
        localStorage.setItem("myPick", "");
        document.getElementById('lockStatus').style.display = "none";
        document.getElementById('lockBtn').style.display = "none";
    }
</script>
</body>
</html>
