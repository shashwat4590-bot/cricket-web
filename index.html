<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617; --card: #0f172a; --accent: #38bdf8;
            --success: #22c55e; --error: #ef4444; --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Status Header */
        #connection-status {
            padding: 12px; background: var(--error); text-align: center;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 1px;
            position: sticky; top: 0; z-index: 2000;
        }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 18px;
            border-top: 2px solid #1e293b; z-index: 1000;
        }
        .nav-item { color: #64748b; font-weight: 800; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .nav-item.active { color: var(--accent); }

        /* Pages */
        .page { display: none; padding: 30px 20px 120px; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* Home UI */
        .match-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            width: 100%; border-radius: 30px; padding: 40px 20px;
            border: 1px solid rgba(56, 189, 248, 0.2); text-align: center;
        }
        .logo-row { display: flex; justify-content: space-around; align-items: center; margin: 30px 0; }
        .team-logo { 
            width: 90px; height: 90px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; color: #000;
        }
        .csk { background: #F9CD05; } .mi { background: #004BA0; color: white; }

        /* Arena UI */
        .score-box { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; border: 1px solid #1e293b; margin-bottom: 20px; text-align: center; }
        #live-score { font-size: 3.5rem; font-weight: 900; color: white; line-height: 1; margin: 10px 0; }
        
        .question-card { background: var(--card); border-radius: 30px; padding: 40px 25px; width: 100%; border: 1px solid #1e293b; text-align: center; }
        #q-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 30px; color: #f8fafc; }

        /* Buttons */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .opt-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 22px 10px; border-radius: 18px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { border: 3px solid var(--accent); background: rgba(56, 189, 248, 0.1); }
        .lock-btn { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 1.2rem; margin-top: 25px; cursor: pointer; display: none; }

        /* Wallet */
        .wallet-card { background: var(--card); border-radius: 30px; padding: 40px; width: 100%; border: 2px solid var(--gold); text-align: center; }
        input { background: #020617; border: 2px solid #334155; padding: 20px; border-radius: 15px; color: white; width: 100%; font-size: 1.5rem; text-align: center; margin: 20px 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="connection-status">STATUS: DISCONNECTED (CHECK CONFIG)</div>

    <div id="home" class="page active">
        <h1 style="color: var(--accent); font-size: 2.5rem; font-weight: 900; margin-bottom: 20px;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="match-card">
            <p style="color: var(--gold); font-weight: 800; letter-spacing: 3px;">LIVE MATCH</p>
            <div class="logo-row">
                <div class="team-logo csk">CSK</div>
                <div style="font-weight: 900; opacity: 0.3;">VS</div>
                <div class="team-logo mi">MI</div>
            </div>
            <button onclick="nav('arena')" style="background:var(--accent); color:black; border:none; padding:20px; border-radius:15px; font-weight:900; width:100%; font-size:1.1rem; cursor:pointer;">ENTER ARENA</button>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="score-box">
            <p style="color: var(--accent); font-weight: 800; font-size: 0.8rem; letter-spacing: 2px;">LIVE SCORECARD</p>
            <div id="batting-team" style="font-weight: 800; margin-top: 10px; font-size: 1.2rem;">--</div>
            <div id="live-score">0/0</div>
        </div>

        <div class="question-card">
            <div id="q-text">Connecting to Live Feed...</div>
            <div id="options-box" class="opt-grid"></div>
            <button id="lock-btn" class="lock-btn" onclick="confirmBet()">LOCK BET (10 TOKENS)</button>
            <p id="lock-status" style="margin-top:20px; font-weight:900; color:var(--accent); display:none; font-size:1.2rem;"></p>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="wallet-card">
            <p style="font-weight: 800; color: #64748b;">TOTAL TOKENS</p>
            <div id="wallet-balance" style="font-size: 4rem; font-weight: 900; color: var(--gold);">0</div>
            <div style="margin-top: 30px;">
                <input type="number" id="cash-input" placeholder="Amount (₹)">
                <button onclick="addTokens()" style="background:var(--gold); color:black; border:none; padding:20px; border-radius:15px; font-weight:900; width:100%; font-size:1.2rem; cursor:pointer;">ADD TOKENS</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-item" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-item" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </div>

<script>
    // --- 1. FIREBASE CONFIG (PASTE YOUR EXACT KEYS HERE) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "YOUR_DATABASE_URL", // MUST end with .firebaseio.com or .firebasedatabase.app
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // --- 2. INITIALIZE ---
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusEl = document.getElementById('connection-status');

        // Connection Check
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                statusEl.innerText = "STATUS: CONNECTED (LIVE)";
                statusEl.style.background = "#22c55e";
            } else {
                statusEl.innerText = "STATUS: SEARCHING FOR DATABASE...";
                statusEl.style.background = "#f59e0b";
            }
        });

        // --- 3. LIVE DATA LISTENER ---
        db.ref("currentQuestion").on("value", (snapshot) => {
            const data = snapshot.val();
            
            if(!data) {
                document.getElementById('q-text').innerText = "Waiting for Host to push question...";
                return;
            }

            // Sync Scoreboard
            document.getElementById('live-score').innerText = data.matchScore || "0/0";
            document.getElementById('batting-team').innerText = data.battingTeam || "LIVE";
            document.getElementById('q-text').innerText = data.question;

            // Render Options
            const container = document.getElementById('options-box');
            container.innerHTML = "";
            
            if(data.options && Array.isArray(data.options)) {
                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn";
                    btn.innerText = opt;
                    btn.onclick = () => selectOption(opt, btn);
                    container.appendChild(btn);
                });
            }
        }, (err) => {
            alert("Permission Denied! Check your Firebase Rules.");
            statusEl.innerText = "STATUS: PERMISSION ERROR";
            statusEl.style.background = "#7c3aed";
        });

    } catch (error) {
        alert("Config Error: " + error.message);
    }

    // --- 4. GAME LOGIC ---
    let tokens = parseInt(localStorage.getItem('user_tks')) || 0;
    let selectedPick = null;
    document.getElementById('wallet-balance').innerText = tokens;

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    function selectOption(opt, btn) {
        if(localStorage.getItem('isLocked') === 'true') return;
        selectedPick = opt;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('lock-btn').style.display = "block";
    }

    function confirmBet() {
        if(tokens < 10) return alert("Insufficient tokens!");
        tokens -= 10;
        document.getElementById('wallet-balance').innerText = tokens;
        localStorage.setItem('user_tks', tokens);
        
        localStorage.setItem('isLocked', 'true');
        document.getElementById('lock-btn').style.display = "none";
        document.getElementById('lock-status').style.display = "block";
        document.getElementById('lock-status').innerText = "BET LOCKED: " + selectedPick;
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    }

    function addTokens() {
        const amt = parseInt(document.getElementById('cash-input').value);
        if(amt >= 50) {
            tokens += (amt * 3);
            document.getElementById('wallet-balance').innerText = tokens;
            localStorage.setItem('user_tks', tokens);
            alert("Added " + (amt*3) + " tokens!");
        } else { alert("Minimum ₹50"); }
    }
</script>
</body>
</html>
