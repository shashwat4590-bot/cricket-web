<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
        }

        /* Responsive Layout */
        .app-shell {
            width: 100%;
            max-width: 600px; /* Better for PC */
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { color: #64748b; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-align: center; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }

        .page { display: none; padding: 30px 20px 120px; animation: slideUp 0.4s ease-out; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* --- HOME PAGE --- */
        .hero-banner {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            width: 100%; border-radius: 40px; padding: 40px;
            border: 1px solid rgba(56, 189, 248, 0.2); margin-top: 20px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .match-title { font-size: 2rem; font-weight: 900; margin-bottom: 10px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; }
        .team-logo { width: 100px; height: 100px; object-fit: contain; }
        .vs-text { font-size: 1.5rem; font-weight: 900; color: var(--accent); opacity: 0.5; }

        /* --- WALLET --- */
        .wallet-card { 
            background: var(--card); width: 100%; border-radius: 35px; padding: 40px; 
            border: 1px solid rgba(251, 191, 36, 0.3); text-align: center;
        }
        .token-val { font-size: 4rem; font-weight: 900; color: var(--gold); }
        input { 
            background: #020617; border: 2px solid #334155; padding: 20px; 
            border-radius: 20px; color: white; width: 100%; font-size: 1.2rem; margin: 20px 0;
            text-align: center;
        }

        /* --- ARENA --- */
        .scoreboard { 
            background: rgba(255, 255, 255, 0.03); border-radius: 30px; padding: 30px; 
            width: 100%; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; 
            text-align: center;
        }
        .live-score-text { font-size: 3rem; font-weight: 900; letter-spacing: -2px; }
        
        .predict-card { 
            background: var(--card); border-radius: 40px; padding: 40px 30px; 
            width: 100%; border: 1px solid #1e293b; text-align: center;
        }
        #question { font-size: 1.6rem; font-weight: 700; min-height: 80px; margin-bottom: 30px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .opt-btn { 
            background: #1e293b; border: 1px solid #334155; color: white; 
            padding: 25px 15px; border-radius: 25px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
        }
        .opt-btn.selected { border: 3px solid var(--accent); background: rgba(56, 189, 248, 0.1); }
        .opt-btn.correct { background: var(--success) !important; color: #052e16 !important; }
        .opt-btn.wrong { background: var(--error) !important; opacity: 0.5; }

        /* --- LOCK BET BUTTON --- */
        #lockBetBtn {
            display: none; width: 100%; background: var(--accent); color: #082f49;
            padding: 20px; border-radius: 20px; border: none; font-size: 1.2rem;
            font-weight: 900; margin-top: 25px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div id="home" class="page active">
        <h1 style="color: var(--accent); font-size: 2.5rem; font-weight: 900;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="hero-banner">
            <p style="color:var(--gold); font-weight:800; letter-spacing:3px;">TONIGHT'S CLASH</p>
            <div class="team-row">
                <div>
                    <img src="https://www.iplt20.com/assets/images/csk-v2.png" class="team-logo">
                    <p style="font-size:1.5rem; font-weight:900; margin-top:10px;">CSK</p>
                </div>
                <div class="vs-text">VS</div>
                <div>
                    <img src="https://www.iplt20.com/assets/images/mi-v2.png" class="team-logo">
                    <p style="font-size:1.5rem; font-weight:900; margin-top:10px;">MI</p>
                </div>
            </div>
            <button onclick="nav('arena')" style="background:white; color:black; border:none; padding:20px; border-radius:20px; font-weight:900; width:100%; cursor:pointer; font-size:1.1rem;">JOIN THE ACTION</button>
        </div>
        <p style="margin-top:40px; color:#64748b; text-align:center; line-height:1.6;">Predict every ball, every wicket, and every boundary live to win massive rewards!</p>
    </div>

    <div id="wallet" class="page">
        <h2 style="font-size: 2rem; margin-bottom: 30px;">MY WALLET</h2>
        <div class="wallet-card">
            <p style="font-weight:700; color:#94a3b8;">TOTAL TOKENS</p>
            <div class="token-val" id="balanceText">0</div>
            <div style="margin-top:30px;">
                <label style="color:var(--gold); font-weight:800; font-size:0.9rem;">RECHARGE AMOUNT (₹)</label>
                <input type="number" id="cashInput" placeholder="Minimum ₹50">
                <button onclick="processBuy()" style="background:var(--gold); color:black; border:none; padding:20px; border-radius:20px; font-weight:900; width:100%; font-size:1.1rem; cursor:pointer;">ADD TOKENS</button>
            </div>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="scoreboard">
            <p style="color:var(--accent); font-weight:800; font-size:0.8rem; letter-spacing:2px; margin-bottom:10px;">MATCH STATUS</p>
            <div style="display:flex; justify-content:center; align-items:center; gap:30px;">
                <span id="batTeam" style="font-size:1.5rem; font-weight:900;">TOSS</span>
                <span id="liveScore" class="live-score-text">0/0</span>
            </div>
        </div>
        <div class="predict-card">
            <div id="question">Connecting to Match...</div>
            <div id="optionsContainer" class="options-grid"></div>
            <button id="lockBetBtn" onclick="confirmBet()">LOCK MY BET (10 Tokens)</button>
            <p id="lockStatus" style="display:none; margin-top:20px; font-weight:700; color:var(--accent);"></p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="nav('home')">HOME</div>
        <div class="nav-item" id="nav-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-item" id="nav-wallet" onclick="nav('wallet')">WALLET</div>
    </div>

</div>

<script>
    // --- FIREBASE CONFIG (MUST MATCH YOUR HOST) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_DOMAIN",
        databaseURL: "YOUR_URL",
        projectId: "YOUR_ID",
        storageBucket: "YOUR_BUCKET",
        messagingSenderId: "YOUR_SENDER",
        appId: "YOUR_APP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    let tokens = parseInt(localStorage.getItem("user_tokens")) || 0;
    document.getElementById('balanceText').innerText = tokens;

    let selectedTemp = null; // Stored before locking
    let lastQuestionKey = ""; // Track if question changed

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
    }

    function processBuy() {
        const val = parseInt(document.getElementById('cashInput').value);
        if(val < 50) return alert("Min ₹50 required");
        tokens += (val * 3);
        saveTokens();
        alert("Tokens Added!");
    }

    function saveTokens() {
        localStorage.setItem("user_tokens", tokens);
        document.getElementById('balanceText').innerText = tokens;
    }

    // --- LIVE ARENA ---
    qRef.on("value", (snap) => {
        const data = snap.val();
        if (!data) return;

        // CHECK IF IT'S A NEW QUESTION
        const currentKey = data.question + data.status; 
        if(currentKey !== lastQuestionKey) {
            resetPlayerState(); // Reset UI for the new question
            lastQuestionKey = currentKey;
        }

        document.getElementById("liveScore").innerText = data.matchScore || "0/0";
        document.getElementById("batTeam").innerText = data.battingTeam || "LIVE";
        document.getElementById("question").innerText = data.question;

        if (!data.result) {
            renderOptions(data.options);
        } else {
            showResult(data.result, data.options);
        }
    });

    function renderOptions(options) {
        if (!options) return;
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        
        options.filter(o => o !== "DRAW").forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            if(selectedTemp === opt) btn.classList.add("selected");
            btn.innerText = opt;
            btn.onclick = () => selectOption(opt);
            container.appendChild(btn);
        });
    }

    function selectOption(opt) {
        if (localStorage.getItem("bet_locked") === "true") return;
        selectedTemp = opt;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        event.target.classList.add('selected');
        document.getElementById("lockBetBtn").style.display = "block";
    }

    function confirmBet() {
        if (tokens < 10) return alert("Low Tokens!");
        
        tokens -= 10;
        saveTokens();
        localStorage.setItem("bet_locked", "true");
        localStorage.setItem("my_selection", selectedTemp);
        
        applyLockUI();
    }

    function applyLockUI() {
        document.getElementById("lockBetBtn").style.display = "none";
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        const status = document.getElementById("lockStatus");
        status.style.display = "block";
        status.innerText = "BET LOCKED ON: " + selectedTemp;
    }

    function showResult(correct, options) {
        const myBet = localStorage.getItem("my_selection");
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";

        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            if(opt === correct) btn.classList.add("correct");
            else if(opt === myBet) btn.classList.add("wrong");
            container.appendChild(btn);
        });

        if (myBet === correct && localStorage.getItem("bet_processed") !== lastQuestionKey) {
            confetti({ particleCount: 150 });
            tokens += 30;
            saveTokens();
            localStorage.setItem("bet_processed", lastQuestionKey);
        }
    }

    function resetPlayerState() {
        selectedTemp = null;
        localStorage.setItem("bet_locked", "false");
        localStorage.setItem("my_selection", "");
        document.getElementById("lockStatus").style.display = "none";
        document.getElementById("lockBetBtn").style.display = "none";
    }
</script>
</body>
</html>
