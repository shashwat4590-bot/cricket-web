<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Floating Token Header */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(15px); z-index: 2000;
        }

        .token-pill {
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--gold);
            padding: 8px 18px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--gold);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        /* Pages */
        .container { padding: 100px 20px 120px; max-width: 450px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease; width: 100%; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* High-End Match Card */
        .match-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            width: 100%; border-radius: 30px; padding: 40px 20px;
            border: 1px solid rgba(56, 189, 248, 0.2); text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Score Display */
        .score-card {
            background: var(--card); border-radius: 25px; padding: 25px;
            width: 100%; border: 1px solid #1e293b; text-align: center; margin-bottom: 20px;
        }
        #live-score { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 10px 0; }

        /* Timer Bar */
        .timer-wrap { width: 100%; height: 6px; background: #020617; border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); transition: linear; }

        /* Question & Options */
        .q-card {
            background: var(--card); border-radius: 30px; padding: 30px 20px;
            width: 100%; border: 1px solid #1e293b; text-align: center;
        }
        #q-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; color: #f8fafc; }

        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn {
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 22px 10px; border-radius: 18px; font-weight: 700;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .mult-badge { position: absolute; top: -8px; right: -5px; background: var(--gold); color: black; font-size: 0.65rem; padding: 2px 8px; border-radius: 50px; font-weight: 900; }

        /* Buttons */
        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
        .btn-lock { background: var(--gold); }

        /* Wallet */
        .wallet-input { background: #020617; border: 2px solid #334155; padding: 20px; border-radius: 20px; color: white; width: 100%; font-size: 1.5rem; text-align: center; margin: 20px 0; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 20px;
            border-top: 1px solid #1e293b; z-index: 1000;
        }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link.active { color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.2rem; letter-spacing:1px;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">🪙 <span id="pill-bal">0</span></div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="match-card">
                <p style="color: var(--gold); font-weight: 800; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 10px;">LIVE ARENA</p>
                <h2 style="font-size: 2.2rem; margin-bottom: 5px;">CSK vs MI</h2>
                <p style="color: #64748b; font-weight: 600; margin-bottom: 35px;">TATA IPL 2026 FINAL</p>
                <button class="btn-main" onclick="nav('arena')">JOIN MATCH</button>
            </div>
        </div>

        <div id="arena" class="page">
            <div class="score-card">
                <p id="batting-team" style="color: var(--accent); font-weight: 800; font-size: 0.75rem; letter-spacing: 2px;">LIVE SCORE</p>
                <div id="live-score">0/0</div>
            </div>

            <div class="q-card">
                <div class="timer-wrap" id="timer-ui"><div id="timer-fill"></div></div>
                <div id="q-text">Waiting for host...</div>
                <div id="options-box" class="opt-grid"></div>
                <button id="lock-btn" class="btn-main btn-lock" style="display:none;" onclick="confirmBet()">CONFIRM PREDICTION</button>
                <div id="lock-msg" style="display:none; margin-top:20px; font-weight:900; color:var(--accent); font-size:1.1rem;"></div>
            </div>
        </div>

        <div id="wallet" class="page">
            <div class="match-card" style="border-color: var(--gold);">
                <p style="color: #64748b; font-weight: 800;">YOUR TOKENS</p>
                <div id="wall-bal" style="font-size: 4.5rem; font-weight: 900; color: var(--gold);">0</div>
                <input type="number" id="buy-amt" class="wallet-input" placeholder="Enter Amount (₹)">
                <button class="btn-main" style="background:var(--gold);" onclick="purchaseTokens()">RECHARGE NOW</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    // Config
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // App State
    let tokens = parseInt(localStorage.getItem('tks')) || 0;
    let selectedPick = "";
    let activeMult = 2.0;
    let timerLoop;

    // Sounds
    const winSnd = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    const clickSnd = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        const qID = data.question + data.timestamp;
        if(window.lastQ !== qID) {
            window.lastQ = qID;
            localStorage.setItem('isLocked', 'false');
            localStorage.setItem('myPick', '');
            localStorage.setItem('paid', 'false');
            document.getElementById('lock-msg').style.display = 'none';
            document.getElementById('lock-btn').style.display = 'none';
            if(data.active) startTimer(data.endTime);
        }

        if(!data.active) {
            document.getElementById('q-text').innerText = "Waiting for next ball...";
            document.getElementById('options-box').innerHTML = "";
            document.getElementById('timer-ui').style.display = "none";
            return;
        }

        activeMult = data.multiplier || 2.0;
        document.getElementById('q-text').innerText = data.question;
        document.getElementById('live-score').innerText = data.matchScore;

        const box = document.getElementById('options-box');
        box.innerHTML = "";
        data.options.slice(0,4).forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerHTML = `${o} <span class="mult-badge">${activeMult}x</span>`;
            if(data.result === o) { b.style.background = "#22c55e"; b.style.borderColor="#22c55e"; b.style.color="white"; }
            b.onclick = () => {
                if(localStorage.getItem('isLocked') === 'true' || Date.now() > data.endTime) return;
                clickSnd.play();
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedPick = o;
                document.getElementById('lock-btn').style.display = "block";
            };
            box.appendChild(b);
        });

        // Payout
        if(data.result && localStorage.getItem('myPick') === data.result && localStorage.getItem('paid') === 'false') {
            const winAmt = Math.floor(10 * activeMult);
            tokens += winAmt;
            localStorage.setItem('tks', tokens);
            localStorage.setItem('paid', 'true');
            winSnd.play();
            if(navigator.vibrate) navigator.vibrate(200);
            updateUI();
            alert("🎯 WINNER! You earned " + winAmt + " Tokens");
        }
    });

    function startTimer(endTime) {
        clearInterval(timerLoop);
        const wrap = document.getElementById('timer-ui');
        const fill = document.getElementById('timer-fill');
        wrap.style.display = "block";
        
        timerLoop = setInterval(() => {
            const remaining = endTime - Date.now();
            const total = 30000; // 30s base
            const pc = (remaining / total) * 100;
            fill.style.width = pc + "%";
            if(remaining <= 0) {
                clearInterval(timerLoop);
                fill.style.width = "0%";
                if(localStorage.getItem('isLocked') === 'false') {
                    document.getElementById('lock-btn').style.display = "none";
                }
            }
        }, 100);
    }

    function confirmBet() {
        if(tokens < 10) return alert("Insufficient Tokens!");
        tokens -= 10;
        localStorage.setItem('tks', tokens);
        localStorage.setItem('isLocked', 'true');
        localStorage.setItem('myPick', selectedPick);
        updateUI();
        document.getElementById('lock-btn').style.display = "none";
        document.getElementById('lock-msg').style.display = "block";
        document.getElementById('lock-msg').innerText = "LOCKED: " + selectedPick;
    }

    function purchaseTokens() {
        const val = parseInt(document.getElementById('buy-amt').value);
        if(val >= 50) { tokens += (val * 2); updateUI(); alert("Success!"); document.getElementById('buy-amt').value=""; }
    }

    function updateUI() {
        document.getElementById('pill-bal').innerText = tokens;
        document.getElementById('wall-bal').innerText = tokens;
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
