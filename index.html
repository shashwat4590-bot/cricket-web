<!DOCTYPE html>
<html>
<head>
<title>Cricket Billionaire</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
color:white;
}

.container{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.score{
font-size:16px;
margin-bottom:10px;
color:#00ffcc;
}

.timer{
font-size:18px;
margin-bottom:15px;
color:#ffd700;
}

.question{
background:#1f4bd8;
padding:18px;
border-radius:12px;
margin-bottom:20px;
font-size:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.answer{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#3a6eff,#00c6ff);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.answer:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.correct{
background:#2ecc71 !important;
}

.wrong{
background:#e74c3c !important;
}

</style>
</head>

<body>

<div class="container">

<div class="title">🏏 Cricket Billionaire</div>

<div class="score">Score: <span id="score">0</span></div>

<div class="timer">Time: <span id="time">10</span></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<script>

let score=0

let questions=[
{
q:"What is it called when a batsman scores zero runs?",
a:["A Blank","A Duck","A Zero","A Goose"],
c:1
},
{
q:"How many players are in a cricket team?",
a:["9","10","11","12"],
c:2
},
{
q:"How many overs are there in T20 cricket?",
a:["10","15","20","25"],
c:2
},
{
q:"How many balls are in one over?",
a:["4","5","6","8"],
c:2
},
{
q:"Which country invented cricket?",
a:["India","England","Australia","South Africa"],
c:1
}
]

let current=0
let time=10
let timer

function loadQuestion(){

clearInterval(timer)

time=10
document.getElementById("time").innerText=time

let q=questions[current]

document.getElementById("question").innerText=q.q

let answersHTML=""

q.a.forEach((ans,i)=>{

answersHTML+=`<button class="answer" onclick="checkAnswer(${i})">${ans}</button>`

})

document.getElementById("answers").innerHTML=answersHTML

timer=setInterval(updateTimer,1000)

}

function updateTimer(){

time--

document.getElementById("time").innerText=time

if(time<=0){

clearInterval(timer)
nextQuestion()

}

}

function checkAnswer(i){

clearInterval(timer)

let correct=questions[current].c

let buttons=document.querySelectorAll(".answer")

buttons.forEach((btn,index)=>{

if(index===correct) btn.classList.add("correct")

if(index===i && i!==correct) btn.classList.add("wrong")

})

if(i===correct){

score++
document.getElementById("score").innerText=score

}

setTimeout(nextQuestion,1500)

}

function nextQuestion(){

current++

if(current>=questions.length){

alert("Game Over! Your score: "+score)

current=0
score=0
document.getElementById("score").innerText=score

}

loadQuestion()

}

loadQuestion()

</script>

</body>
</html>
