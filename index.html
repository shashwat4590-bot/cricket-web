<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; margin:0; }
        #status { padding: 10px; background: red; font-size: 12px; font-weight: bold; }
        .page { display: none; padding: 20px; padding-top: 50px; }
        .active { display: block; }
        .card { background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid #1e293b; margin: 20px; }
        .opt-btn { background: #334155; color: white; border: none; padding: 20px; margin: 10px; width: 40%; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
        .selected { background: #38bdf8; color: black; font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<div id="status">CONNECTION: SEARCHING...</div>

<div id="home" class="page active">
    <h1>PREDICT LIVE</h1>
    <div class="card">
        <h2>CSK vs MI</h2>
        <button onclick="nav('arena')" style="padding:15px; width:100%; background:#38bdf8; border:none; border-radius:10px; font-weight:bold;">JOIN ARENA</button>
    </div>
    <button onclick="nav('wallet')" style="color:#38bdf8; background:none; border:none;">Open My Wallet</button>
</div>

<div id="arena" class="page">
    <div class="card">
        <h3 id="score-text">0/0</h3>
        <h1 id="q-text">Waiting for Host...</h1>
        <div id="opt-box"></div>
        <button id="lock-btn" style="display:none; width:100%; padding:15px; background:gold; border-radius:10px; margin-top:20px;" onclick="confirmBet()">LOCK BET (10 Tokens)</button>
    </div>
</div>

<div id="wallet" class="page">
    <div class="card">
        <h2>My Tokens: <span id="token-count">0</span></h2>
        <input type="number" id="amt" placeholder="Enter Amount (₹)" style="padding:10px; width:80%; margin-top:10px;">
        <button onclick="buy()" style="padding:15px; width:80%; background:gold; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">BUY TOKENS</button>
    </div>
</div>

<div class="nav">
    <div onclick="nav('home')">HOME</div>
    <div onclick="nav('arena')">ARENA</div>
    <div onclick="nav('wallet')">WALLET</div>
</div>

<script>
    // USE THE EXACT SAME CONFIG AS THE HOST
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Connection Check
    db.ref(".info/connected").on("value", (snap) => {
        const s = document.getElementById('status');
        if (snap.val() === true) { s.innerText = "CONNECTION: LIVE"; s.style.background = "green"; }
        else { s.innerText = "CONNECTION: OFFLINE"; s.style.background = "red"; }
    });

    // Sync Question
    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;
        document.getElementById('q-text').innerText = data.question;
        document.getElementById('score-text').innerText = data.matchScore;
        
        const box = document.getElementById('opt-box');
        box.innerHTML = "";
        data.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                document.getElementById('lock-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    });

    // Wallet/Nav Logic
    let tokens = parseInt(localStorage.getItem('tks')) || 0;
    document.getElementById('token-count').innerText = tokens;

    function buy() {
        const val = parseInt(document.getElementById('amt').value);
        if(val >= 50) { tokens += (val*3); localStorage.setItem('tks', tokens); document.getElementById('token-count').innerText = tokens; alert("Added!"); }
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
