<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Header */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px); z-index: 2000;
        }
        .token-pill {
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--gold);
            padding: 8px 18px; border-radius: 50px; font-weight: 900; color: var(--gold);
        }

        /* Layout */
        .container { padding: 90px 20px 120px; max-width: 450px; margin: 0 auto; }
        .page { display: none; width: 100%; }
        .page.active { display: flex; flex-direction: column; }

        /* Home Page Dashboard */
        .promo-banner {
            background: linear-gradient(45deg, #0ea5e9, #6366f1);
            border-radius: 24px; padding: 25px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .match-list-item {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border: 1px solid #1e293b;
            display: flex; justify-content: space-between; align-items: center;
        }
        .live-dot { height: 8px; width: 8px; background: var(--red); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }

        /* Arena Elements */
        .score-card { background: var(--card); border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 20px; border: 1px solid #1e293b; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn {
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 22px 10px; border-radius: 18px; font-weight: 700; transition: 0.3s;
        }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .opt-btn.correct { background: var(--green) !important; border-color: var(--green) !important; color: white; }
        .opt-btn.wrong { background: var(--red) !important; border-color: var(--red) !important; color: white; }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px; }

        /* Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">🪙 <span id="pill-bal">0</span></div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="promo-banner">
                <h3 style="font-weight:900; font-size:1.5rem;">IPL 2026 Finals</h3>
                <p style="font-size:0.9rem; opacity:0.9;">Double your tokens every ball!</p>
            </div>
            
            <h4 style="margin-bottom:15px; font-weight:800; color:#64748b;">ACTIVE MATCHES</h4>
            <div class="match-list-item">
                <div>
                    <p style="font-size:0.7rem; font-weight:800; color:var(--accent)"><span class="live-dot"></span>LIVE</p>
                    <p style="font-weight:900;">CSK vs MI</p>
                </div>
                <button onclick="nav('arena')" style="background:var(--accent); border:none; padding:8px 15px; border-radius:10px; font-weight:900;">PLAY</button>
            </div>

            <div class="match-list-item" style="opacity:0.6;">
                <div>
                    <p style="font-size:0.7rem; font-weight:800; color:#94a3b8">UPCOMING</p>
                    <p style="font-weight:900;">RCB vs GT</p>
                </div>
                <p style="font-size:0.8rem; font-weight:800;">7:30 PM</p>
            </div>
        </div>

        <div id="arena" class="page">
            <div class="score-card">
                <p id="batting-team" style="color:var(--accent); font-weight:800; font-size:0.7rem; letter-spacing:1px;">MATCH CENTER</p>
                <div id="live-score" style="font-size:3rem; font-weight:900;">0/0</div>
            </div>

            <div class="score-card" id="q-card-ui">
                <div id="q-text" style="font-size:1.4rem; font-weight:700; margin-bottom:20px;">Waiting for ball...</div>
                <div id="options-box" class="opt-grid"></div>
                <button id="lock-btn" class="btn-main" style="display:none; background:var(--gold);" onclick="confirmBet()">LOCK PREDICTION</button>
                <div id="lock-msg" style="display:none; margin-top:15px; font-weight:900; color:var(--accent);">LOCKED</div>
            </div>
        </div>

        <div id="wallet" class="page">
            <div class="score-card" style="border-color:var(--gold);">
                <p style="color:#64748b; font-weight:800;">WALLET BALANCE</p>
                <div id="wall-bal" style="font-size:4rem; font-weight:900; color:var(--gold);">0</div>
                <input type="number" id="buy-amt" style="width:100%; background:#020617; border:2px solid #334155; padding:20px; border-radius:20px; color:white; text-align:center; margin:20px 0;" placeholder="Amount ₹">
                <button class="btn-main" style="background:var(--gold);" onclick="purchaseTokens()">BUY TOKENS</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = parseInt(localStorage.getItem('tks')) || 0;
    let selectedPick = "";
    let activeMult = 2.0;

    const winSnd = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    const lossSnd = new Audio('https://www.soundjay.com/misc/sounds/fail-whistle-01.mp3');

    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        if(window.lastQ !== (data.question + data.timestamp)) {
            window.lastQ = (data.question + data.timestamp);
            localStorage.setItem('isLocked', 'false');
            localStorage.setItem('myPick', '');
            localStorage.setItem('paid', 'false');
            document.getElementById('lock-msg').style.display = 'none';
            document.getElementById('lock-btn').style.display = 'none';
        }

        if(!data.active) {
            document.getElementById('q-text').innerText = "Waiting for next ball...";
            document.getElementById('options-box').innerHTML = "";
            return;
        }

        activeMult = data.multiplier || 2.0;
        document.getElementById('q-text').innerText = data.question;
        document.getElementById('live-score').innerText = data.matchScore;

        const box = document.getElementById('options-box');
        box.innerHTML = "";
        data.options.slice(0,4).forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            
            // Logic for Result Coloring
            const myPick = localStorage.getItem('myPick');
            if(data.result) {
                if(o === data.result) b.classList.add('correct');
                else if(o === myPick) b.classList.add('wrong');
            }

            b.onclick = () => {
                if(localStorage.getItem('isLocked') === 'true') return;
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedPick = o;
                document.getElementById('lock-btn').style.display = "block";
            };
            box.appendChild(b);
        });

        // 1. Define Sound Effects
    const winSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/despot/paws.mp3'); // Energetic Win
    const lossSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/audiocomponents/creatures/roar.mp3'); // Deep Loss/Buzzer
    
    // Set volumes
    winSnd.volume = 0.5;
    lossSnd.volume = 0.4;

    // 2. Final Result Logic with Audio & Animations
    if(data.result && localStorage.getItem('paid') === 'false') {
        const myPick = localStorage.getItem('myPick');
        
        if(myPick) {
            if(myPick === data.result) {
                // --- WIN SCENARIO ---
                const winAmt = Math.floor(10 * activeMult);
                tokens += winAmt;
                
                // Play Sound
                winSnd.play().catch(e => console.log("Audio play blocked by browser"));
                
                // Visuals
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                
                alert(`🎯 JACKPOT! +${winAmt} Tokens`);
            } else {
                // --- LOSS SCENARIO ---
                // Play Sound
                lossSnd.play().catch(e => console.log("Audio play blocked by browser"));
                
                // Visuals
                const qCard = document.getElementById('q-card-ui');
                qCard.classList.add('shake');
                setTimeout(() => qCard.classList.remove('shake'), 500);
                
                // Vibrations (for mobile)
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }
        
        // Mark as processed
        localStorage.setItem('paid', 'true');
        localStorage.setItem('tks', tokens);
        updateUI();
    }

    function confirmBet() {
        if(tokens < 10) return alert("Not enough tokens!");
        tokens -= 10;
        localStorage.setItem('tks', tokens);
        localStorage.setItem('isLocked', 'true');
        localStorage.setItem('myPick', selectedPick);
        updateUI();
        document.getElementById('lock-btn').style.display = "none";
        document.getElementById('lock-msg').style.display = "block";
        document.getElementById('lock-msg').innerText = "LOCKED: " + selectedPick;
    }

    function purchaseTokens() {
        const val = parseInt(document.getElementById('buy-amt').value);
        if(val >= 50) { tokens += (val * 2); updateUI(); alert("Tokens Added!"); }
    }

    function updateUI() {
        document.getElementById('pill-bal').innerText = tokens;
        document.getElementById('wall-bal').innerText = tokens;
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }
    updateUI();
</script>
</body>
</html>
