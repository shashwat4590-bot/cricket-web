<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; text-align: center; margin: 0; }
        .card { background: #0f172a; margin: 20px; padding: 30px; border-radius: 30px; border: 1px solid #1e293b; }
        .score { font-size: 3.5rem; font-weight: 900; color: #38bdf8; }
        .opt-btn { background: #1e293b; color: white; border: 2px solid #334155; padding: 20px; margin: 10px; border-radius: 15px; width: 40%; font-weight: 700; font-size: 1.2rem; }
        .active-btn { border-color: #38bdf8; background: rgba(56,189,248,0.1); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 20px; border-top: 2px solid #334155; }
        #debug-bar { background: red; font-size: 12px; padding: 5px; position: fixed; top: 0; width: 100%; }
    </style>
</head>
<body>

<div id="debug-bar">Connection: Offline</div>

<div id="p-home">
    <h1 style="margin-top:50px; color:#38bdf8;">PREDICT LIVE</h1>
    <div class="card">
        <h2>CSK vs MI</h2>
        <button onclick="showPage('arena')" style="padding:20px; width:80%; border-radius:15px; background:#38bdf8; border:none; font-weight:900;">GO TO ARENA</button>
    </div>
</div>

<div id="p-arena" style="display:none;">
    <div class="card">
        <h3 id="batting">WAITING...</h3>
        <div class="score" id="score-text">0/0</div>
    </div>
    <div class="card">
        <h2 id="question-text">Waiting for Host to push...</h2>
        <div id="option-box"></div>
        <button id="lock-btn" style="display:none; width:100%; background:gold; padding:15px; margin-top:10px; border-radius:10px;" onclick="lockBet()">CONFIRM BET</button>
    </div>
</div>

<div class="nav">
    <div onclick="showPage('home')">HOME</div>
    <div onclick="showPage('arena')">ARENA</div>
</div>

<script>
    // 1. CONFIG (MAKE SURE THIS IS CORRECT!)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP"
    };

    // 2. INITIALIZE
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        document.getElementById('debug-bar').style.background = "orange";
        document.getElementById('debug-bar').innerText = "Connecting to Database...";

        // 3. LISTEN
        db.ref("currentQuestion").on("value", (snap) => {
            const data = snap.val();
            document.getElementById('debug-bar').style.background = "green";
            document.getElementById('debug-bar').innerText = "Live: Data Connected";

            if(!data) return;

            document.getElementById('score-text').innerText = data.matchScore || "0/0";
            document.getElementById('batting').innerText = data.battingTeam || "LIVE";
            document.getElementById('question-text').innerText = data.question;

            if(!data.result) {
                render(data.options);
            } else {
                document.getElementById('question-text').innerText = "Winner: " + data.result;
                document.getElementById('option-box').innerHTML = "";
            }
        });
    } catch(e) {
        document.getElementById('debug-bar').innerText = "ERROR: " + e.message;
    }

    let myChoice = "";
    function render(opts) {
        const box = document.getElementById('option-box');
        box.innerHTML = "";
        (opts || []).forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            b.onclick = () => {
                myChoice = o;
                document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active-btn'));
                b.classList.add('active-btn');
                document.getElementById('lock-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    function showPage(id) {
        document.getElementById('p-home').style.display = id === 'home' ? 'block' : 'none';
        document.getElementById('p-arena').style.display = id === 'arena' ? 'block' : 'none';
    }
</script>
</body>
</html>
