<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite | Official Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- HEADER --- */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px); z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .token-pill {
            background: rgba(15, 23, 42, 0.9); border: 1.5px solid var(--gold);
            padding: 10px 20px; border-radius: 50px; font-weight: 900; color: var(--gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .container { padding: 100px 20px 140px; max-width: 480px; margin: 0 auto; }
        .page { display: none; width: 100%; animation: slideUp 0.4s ease forwards; }
        .page.active { display: flex; flex-direction: column; }

        /* --- UI COMPONENTS --- */
        .q-card {
            background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
            border-radius: 32px; padding: 25px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .promo-banner {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 30px; padding: 30px; margin-bottom: 30px;
        }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .opt-btn {
            background: rgba(255,255,255,0.03); border: 2px solid #334155; color: white;
            padding: 18px 10px; border-radius: 18px; font-weight: 700; cursor: pointer;
        }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.15); border-width: 3px; }
        
        .btn-main { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); }
        .btn-outline { background: transparent; border: 2px solid #334155; color: white; padding: 10px; border-radius: 12px; font-size: 0.8rem; margin-top: 10px; cursor: pointer;}

        .txn-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.9rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.4rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">🪙 <span id="pill-bal">0</span></div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="promo-banner">
                <h2 style="font-weight:900; font-size:1.8rem;">CSK vs MI</h2>
                <p style="font-weight:600; opacity:0.9;">IPL 2026 Grand Finale</p>
                <button class="btn-main" style="margin-top:20px; background:white;" onclick="nav('arena')">ENTER ARENA</button>
            </div>
            <div class="q-card" style="text-align: center;">
                <p style="color: #64748b; font-size: 0.8rem;">ACCOUNT STATUS</p>
                <button class="btn-outline" onclick="logout()">LOGOUT ACCOUNT</button>
            </div>
        </div>

        <div id="arena" class="page">
            <div id="questions-list"></div>
        </div>

        <div id="wallet" class="page">
            <div class="q-card" style="text-align:center;">
                <p style="font-size: 0.8rem; color: #64748b; letter-spacing: 1px;">TOTAL BALANCE</p>
                <h1 id="wall-bal" style="font-size:4rem; color:var(--gold); font-weight:900; margin-bottom:10px;">0</h1>
                
                <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-top: 10px;">
                    <input id="buy-amt" type="number" placeholder="Enter Amount (₹)" style="width:100%; background:#020617; border:1px solid #334155; padding:15px; border-radius:15px; color:white; text-align:center; font-size:1.1rem; outline:none;">
                    <button class="btn-main btn-gold" onclick="addMoney()">ADD MONEY</button>
                </div>
            </div>

            <h3 style="margin: 20px 0 15px; font-size: 0.9rem; color: #64748b;">RECENT TRANSACTIONS</h3>
            <div id="transactions"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    // 1. INITIALIZE SUPABASE
    const supabaseClient = supabase.createClient(
        "https://rogxkddufkmjexekwzzr.supabase.co",
        "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt"
    );

    // 2. INITIALIZE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = 0;

    // 3. AUTH PROTECTION
    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
        } else {
            loadBalance();
            loadTransactions();
            renderArena();
        }
    }
    checkUser();

    // 4. ARENA LOGIC
    function renderArena() {
        db.ref("questions").on("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val();
            list.innerHTML = "";
            if(!data) return;

            Object.keys(data).reverse().slice(0,3).forEach(id => {
                const q = data[id];
                const myPick = localStorage.getItem('pick_'+id);
                let card = `<div class="q-card">
                    <h2 style="font-size:1.3rem; margin-bottom:15px;">${q.question}</h2>
                    <div class="opt-grid">
                        ${q.options.map(o => `<button class="opt-btn ${myPick==o?'selected':''}" onclick="selectBet('${id}','${o}')">${o}</button>`).join('')}
                    </div>
                    <button class="btn-main" onclick="confirmBet('${id}')">PLACE BET</button>
                </div>`;
                list.innerHTML += card;
            });
        });
    }

    // 5. WALLET & MONEY LOGIC
    async function loadBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).single();
        if(data) {
            tokens = data.balance;
            document.getElementById('pill-bal').innerText = tokens;
            document.getElementById('wall-bal').innerText = tokens;
        }
    }

    async function addMoney() {
        const amount = document.getElementById("buy-amt").value;
        if(!amount || amount < 50) return alert("Min recharge ₹50");

        const { data: { user } } = await supabaseClient.auth.getUser();
        
        // Update Balance
        const newBalance = tokens + (parseInt(amount) * 2);
        await supabaseClient.from("wallets").update({ balance: newBalance }).eq("user_id", user.id);

        // Record Transaction
        await supabaseClient.from("transactions").insert([
            { user_id: user.id, amount: amount, type: 'DEPOSIT' }
        ]);

        alert("Money added!");
        loadBalance();
        loadTransactions();
    }

    async function loadTransactions() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data } = await supabaseClient.from("transactions").select("*").eq("user_id", user.id).order("created_at", { ascending: false });
        
        let html = "";
        data?.forEach(t => {
            html += `<div class="txn-item"><span>${t.type}</span><span style="color:var(--green)">+₹${t.amount}</span></div>`;
        });
        document.getElementById("transactions").innerHTML = html || "<p style='text-align:center; color:grey;'>No history</p>";
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "login.html";
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }
</script>
</body>
</html>
