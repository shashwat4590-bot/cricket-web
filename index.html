<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; }

        #connection-status { padding: 12px; background: #ef4444; text-align: center; font-weight: 900; font-size: 0.8rem; position: sticky; top: 0; z-index: 2000; transition: 0.5s; }
        .page { display: none; padding: 30px 20px 120px; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--card); border-radius: 30px; padding: 35px 25px; width: 100%; border: 1px solid #1e293b; text-align: center; margin-bottom: 20px; }
        .score-val { font-size: 3.5rem; font-weight: 900; color: white; margin: 10px 0; }
        
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
        .opt-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 22px 10px; border-radius: 18px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { border: 3px solid var(--accent); background: rgba(56, 189, 248, 0.1); }
        
        .main-btn { background: var(--accent); color: black; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 20px; border-top: 2px solid #1e293b; }
        .nav-item { color: #64748b; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="connection-status">STATUS: DISCONNECTED</div>

    <div id="home" class="page active">
        <h1 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 20px;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="card">
            <h2 style="margin-bottom:20px;">IPL FINALS</h2>
            <button class="main-btn" onclick="nav('arena')">JOIN ARENA</button>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="card">
            <p style="color: var(--accent); letter-spacing: 2px; font-size: 0.8rem;">LIVE SCORE</p>
            <div id="batting-team" style="font-weight: 800; margin-top: 5px;">LOADING...</div>
            <div id="live-score" class="score-val">0/0</div>
        </div>

        <div class="card">
            <div id="q-text" style="font-size: 1.5rem; font-weight: 700;">Waiting for Host...</div>
            <div id="options-box" class="opt-grid"></div>
            <button id="lock-btn" style="display:none; background:var(--gold); margin-top:20px;" class="main-btn" onclick="confirmBet()">LOCK BET (10 TOKENS)</button>
            <p id="lock-msg" style="display:none; margin-top:20px; color:var(--accent); font-weight:900;"></p>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="card" style="border-color: var(--gold);">
            <h3>MY TOKENS</h3>
            <div id="bal-text" style="font-size: 4rem; font-weight: 900; color: var(--gold);">0</div>
            <button class="main-btn" style="background:var(--gold); margin-top:20px;" onclick="addTokens()">GET 150 TOKENS (FREE)</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-item" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-item" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </div>

<script>
    // YOUR VERIFIED CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };

    // Initialize
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const statusEl = document.getElementById('connection-status');

    // Connection Monitor
    db.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true) {
            statusEl.innerText = "STATUS: CONNECTED (LIVE)";
            statusEl.style.background = "#22c55e";
        } else {
            statusEl.innerText = "STATUS: RECONNECTING...";
            statusEl.style.background = "#f59e0b";
        }
    });

    // Data Listener
    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        // Auto-Reset Lock if question changed
        const qID = data.question + data.timestamp;
        if(window.lastQ !== qID) {
            window.lastQ = qID;
            localStorage.setItem('locked', 'false');
            document.getElementById('lock-msg').style.display = 'none';
        }

        document.getElementById('q-text').innerText = data.question;
        document.getElementById('live-score').innerText = data.matchScore || "0/0";
        document.getElementById('batting-team').innerText = data.battingTeam || "LIVE";

        const box = document.getElementById('options-box');
        box.innerHTML = "";
        if(data.options) {
            data.options.forEach(o => {
                const b = document.createElement('button');
                b.className = "opt-btn";
                b.innerText = o;
                b.onclick = () => {
                    if(localStorage.getItem('locked') === 'true') return;
                    document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
                    b.classList.add('selected');
                    window.pick = o;
                    document.getElementById('lock-btn').style.display = "block";
                };
                box.appendChild(b);
            });
        }
    });

    let tokens = parseInt(localStorage.getItem('tks')) || 0;
    document.getElementById('bal-text').innerText = tokens;

    function confirmBet() {
        if(tokens < 10) return alert("No tokens!");
        tokens -= 10;
        updateUI();
        localStorage.setItem('locked', 'true');
        document.getElementById('lock-btn').style.display = "none";
        document.getElementById('lock-msg').innerText = "LOCKED: " + window.pick;
        document.getElementById('lock-msg').style.display = "block";
    }

    function addTokens() { tokens += 150; updateUI(); }
    function updateUI() { 
        document.getElementById('bal-text').innerText = tokens; 
        localStorage.setItem('tks', tokens); 
    }
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }
</script>
</body>
</html>
