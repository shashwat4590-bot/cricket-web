<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Predictor</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); letter-spacing: 1px; }

        #scoreDisplay {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        /* Match Banner */
        .match-banner {
            margin: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .team img { width: 50px; height: 50px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .vs { font-weight: 900; opacity: 0.3; font-style: italic; }

        /* Prediction Card */
        .prediction-card {
            margin: 0 20px;
            padding: 25px;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        #question {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            min-height: 60px;
        }

        /* Timer Section */
        .timer-box { margin-bottom: 25px; }
        .timer-info { display: flex; justify-content: space-between; font-size: 0.7rem; color: #94a3b8; font-weight: 700; margin-bottom: 8px; }
        .bar-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s linear; }

        /* Buttons */
        .btn-group { display: flex; gap: 12px; }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-yes { background: var(--success); color: #052e16; }
        .btn-no { background: var(--error); color: white; }
        .btn:disabled { cursor: not-allowed; }

        /* Status Animations */
        .locked-in { outline: 3px solid white; outline-offset: 2px; }
        .correct { background: var(--success) !important; color: white !important; opacity: 1 !important; transform: scale(1.05); }
        .wrong { background: #334155 !important; opacity: 0.3 !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">LIVEPREDICT</div>
        <div id="scoreDisplay">0 PTS</div>
    </header>

    <div class="match-banner">
        <div class="team"><img src="https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg"></div>
        <div class="vs">VS</div>
        <div class="team"><img src="https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg"></div>
    </div>

    <div class="prediction-card">
        <div id="question">Connecting to Match...</div>
        
        <div class="timer-box">
            <div class="timer-info">
                <span>VOTING STATUS</span>
                <span id="timerText">--</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="timerFill"></div></div>
        </div>

        <div class="btn-group">
            <button id="yesBtn" class="btn btn-yes" onclick="answer('YES')">Yes</button>
            <button id="noBtn" class="btn btn-no" onclick="answer('NO')">No</button>
        </div>
    </div>

    <footer style="margin-top:auto; padding:30px; text-align:center; font-size:0.7rem; color:#475569;">
        SYNCED WITH LIVE BROADCAST
    </footer>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "PASTE_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questionRef = db.ref("currentQuestion");

    // --- GAME STATE ---
    let userScore = parseInt(localStorage.getItem("cricketScore")) || 0;
    let hasVoted = false;
    let selectedChoice = null;
    let timerInterval;

    document.getElementById("scoreDisplay").innerText = userScore + " PTS";

    // --- THE MASTER LISTENER (No Refresh Needed) ---
    questionRef.on("value", (snapshot) => {
        const data = snapshot.val();
        
        // 1. If Board is Cleared by Host
        if (!data) {
            document.getElementById("question").innerText = "Waiting for next ball...";
            document.getElementById("timerText").innerText = "STAY TUNED";
            document.getElementById("timerFill").style.width = "0%";
            disableButtons();
            return;
        }

        // 2. NEW QUESTION DETECTED (result is null)
        if (data.result === null) {
            // Hard Reset Local Variables
            hasVoted = false;
            selectedChoice = null;
            
            // UI Reset
            document.getElementById("question").innerText = data.question;
            resetButtonsUI();

            if (data.status === "open") {
                startTimer(data.endTime);
            } else {
                disableButtons();
                document.getElementById("timerText").innerText = "LOCKED";
            }
        } 
        
        // 3. RESULT DETECTED (result is YES/NO)
        else {
            processResult(data.result);
        }
    });

    function startTimer(endTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const diff = endTime - Date.now();
            const seconds = Math.max(0, Math.floor(diff / 1000));
            
            document.getElementById("timerText").innerText = seconds + "s REMAINING";
            document.getElementById("timerFill").style.width = (seconds * 10) + "%";

            if (seconds <= 0) {
                clearInterval(timerInterval);
                disableButtons();
                document.getElementById("timerText").innerText = "TIME'S UP";
            }
        }, 1000);
    }

    function answer(choice) {
        if (hasVoted) return;
        hasVoted = true;
        selectedChoice = choice;
        
        if (navigator.vibrate) navigator.vibrate(50);
        
        const btn = choice === 'YES' ? document.getElementById("yesBtn") : document.getElementById("noBtn");
        const other = choice === 'YES' ? document.getElementById("noBtn") : document.getElementById("yesBtn");
        
        btn.classList.add("locked-in");
        other.style.opacity = "0.2";
        disableButtons();
    }

    function processResult(correct) {
        clearInterval(timerInterval);
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");

        if (correct === "YES") {
            yesBtn.classList.add("correct");
            noBtn.classList.add("wrong");
        } else {
            noBtn.classList.add("correct");
            yesBtn.classList.add("wrong");
        }

        // Scoring Logic
        if (selectedChoice === correct) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            userScore += 100;
            localStorage.setItem("cricketScore", userScore);
            document.getElementById("scoreDisplay").innerText = userScore + " PTS";
            selectedChoice = "PROCESSED"; // Prevent double scoring
        }
    }

    function disableButtons() {
        document.getElementById("yesBtn").disabled = true;
        document.getElementById("noBtn").disabled = true;
    }

    function resetButtonsUI() {
        const btns = [document.getElementById("yesBtn"), document.getElementById("noBtn")];
        btns.forEach(b => {
            b.disabled = false;
            b.classList.remove("correct", "wrong", "locked-in");
            b.style.opacity = "1";
        });
    }
</script>

</body>
</html>
