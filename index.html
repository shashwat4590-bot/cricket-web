<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Predictor</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            color: var(--accent-primary);
        }

        #scoreDisplay {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-primary);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        /* Match Banner */
        .match-card {
            margin: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .team-box { text-align: center; }
        .team-box img { width: 55px; height: 55px; margin-bottom: 8px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .team-box span { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }
        .vs-badge { font-weight: 900; font-style: italic; color: var(--text-dim); opacity: 0.5; }

        /* Prediction Card */
        .prediction-area {
            margin: 0 20px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #question {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 20px;
            text-align: center;
            min-height: 60px;
        }

        .timer-container { margin-bottom: 25px; }
        .timer-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-weight: 600;
        }
        
        .progress-bg {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            width: 0%;
            transition: width 0.5s linear;
        }

        /* Action Buttons */
        .btn-group { display: flex; gap: 12px; }
        
        .predict-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yes { background: var(--accent-success); color: #052e16; }
        .btn-no { background: var(--accent-error); color: #ffffff; }

        .predict-btn:disabled { cursor: not-allowed; opacity: 0.3; }

        /* Status States */
        .locked-in {
            outline: 3px solid white;
            outline-offset: 2px;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .correct { 
            background: var(--accent-success) !important; 
            color: white !important;
            opacity: 1 !important;
            animation: pulse 1s infinite;
        }
        
        .wrong { 
            background: #334155 !important; 
            opacity: 0.2 !important; 
            color: #94a3b8 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">LIVEPREDICT</div>
        <div id="scoreDisplay">0 PTS</div>
    </header>

    <div class="match-card">
        <div class="team-box">
            <img src="https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg" alt="CSK">
            <span>CSK</span>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-box">
            <img src="https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg" alt="MI">
            <span>MI</span>
        </div>
    </div>

    <div class="prediction-area">
        <div id="question">Connecting to live feed...</div>
        
        <div class="timer-container">
            <div class="timer-label">
                <span>TIME REMAINING</span>
                <span id="timerText">0s</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" id="timerFill"></div>
            </div>
        </div>

        <div class="btn-group">
            <button id="yesBtn" class="predict-btn btn-yes" onclick="answer('YES')">Yes</button>
            <button id="noBtn" class="predict-btn btn-no" onclick="answer('NO')">No</button>
        </div>
    </div>

    <footer>
        POWERED BY REAL-TIME DATA
    </footer>
</div>

<script>
    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "PASTE_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questionRef = db.ref("currentQuestion");

    // --- APP STATE ---
    let userScore = parseInt(localStorage.getItem("cricketScore")) || 0;
    let hasVoted = false;
    let selectedChoice = null;
    let timerInterval;

    // Initialize UI
    document.getElementById("scoreDisplay").innerText = userScore + " PTS";

  questionRef.on("value", (snapshot) => {
    const data = snapshot.val();
    
    // 1. If host cleared the board
    if (!data) {
        showWaitingScreen();
        return;
    }

    // 2. DETECT NEW QUESTION: If result is null, it's a new round.
    if (data.result === null) {
        // Force reset the player's local state
        hasVoted = false; 
        selectedChoice = null;
        
        // Reset the UI immediately
        resetButtonsUI(); 
        document.getElementById("question").innerText = data.question;

        if (data.status === "open") {
            startTimer(data.endTime);
        } else if (data.status === "locked") {
            lockButtons();
            document.getElementById("timerText").innerText = "LOCKED";
        }
    } 
    
    // 3. IF RESULT ARRIVES
    else if (data.result !== null) {
        handleResult(data.result);
    }
});

// New Helper Function
function showWaitingScreen() {
    clearInterval(timerInterval);
    document.getElementById("question").innerText = "Waiting for next ball...";
    document.getElementById("timerText").innerText = "STAY TUNED";
    document.getElementById("timerFill").style.width = "0%";
    lockButtons(); // Stop them from clicking old buttons
    
    // Optional: Reset button colors to default
    const btns = [document.getElementById("yesBtn"), document.getElementById("noBtn")];
    btns.forEach(b => {
        b.classList.remove("correct", "wrong", "locked-in");
        b.style.opacity = "0.5";
    });
}

    function startTimer(endTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = Date.now();
            const diff = endTime - now;
            const seconds = Math.max(0, Math.floor(diff / 1000));
            
            document.getElementById("timerText").innerText = seconds + "s";
            document.getElementById("timerFill").style.width = (seconds * 10) + "%";

            if (seconds <= 0) {
                clearInterval(timerInterval);
                lockButtons();
            }
        }, 1000);
    }

    function answer(choice) {
        if (hasVoted) return;
        if (navigator.vibrate) navigator.vibrate(50);
        
        hasVoted = true;
        selectedChoice = choice;
        
        const btn = choice === 'YES' ? document.getElementById("yesBtn") : document.getElementById("noBtn");
        const other = choice === 'YES' ? document.getElementById("noBtn") : document.getElementById("yesBtn");
        
        btn.classList.add("locked-in");
        other.style.opacity = "0.2";
        lockButtons();
    }

    function handleResult(correct) {
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        clearInterval(timerInterval);

        if (correct === "YES") {
            yesBtn.classList.add("correct");
            noBtn.classList.add("wrong");
        } else {
            noBtn.classList.add("correct");
            yesBtn.classList.add("wrong");
        }

        // Win logic
        if (selectedChoice === correct) {
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#38bdf8', '#22c55e', '#ffffff']
            });
            userScore += 100;
            localStorage.setItem("cricketScore", userScore);
            document.getElementById("scoreDisplay").innerText = userScore + " PTS";
            selectedChoice = "PROCESSED"; // Prevent multiple scoring
        }
        lockButtons();
    }

    function lockButtons() {
        document.getElementById("yesBtn").disabled = true;
        document.getElementById("noBtn").disabled = true;
    }

    function resetButtonsUI() {
        hasVoted = false;
        selectedChoice = null;
        const btns = [document.getElementById("yesBtn"), document.getElementById("noBtn")];
        btns.forEach(b => {
            b.disabled = false;
            b.classList.remove("correct", "wrong", "locked-in");
            b.style.opacity = "1";
        });
    }
</script>

</body>
</html>
