<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Predictor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #22c55e; --error: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; padding-top: 50px; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        #scoreDisplay { color: var(--primary); font-weight: bold; margin-bottom: 20px; display: block; }
        #question { font-size: 1.4rem; margin-bottom: 20px; min-height: 50px; font-weight: 600; }
        .timer-bar { height: 8px; background: #0f172a; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timerFill { height: 100%; background: var(--primary); width: 0%; transition: width 1s linear; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .yes { background: var(--success); color: #064e3b; }
        .no { background: var(--error); color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .correct { background: var(--success) !important; color: white !important; transform: scale(1.05); }
        .wrong { background: #334155 !important; opacity: 0.2 !important; }
    </style>
</head>
<body>

<div class="container">
    <span id="scoreDisplay">Points: 0</span>
    <div id="question">Waiting for host...</div>
    <div class="timer-bar"><div id="timerFill"></div></div>
    <div class="btn-group">
        <button id="yesBtn" class="yes" onclick="answer('YES')">YES</button>
        <button id="noBtn" class="no" onclick="answer('NO')">NO</button>
    </div>
</div>

<script>
    // 1. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "PASTE_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    let score = parseInt(localStorage.getItem("c_score")) || 0;
    let myChoice = null;
    let timer;

    document.getElementById("scoreDisplay").innerText = "Points: " + score;

    // 2. THE LISTENER
    qRef.on("value", (snap) => {
        const val = snap.val();
        if (!val) {
            document.getElementById("question").innerText = "Match Paused";
            return;
        }

        // SHOW QUESTION ALWAYS
        document.getElementById("question").innerText = val.question;

        // If a new question starts (no result yet)
        if (!val.result) {
            myChoice = null;
            resetUI();
            
            if (val.status === "open") {
                startTimer(val.endTime);
            } else {
                disableAll();
            }
        } 
        // If result is pushed
        else {
            showResult(val.result);
        }
    });

    function startTimer(endTime) {
        clearInterval(timer);
        timer = setInterval(() => {
            const remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
            document.getElementById("timerFill").style.width = (remaining * 10) + "%";
            if (remaining <= 0) {
                clearInterval(timer);
                disableAll();
            }
        }, 1000);
    }

    function answer(choice) {
        if (myChoice) return;
        myChoice = choice;
        disableAll();
        document.getElementById(choice === 'YES' ? 'yesBtn' : 'noBtn').style.border = "3px solid white";
    }

    function showResult(correct) {
        clearInterval(timer);
        disableAll();
        const y = document.getElementById("yesBtn");
        const n = document.getElementById("noBtn");

        if (correct === "YES") { y.classList.add("correct"); n.classList.add("wrong"); }
        else { n.classList.add("correct"); y.classList.add("wrong"); }

        if (myChoice === correct) {
            confetti();
            score += 100;
            localStorage.setItem("c_score", score);
            document.getElementById("scoreDisplay").innerText = "Points: " + score;
            myChoice = "done"; // stop double points
        }
    }

    function disableAll() {
        document.getElementById("yesBtn").disabled = true;
        document.getElementById("noBtn").disabled = true;
    }

    function resetUI() {
        const y = document.getElementById("yesBtn");
        const n = document.getElementById("noBtn");
        y.disabled = false; n.disabled = false;
        y.classList.remove("correct", "wrong");
        n.classList.remove("correct", "wrong");
        y.style.border = "none"; n.style.border = "none";
    }
</script>
</body>
</html>
