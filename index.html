<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite | Triple Arena</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px); z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .token-pill {
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--gold);
            padding: 10px 20px; border-radius: 50px; font-weight: 900; color: var(--gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
        }

        .container { padding: 100px 20px 120px; max-width: 450px; margin: 0 auto; }
        .page { display: none; width: 100%; animation: slideUp 0.4s ease; }
        .page.active { display: flex; flex-direction: column; }

        /* --- CARDS --- */
        .promo-banner {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 30px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .score-box {
            background: var(--card); border-radius: 30px; padding: 30px 20px;
            text-align: center; margin-bottom: 25px; border: 1px solid #1e293b;
        }
        #live-score { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

        .q-card {
            background: var(--card); border-radius: 30px; padding: 25px 20px;
            border: 1px solid #1e293b; text-align: center; margin-bottom: 20px;
            position: relative; transition: 0.3s;
        }

        /* --- BUTTONS & STATES --- */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn {
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 20px 10px; border-radius: 18px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .opt-btn.correct { background: var(--green) !important; border-color: var(--green) !important; }
        .opt-btn.wrong { background: var(--red) !important; border-color: var(--red) !important; }

        .btn-action { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-gold { background: var(--gold); }

        /* --- ANIMATIONS --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shakeEffect 0.5s; }
        @keyframes shakeEffect { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 22px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.3rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">🪙 <span id="pill-bal">0</span></div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="promo-banner">
                <h2 style="font-weight:900;">Triple Arena</h2>
                <p style="opacity:0.9;">Predict 3 events at once!</p>
            </div>
            <div class="score-box" style="text-align: left; padding: 20px;">
                <p style="color:var(--accent); font-weight:800; font-size:0.7rem;">FEATURED MATCH</p>
                <h3 style="font-size:1.5rem; margin: 5px 0;">CSK vs MI</h3>
                <button class="btn-action" onclick="nav('arena')">JOIN ARENA</button>
            </div>
        </div>

        <div id="arena" class="page">
            </div>

        <div id="wallet" class="page">
            <div class="score-box" style="border-color: var(--gold);">
                <p style="color:#64748b;">TOTAL BALANCE</p>
                <div id="wall-bal" style="font-size:4rem; font-weight:900; color:var(--gold);">0</div>
                <button class="btn-action btn-gold" onclick="addTokens()">GET 500 TOKENS</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = parseInt(localStorage.getItem('tks')) || 100;
    const winSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/despot/paws.mp3');
    const lossSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/audiocomponents/creatures/roar.mp3');

    // --- CORE ARENA ENGINE ---
    db.ref("questions").on("value", (snap) => {
        const arenaBox = document.getElementById('arena');
        const data = snap.val();
        
        let html = `
            <div class="score-box">
                <p style="color:var(--accent); font-weight:800; font-size:0.75rem; letter-spacing:2px;">TRIPLE ARENA LIVE</p>
                <div id="live-score">${data ? Object.values(data).pop().matchScore || '0/0' : '0/0'}</div>
            </div>
        `;

        if (!data) {
            html += `<div class="q-card"><h3>Waiting for Host...</h3></div>`;
            arenaBox.innerHTML = html;
            return;
        }

        // Render up to 3 Active Questions
        Object.keys(data).reverse().slice(0,3).forEach(id => {
            const q = data[id];
            const isLocked = localStorage.getItem('lock_' + id) === 'true';
            const myPick = localStorage.getItem('pick_' + id);
            const isPaid = localStorage.getItem('paid_' + id) === 'true';
            const tempPick = localStorage.getItem('temp_' + id);

            // Handle Payouts immediately when result appears
            if (q.result && !isPaid && myPick) {
                processResult(id, q, myPick);
            }

            html += `
                <div class="q-card ${q.result && myPick && myPick !== q.result ? 'shake' : ''}">
                    <div style="position:absolute; top:15px; right:20px; color:var(--gold); font-weight:900; font-size:0.8rem;">${q.multiplier}x</div>
                    <h3 style="font-size:1.3rem; font-weight:900; margin-bottom:20px; text-align:left; padding-right:40px;">${q.question}</h3>
                    
                    <div class="opt-grid">
                        ${q.options.map(o => {
                            let cls = "";
                            if (q.result) {
                                if (o === q.result) cls = "correct";
                                else if (o === myPick) cls = "wrong";
                            } else {
                                if (o === tempPick) cls = "selected";
                            }
                            return `<button class="opt-btn ${cls}" onclick="handleSelect('${id}', '${o}')">${o}</button>`;
                        }).join('')}
                    </div>

                    ${(!isLocked && !q.result) ? `<button class="btn-action btn-gold" onclick="handleLock('${id}')">CONFIRM BET (10)</button>` : ''}
                    ${(isLocked && !q.result) ? `<div style="margin-top:15px; font-weight:900; color:var(--accent);">LOCKED: ${myPick}</div>` : ''}
                </div>
            `;
        });

        arenaBox.innerHTML = html;
        updateUI();
    });

    function handleSelect(qId, val) {
        if (localStorage.getItem('lock_' + qId) === 'true') return;
        localStorage.setItem('temp_' + qId, val);
        // Refresh UI state without reloading page
        const btns = event.target.parentElement.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('selected'));
        event.target.classList.add('selected');
        event.target.parentElement.parentElement.querySelector('.btn-gold').style.display = 'block';
    }

    function handleLock(qId) {
        const pick = localStorage.getItem('temp_' + qId);
        if (!pick) return;
        if (tokens < 10) return alert("Not enough tokens!");

        tokens -= 10;
        localStorage.setItem('lock_' + qId, 'true');
        localStorage.setItem('pick_' + qId, pick);
        updateUI();
    }

    function processResult(id, q, myPick) {
        if (myPick === q.result) {
            tokens += Math.floor(10 * q.multiplier);
            winSnd.play().catch(()=>{});
            confetti({ particleCount: 150, spread: 70 });
        } else {
            lossSnd.play().catch(()=>{});
        }
        localStorage.setItem('paid_' + id, 'true');
        updateUI();
    }

    function addTokens() { tokens += 500; updateUI(); alert("Added 500 Tokens!"); }

    function updateUI() {
        document.getElementById('pill-bal').innerText = tokens;
        document.getElementById('wall-bal').innerText = tokens;
        localStorage.setItem('tks', tokens);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
