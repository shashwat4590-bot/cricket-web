<!DOCTYPE html>
<html>
<head>

<title>Cricket Prediction Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
box-sizing:border-box;
font-family: "Segoe UI", Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Card */

.card{
width:420px;
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
text-align:center;
}

/* Title */

.title{
font-size:22px;
font-weight:600;
margin-bottom:10px;
}

/* Question */

#question{
font-size:18px;
margin-top:15px;
margin-bottom:15px;
color:#333;
}

/* Timer */

#timer{
font-size:15px;
color:#ff4d4d;
margin-bottom:20px;
font-weight:600;
}

/* Buttons */

.buttons{
display:flex;
gap:15px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

/* YES */

.yes{
background:#27ae60;
color:white;
}

.yes:hover{
background:#1e874b;
transform:scale(1.05);
}

/* NO */

.no{
background:#e74c3c;
color:white;
}

.no:hover{
background:#c0392b;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="card">

<div class="title">
🏏 Cricket Prediction Game
</div>

<div id="question">
Waiting for host question...
</div>

<div id="timer">
Time left: 10
</div>

<div class="buttons">

<button class="yes" onclick="answer('YES')">YES</button>

<button class="no" onclick="answer('NO')">NO</button>

</div>

</div>

<script>

/* Firebase config */

const firebaseConfig = {

apiKey: "PASTE_YOUR_API_KEY",

authDomain: "cricket-web-predict.firebaseapp.com",

databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",

projectId: "cricket-web-predict",

storageBucket: "cricket-web-predict.appspot.com",

messagingSenderId: "PASTE",

appId: "PASTE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const questionRef = db.ref("currentQuestion");

let timerInterval;

/* Listen for question */

questionRef.on("value", (snapshot) => {

const data = snapshot.val();

if(data){

document.getElementById("question").innerText = data.question;

startTimer(data.startTime);

}

});

/* Timer */

function startTimer(startTime){

clearInterval(timerInterval);

let duration = 10;

timerInterval = setInterval(()=>{

let elapsed = Math.floor((Date.now() - startTime)/1000);

let remaining = duration - elapsed;

if(remaining <= 0){

remaining = 0;

clearInterval(timerInterval);

}

document.getElementById("timer").innerText =
"Time left: " + remaining;

},1000);

}

/* Answer */

function answer(choice){

alert("You selected: " + choice);

}

</script>

</body>
</html>
