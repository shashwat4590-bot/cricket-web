<!DOCTYPE html>
<html>
<head>

<title>Cricket Prediction Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.app{
width:380px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:20px;
}

#question{
font-size:18px;
margin-bottom:20px;
}

.buttons{
display:flex;
justify-content:space-between;
}

button{
width:45%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.yes{
background:#4CAF50;
color:white;
}

.no{
background:#e74c3c;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

  <div id="timer">
Time left: 10
</div>
  
<div class="app">

<h2>🏏 Cricket Prediction Game</h2>

<div id="question">
Waiting for host question...
</div>

<div class="buttons">

<button class="yes" onclick="answer('YES')">YES</button>

<button class="no" onclick="answer('NO')">NO</button>

</div>

</div>

<script>

/* Firebase config (REPLACE WITH YOUR OWN) */

const firebaseConfig = {

apiKey: "PASTE_YOUR_API_KEY",

authDomain: "cricket-web-predict.firebaseapp.com",

databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",

projectId: "cricket-web-predict",

storageBucket: "cricket-web-predict.appspot.com",

messagingSenderId: "PASTE",

appId: "PASTE"

};

/* Initialize Firebase */

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* Listen for new question */

const questionRef = db.ref("currentQuestion");

questionRef.on("value", (snapshot) => {

const data = snapshot.val();

if(data){

document.getElementById("question").innerText = data.question;

}

});

/* Player answer */

function answer(choice){

alert("You selected: " + choice);

}

</script>

</body>
</html>
