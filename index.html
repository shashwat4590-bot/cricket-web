<!DOCTYPE html>
<html>
<head>
    <title>Cricket Prediction - Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,Arial;}
        body{background:#0e1117;display:flex;justify-content:center;color:white;}
        .app{width:420px;min-height:100vh;background:#0e1117;}
        .header{padding:16px;font-size:18px;font-weight:600;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
        #scoreDisplay{color:#2ed573;background:#1a212a;padding:4px 12px;border-radius:20px;font-size:14px;}
        .match-header{display:flex;justify-content:center;align-items:center;gap:20px;padding:20px;}
        .team{width:45px;}
        .vs{font-size:14px;opacity:0.7;}
        .card{background:#151a22;margin:15px;padding:22px;border-radius:12px;border:1px solid #222;}
        #question{font-size:20px;margin-bottom:15px;min-height:50px;}
        .timer{font-size:13px;color:#ff4757;margin-bottom:10px;}
        .timer-bar{height:6px;background:#333;border-radius:5px;margin-bottom:18px;overflow:hidden;}
        .timer-fill{height:100%;background:#ff4757;width:0%;transition:width 0.5s linear;}
        .buttons{display:flex;gap:12px;}
        button{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:0.3s;}
        .yes{background:#2ed573;color:black;}
        .no{background:#ff4757;color:white;}
        .correct{background:#2ed573 !important;color:black !important;transform: scale(1.05);opacity: 1 !important;}
        .wrong{background:#333 !important;opacity:0.4 !important;color: #777 !important;}
        .locked-in{border: 3px solid white !important;}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <span>🏏 Prediction</span>
        <span id="scoreDisplay">Points: 0</span>
    </div>
    <div class="match-header">
        <img src="https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg" class="team">
        <div class="vs">VS</div>
        <img src="https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg" class="team">
    </div>
    <div class="card">
        <div id="question">Waiting for host...</div>
        <div class="timer" id="timer">Ready</div>
        <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
        <div class="buttons">
            <button id="yesBtn" class="yes" onclick="answer('YES')">YES</button>
            <button id="noBtn" class="no" onclick="answer('NO')">NO</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "PASTE_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questionRef = db.ref("currentQuestion");

    let userScore = parseInt(localStorage.getItem("cricketScore")) || 0;
    let hasVoted = false;
    let selectedChoice = null;
    let timerInterval;

    document.getElementById("scoreDisplay").innerText = "Points: " + userScore;

    questionRef.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // 1. IF NEW QUESTION PUSHED (Result is null)
        if (data.status === "open" && data.result === null) {
            document.getElementById("question").innerText = data.question;
            enableButtons(); 
            startTimer(data.endTime);
        }

        // 2. IF MANUALLY LOCKED
        if (data.status === "locked" && data.result === null) {
            disableButtons();
            document.getElementById("timer").innerText = "Bets Locked!";
        }

        // 3. IF RESULT REVEALED
        if (data.result !== null) {
            revealResult(data.result);
        }
    });

    function startTimer(endTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = Date.now();
            const diff = endTime - now;
            const seconds = Math.max(0, Math.floor(diff / 1000));
            document.getElementById("timer").innerText = "Time left: " + seconds + "s";
            document.getElementById("timerFill").style.width = (seconds * 10) + "%";
            if (seconds <= 0) {
                clearInterval(timerInterval);
                disableButtons();
            }
        }, 1000);
    }

    function answer(choice) {
        if (hasVoted) return;
        if (navigator.vibrate) navigator.vibrate(50);
        
        hasVoted = true;
        selectedChoice = choice;
        
        const btn = choice === 'YES' ? document.getElementById("yesBtn") : document.getElementById("noBtn");
        const other = choice === 'YES' ? document.getElementById("noBtn") : document.getElementById("yesBtn");
        
        btn.classList.add("locked-in");
        other.style.opacity = "0.3";
        disableButtons();
    }

    function revealResult(correct) {
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");

        if (correct === "YES") {
            yesBtn.classList.add("correct");
            noBtn.classList.add("wrong");
        } else {
            noBtn.classList.add("correct");
            yesBtn.classList.add("wrong");
        }

        // Only add points if player hasn't been rewarded yet for THIS question
        if (selectedChoice === correct) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            userScore += 100;
            localStorage.setItem("cricketScore", userScore);
            document.getElementById("scoreDisplay").innerText = "Points: " + userScore;
            selectedChoice = null; // Reset choice so they don't get points twice
        }
    }

    function disableButtons() {
        document.querySelectorAll("button").forEach(b => b.disabled = true);
    }

    function enableButtons() {
        hasVoted = false;
        selectedChoice = null;
        const buttons = document.querySelectorAll("button");
        buttons.forEach(b => {
            b.disabled = false;
            b.classList.remove("correct", "wrong", "locked-in");
            b.style.opacity = "1";
        });
    }
</script>
</body>
</html>
