<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --bg: #020617; --accent: #38bdf8; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }

        .app-shell { width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .page { display: none; padding: 20px; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #0f172a; display: flex; justify-content: space-around; padding: 20px; border-top: 2px solid #1e293b; z-index: 999; }
        .nav-btn { color: #64748b; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .nav-btn.active { color: var(--accent); }

        /* UI Elements */
        .card { background: #0f172a; border-radius: 30px; padding: 30px; width: 100%; border: 1px solid #1e293b; margin-top: 20px; text-align: center; }
        
        /* CSS LOGOS (Will never fail to load) */
        .logo-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: black; }
        .csk-color { background: #F9CD05; } /* Yellow */
        .mi-color { background: #004BA0; color: white; } /* Blue */

        .score-val { font-size: 3rem; font-weight: 900; color: white; margin: 10px 0; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
        .opt-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 20px; border-radius: 15px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        
        .main-btn { background: var(--accent); color: #082f49; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="home" class="page active">
        <h1 style="font-size: 2.5rem; color: var(--accent); margin-top: 20px;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="card">
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <div class="logo-circle csk-color">CSK</div>
                <div style="font-weight:900; opacity:0.3;">VS</div>
                <div class="logo-circle mi-color">MI</div>
            </div>
            <h2 style="margin-top:20px;">IPL FINALS 2026</h2>
            <button class="main-btn" onclick="nav('arena')">JOIN ARENA</button>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="card">
            <p style="color:var(--accent); font-weight:800; font-size:0.8rem;">MATCH SCORE</p>
            <div id="batTeam" style="font-weight:800;">LOADING DATA...</div>
            <div id="liveScore" class="score-val">0/0</div>
        </div>

        <div class="card">
            <div id="qText" style="font-size:1.5rem; font-weight:700;">Connecting to Firebase...</div>
            <div id="optGrid" class="opt-grid"></div>
            <button id="lockBtn" class="main-btn" style="display:none;" onclick="confirmBet()">LOCK BET (10 Tokens)</button>
            <p id="lockStatus" style="display:none; margin-top:15px; font-weight:900; color:var(--accent);"></p>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="card">
            <p style="font-weight:800; color:#64748b;">TOTAL TOKENS</p>
            <div id="tokenText" style="font-size:3.5rem; font-weight:900; color:var(--gold);">0</div>
            <input type="number" id="cashIn" placeholder="Enter Amount (₹)" style="width:100%; padding:15px; border-radius:10px; border:none; margin-top:20px; text-align:center;">
            <button class="main-btn" style="background:var(--gold);" onclick="buyTokens()">BUY TOKENS</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-btn" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-btn" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </div>
</div>

<script>
    // 1. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com", // Ensure this ends correctly
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ECONOMY
    let tokens = parseInt(localStorage.getItem("tks")) || 0;
    let myChoice = null;
    let currentID = "";

    function updateBal() {
        document.getElementById('tokenText').innerText = tokens;
        localStorage.setItem("tks", tokens);
    }
    updateBal();

    function buyTokens() {
        const val = parseInt(document.getElementById('cashIn').value);
        if(val >= 50) { tokens += (val*3); updateBal(); alert("Success!"); }
        else { alert("Min ₹50"); }
    }

    // 3. NAVIGATION
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    // 4. THE LIVE LISTENER (FIXED)
    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        console.log("Data received:", data); // Check your browser console!

        if(!data) {
            document.getElementById('qText').innerText = "Host hasn't posted a question yet.";
            return;
        }

        // Detect Question Change
        const questionKey = data.question + data.status;
        if(currentID !== questionKey) {
            currentID = questionKey;
            resetState();
        }

        document.getElementById('liveScore').innerText = data.matchScore || "0/0";
        document.getElementById('batTeam').innerText = data.battingTeam || "LIVE";
        document.getElementById('qText').innerText = data.question;

        if(!data.result) {
            const grid = document.getElementById('optGrid');
            grid.innerHTML = "";
            (data.options || []).forEach(opt => {
                if(opt === "DRAW") return;
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                if(myChoice === opt) btn.classList.add('selected');
                btn.innerText = opt;
                btn.onclick = () => {
                    if(localStorage.getItem("isLocked") === "true") return;
                    myChoice = opt;
                    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    document.getElementById('lockBtn').style.display = "block";
                };
                grid.appendChild(btn);
            });
        } else {
            // SHOW RESULT LOGIC
            document.getElementById('lockBtn').style.display = "none";
            // [Insert result display logic here similar to previous steps]
        }
    });

    function confirmBet() {
        if(tokens < 10) return alert("Low Tokens");
        tokens -= 10;
        updateBal();
        localStorage.setItem("isLocked", "true");
        localStorage.setItem("myChoice", myChoice);
        document.getElementById('lockBtn').style.display = "none";
        document.getElementById('lockStatus').innerText = "LOCKED: " + myChoice;
        document.getElementById('lockStatus').style.display = "block";
    }

    function resetState() {
        myChoice = null;
        localStorage.setItem("isLocked", "false");
        document.getElementById('lockStatus').style.display = "none";
        document.getElementById('lockBtn').style.display = "none";
    }
</script>
</body>
</html>
