<!DOCTYPE html>
<html>
<head>

<title>Cricket Prediction</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui,Arial;
}

body{
background:#0e1117;
color:white;
display:flex;
justify-content:center;
}

/* APP */

.app{
width:420px;
min-height:100vh;
background:#0e1117;
}

/* HEADER */

.header{
padding:15px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #222;
}

/* MATCH BAR */

.match{
padding:15px;
background:#151a22;
display:flex;
justify-content:space-between;
font-size:14px;
border-bottom:1px solid #222;
}

/* CARD */

.card{
background:#151a22;
margin:15px;
padding:20px;
border-radius:12px;
}

/* QUESTION */

#question{
font-size:18px;
margin-bottom:15px;
}

/* TIMER */

.timer{
font-size:13px;
color:#ff4757;
margin-bottom:15px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.yes{
background:#2ed573;
color:black;
}

.no{
background:#ff4757;
color:white;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
width:420px;
background:#151a22;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #222;
}

.nav div{
font-size:12px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
🏏 Cricket Prediction
</div>

<div class="match">
<div>CSK vs MI</div>
<div>Live</div>
</div>

<div class="card">

<div id="question">
Waiting for host question...
</div>

<div class="timer" id="timer">
Time left: 10
</div>

<div class="buttons">

<button class="yes" onclick="answer('YES')">
YES
</button>

<button class="no" onclick="answer('NO')">
NO
</button>

</div>

</div>

</div>

<div class="nav">
<div>Home</div>
<div>Matches</div>
<div>Leaderboard</div>
<div>Profile</div>
</div>

<script>

/* Firebase config */

const firebaseConfig = {

apiKey:"PASTE_API_KEY",
authDomain:"cricket-web-predict.firebaseapp.com",
databaseURL:"https://cricket-web-predict-default-rtdb.firebaseio.com",
projectId:"cricket-web-predict",
storageBucket:"cricket-web-predict.appspot.com",
messagingSenderId:"PASTE",
appId:"PASTE"

};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const questionRef=db.ref("currentQuestion");

let timerInterval;

questionRef.on("value",(snapshot)=>{

const data=snapshot.val();

if(data){

document.getElementById("question").innerText=data.question;

startTimer(data.startTime);

}

});

function startTimer(startTime){

clearInterval(timerInterval);

let duration=10;

timerInterval=setInterval(()=>{

let elapsed=Math.floor((Date.now()-startTime)/1000);

let remaining=duration-elapsed;

if(remaining<=0){

remaining=0;
clearInterval(timerInterval);

}

document.getElementById("timer").innerText="Time left: "+remaining;

},1000);

}

function answer(choice){

alert("You chose: "+choice);

}

</script>

</body>
</html>
