<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite | Official Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e;
        }
        <h2 id="balance">Balance: ₹0</h2>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- HEADER --- */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px); z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .token-pill {
            background: rgba(15, 23, 42, 0.9); border: 1.5px solid var(--gold);
            padding: 10px 20px; border-radius: 50px; font-weight: 900; color: var(--gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .container { padding: 100px 20px 140px; max-width: 480px; margin: 0 auto; }
        .page { display: none; width: 100%; animation: slideUp 0.4s ease forwards; }
        .page.active { display: flex; flex-direction: column; }

        /* --- HOME: BANNER & LEADERBOARD --- */
        .promo-banner {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 30px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .section-title { font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; color: #64748b; margin-bottom: 15px; text-transform: uppercase; }
        
        .mini-leaderboard { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* --- ARENA: CARDS & BUTTONS --- */
        .q-card {
            background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
            border-radius: 32px; padding: 25px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .opt-btn {
            background: rgba(255,255,255,0.03); border: 2px solid #334155; color: white;
            padding: 20px 10px; border-radius: 18px; font-weight: 700; cursor: pointer;
            transition: 0.2s;
        }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.15); border-width: 3px; }
        .opt-btn.correct { background: var(--green) !important; border-color: var(--green) !important; }
        .opt-btn.wrong { background: var(--red) !important; border-color: var(--red) !important; opacity: 0.6; }
        <button onclick="logout()">Logout</button>

        /* --- STAKE PANEL --- */
        .stake-panel { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-top: 15px; }
        .stake-slider { width: 100%; accent-color: var(--gold); margin: 15px 0; cursor: pointer; }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; font-size: 1.1rem; }
        .btn-gold { background: var(--gold); }
        .locked-msg { text-align:center; padding:18px; background:rgba(255,255,255,0.05); border-radius:20px; color:var(--accent); font-weight:900; letter-spacing:1px; border: 1px dashed var(--accent); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shakeEffect 0.5s; }
        @keyframes shakeEffect { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.4rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">🪙 <span id="pill-bal">0</span></div>
    </header>
    <h3>Transaction History</h3>

<div id="transactions"></div>

    <div class="container">
        <div id="home" class="page active">
            <div class="promo-banner">
                <h2 style="font-weight:900; font-size:1.8rem;">CSK vs MI</h2>
                <p style="font-weight:600; opacity:0.9;">IPL 2026 Grand Finale</p>
                <button class="btn-main" style="margin-top:20px; background:white;" onclick="nav('arena')">ENTER ARENA</button>
            </div>

            <p class="section-title">Global Leaderboard</p>
            <div class="mini-leaderboard">
                <div class="rank-item"><span>🥇 <b>Aryan_Kings</b></span><span style="color:var(--gold); font-weight:900;">14,250</span></div>
                <div class="rank-item"><span>🥈 <b>CricketGod_99</b></span><span style="color:var(--gold); font-weight:900;">9,800</span></div>
                <div class="rank-item"><span>🥉 <b>SkyWalker_7</b></span><span style="color:var(--gold); font-weight:900;">7,420</span></div>
            </div>
        </div>

        <div id="arena" class="page">
            <div id="questions-list"></div>
        </div>

        <div id="wallet" class="page">
            <div class="q-card" style="text-align:center;">
                <p class="section-title">Your Balance</p>
                <h1 id="wall-bal" style="font-size:4rem; color:var(--gold); font-weight:900; margin-bottom:20px;">0</h1>
                <div style="margin-top:20px">

<input id="amount" placeholder="Enter amount" type="number">

<button onclick="addMoney()">Add Money</button>

</div>
                <div class="stake-panel">
                    <p style="font-size:0.8rem;">Min. Recharge: 50₹ (1₹ = 2 Tokens)</p>
                    <input type="number" id="buy-amt" placeholder="Enter Amount (Min 50)" style="width:100%; background:var(--bg); border:1px solid #334155; padding:18px; border-radius:15px; color:white; margin:15px 0; text-align:center; font-size:1.2rem;">
                    <button class="btn-main btn-gold" onclick="buyTokens()">BUY TOKENS</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    const { data: { session } } = await supabaseClient.auth.getSession();

if (!session) {
    window.location.href = "login.html";
}
    const supabaseClient = supabase.createClient(
  "https://rogxkddufkmjexekwzzr.supabase.co",
  "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt"
);
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = parseInt(localStorage.getItem('tks')) || 500;
    const winSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/despot/paws.mp3');
    const lossSnd = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/audiocomponents/creatures/roar.mp3');

    function renderArena() {
        db.ref("questions").once("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val();
            list.innerHTML = "";
            if(!data) { list.innerHTML = "<div class='q-card'><h3>Waiting for match data...</h3></div>"; return; }

            Object.keys(data).reverse().slice(0,3).forEach(id => {
                const q = data[id];
                const isLocked = localStorage.getItem('lock_'+id) === 'true';
                const myPick = localStorage.getItem('pick_'+id);
                const myStake = parseInt(localStorage.getItem('stake_'+id)) || 10;
                const isPaid = localStorage.getItem('paid_'+id) === 'true';
                const currentTmp = localStorage.getItem('temp_sel_'+id);

                // --- PAYOUT LOGIC (STRICT) ---
                if(q.result && !isPaid && myPick) {
                    if(myPick === q.result) {
                        tokens += Math.floor(myStake * q.multiplier);
                        winSnd.play().catch(()=>{});
                        confetti({ particleCount: 150, spread: 70 });
                    } else {
                        lossSnd.play().catch(()=>{});
                    }
                    localStorage.setItem('paid_'+id, 'true');
                    updateUI();
                }

                let card = `<div class="q-card ${q.result && myPick !== q.result ? 'shake' : ''}">
                    <div style="display:flex; justify-content:space-between; font-weight:900; color:var(--gold); font-size:0.75rem;">
                        <span>PAYOUT: ${q.multiplier}x</span>
                        <span style="color:#64748b;">${q.matchScore || ''}</span>
                    </div>
                    <h2 style="margin-top:10px; font-weight:900; font-size:1.4rem;">${q.question}</h2>
                    <div class="opt-grid">
                        ${q.options.map(o => {
                            let cls = "";
                            if(q.result) {
                                if(o === q.result) cls="correct";
                                else if(o === myPick) cls="wrong";
                            } else if(o === currentTmp) cls="selected";
                            return `<button class="opt-btn ${cls}" onclick="selectOption('${id}','${o}')">${o}</button>`;
                        }).join('')}
                    </div>`;

                if(!isLocked && !q.result) {
                    card += `<div id="panel-${id}" class="stake-panel">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:800;">
                            <span>STAKE AMOUNT</span>
                            <span style="color:var(--gold);" id="disp-${id}">10 Tokens</span>
                        </div>
                        <input type="range" class="stake-slider" min="10" max="50" step="10" value="10" oninput="updateStakeDisp('${id}', this.value)">
                        <button class="btn-main" onclick="confirmBet('${id}')">PLACE BET</button>
                    </div>`;
                } else {
                    card += `<div class="locked-msg">${q.result ? (myPick === q.result ? 'WINNER!' : 'BET LOST') : 'BET LOCKED: ' + myPick}</div>`;
                }
                card += `</div>`;
                list.innerHTML += card;
            });
            updateUI();
        });
    }

    // Real-time listener
    db.ref("questions").on("value", renderArena);

    function selectOption(qId, val) {
        if(localStorage.getItem('lock_'+qId) === 'true') return;
        localStorage.setItem('temp_sel_'+qId, val);
        renderArena(); // Instant UI refresh
    }

    function updateStakeDisp(id, val) {
        document.getElementById('disp-'+id).innerText = val + " Tokens";
        localStorage.setItem('temp_stake_'+id, val);
    }

    function confirmBet(qId) {
        const pick = localStorage.getItem('temp_sel_'+qId);
        const stake = parseInt(localStorage.getItem('temp_stake_'+qId)) || 10;
        
        if(!pick) return alert("Select an option first!");
        if(tokens < stake) return alert("Insufficient balance!");

        // Deduct Tokens
        tokens -= stake;
        
        // Save State
        localStorage.setItem('lock_'+qId, 'true');
        localStorage.setItem('pick_'+qId, pick);
        localStorage.setItem('stake_'+qId, stake);
        
        // INSTANT UI FEEDBACK (No Refresh needed)
        const panel = document.getElementById('panel-'+qId);
        if(panel) panel.outerHTML = `<div class="locked-msg">BET LOCKED: ${pick}</div>`;
        
        updateUI();
    }

    async function buyTokens(){

const inr = parseInt(document.getElementById('buy-amt').value);

if(inr < 50){
alert("Minimum recharge is 50₹!");
return;
}

const tokensToAdd = inr * 2;

const { data: { user } } = await supabaseClient.auth.getUser();

const { data } = await supabaseClient
.from("wallets")
.select("balance")
.eq("user_id", user.id)
.single();

const newBalance = data.balance + tokensToAdd;

await supabaseClient
.from("wallets")
.update({ balance: newBalance })
.eq("user_id", user.id);

await supabaseClient
.from("transactions")
.insert([
{
user_id: user.id,
amount: tokensToAdd,
type: "token_purchase"
}
]);

alert("Recharged " + tokensToAdd + " Tokens!");

loadBalance();
loadTransactions();

}
    }

    function updateUI() {
        document.getElementById('pill-bal').innerText = tokens.toLocaleString();
        document.getElementById('wall-bal').innerText = tokens.toLocaleString();
        localStorage.setItem('tks', tokens);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }
    updateUI();
async function loadBalance(){

const { data: { user } } = await supabaseClient.auth.getUser();

if(!user){
window.location.href = "login.html";
return;
}

const { data, error } = await supabaseClient
.from("wallets")
.select("balance")
.eq("user_id", user.id)
.single();

if(data){
document.getElementById("balance").innerText =
"Balance: ₹" + data.balance;
}

}

loadBalance();
    
async function logout(){
await supabaseClient.auth.signOut();
window.location.href = "login.html";
}
    async function addMoney(){

const amount = document.getElementById("amount").value;

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

const { data: { user } } = await supabaseClient.auth.getUser();

const { data } = await supabaseClient
.from("wallets")
.select("balance")
.eq("user_id", user.id)
.single();

const newBalance = data.balance + parseInt(amount);

await supabaseClient
.from("wallets")
.update({ balance: newBalance })
.eq("user_id", user.id);

alert("Money added successfully");

loadBalance();
async function loadTransactions(){

const { data: { user } } = await supabaseClient.auth.getUser();

const { data } = await supabaseClient
.from("transactions")
.select("*")
.eq("user_id", user.id)
.order("created_at", { ascending: false });

let html = "";

data.forEach(t => {
html += `<p>+₹${t.amount} — ${t.type}</p>`;
});

document.getElementById("transactions").innerHTML = html;

}

loadTransactions();

}
</script>
</body>
</html>
