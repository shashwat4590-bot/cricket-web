<!DOCTYPE html>
<html>
<head>

<title>Cricket Prediction</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, system-ui, Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1a2a6c,#0f2027);
color:white;
}

/* Main App */

.app{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* Header */

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:14px;
opacity:0.8;
}

/* Question */

#question{
font-size:22px;
font-weight:600;
line-height:1.4;
margin-bottom:25px;
}

/* Timer bar */

.timer-bar{
height:6px;
width:100%;
background:#333;
border-radius:5px;
overflow:hidden;
margin-bottom:25px;
}

.timer-fill{
height:100%;
width:100%;
background:#ff4757;
transition:width 1s linear;
}

/* Buttons */

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

button{
padding:18px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

/* YES */

.yes{
background:#2ed573;
color:black;
}

.yes:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* NO */

.no{
background:#ff4757;
color:white;
}

.no:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<div>🏏 Live Prediction</div>
<div id="timerText">10s</div>
</div>

<div id="question">
Waiting for host question...
</div>

<div class="timer-bar">
<div class="timer-fill" id="timerFill"></div>
</div>

<div class="buttons">

<button class="yes" onclick="answer('YES')">
YES
</button>

<button class="no" onclick="answer('NO')">
NO
</button>

</div>

</div>

<script>

/* Firebase config */

const firebaseConfig = {

apiKey:"PASTE_API_KEY",
authDomain:"cricket-web-predict.firebaseapp.com",
databaseURL:"https://cricket-web-predict-default-rtdb.firebaseio.com",
projectId:"cricket-web-predict",
storageBucket:"cricket-web-predict.appspot.com",
messagingSenderId:"PASTE",
appId:"PASTE"

};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const questionRef=db.ref("currentQuestion");

let timerInterval;

/* Listen for question */

questionRef.on("value",(snapshot)=>{

const data=snapshot.val();

if(data){

document.getElementById("question").innerText=data.question;

startTimer(data.startTime);

}

});

/* Timer */

function startTimer(startTime){

clearInterval(timerInterval);

let duration=10;

timerInterval=setInterval(()=>{

let elapsed=Math.floor((Date.now()-startTime)/1000);

let remaining=duration-elapsed;

if(remaining<=0){

remaining=0;
clearInterval(timerInterval);

}

document.getElementById("timerText").innerText=remaining+"s";

let percent=(remaining/duration)*100;

document.getElementById("timerFill").style.width=percent+"%";

},1000);

}

/* Answer */

function answer(choice){

alert("You chose: "+choice);

}

</script>

</body>
</html>
