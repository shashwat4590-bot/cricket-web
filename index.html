<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Floating Token Pill */
        .token-header {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--gold);
            padding: 8px 16px; border-radius: 50px; backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 8px; font-weight: 900; color: var(--gold);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 20px;
            border-top: 1px solid #1e293b; z-index: 1000;
        }
        .nav-item { color: #64748b; font-weight: 800; cursor: pointer; font-size: 0.8rem; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); }

        /* Pages */
        .page { display: none; padding: 40px 20px 120px; animation: fadeIn 0.4s ease; width: 100%; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* Professional Cards */
        .match-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            width: 100%; max-width: 400px; border-radius: 30px; padding: 40px 20px;
            border: 1px solid rgba(56, 189, 248, 0.2); text-align: center; margin-top: 40px;
        }

        .score-box { 
            background: var(--card); border-radius: 20px; padding: 25px; 
            width: 100%; max-width: 400px; border: 1px solid #1e293b; 
            margin-bottom: 20px; text-align: center; 
        }
        #live-score { font-size: 3.5rem; font-weight: 900; color: white; line-height: 1; margin: 10px 0; }
        
        .question-card { 
            background: var(--card); border-radius: 30px; padding: 35px 20px; 
            width: 100%; max-width: 400px; border: 1px solid #1e293b; text-align: center; 
        }
        #q-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; color: #f8fafc; }

        /* Option Buttons */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn { 
            background: #1e293b; border: 2px solid #334155; color: white; 
            padding: 20px 10px; border-radius: 18px; font-size: 1rem; 
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .opt-btn.selected { border: 3px solid var(--accent); background: rgba(56, 189, 248, 0.1); }
        
        .action-btn { 
            background: var(--accent); color: #000; border: none; 
            padding: 18px; border-radius: 18px; font-weight: 900; 
            width: 100%; font-size: 1.1rem; margin-top: 20px; cursor: pointer; 
        }
        .lock-btn { background: var(--gold); }

        /* Wallet UI */
        .wallet-card { 
            background: var(--card); border-radius: 30px; padding: 40px 25px; 
            width: 100%; max-width: 400px; border: 2px solid var(--gold); text-align: center; 
        }
        .wallet-input { 
            background: #020617; border: 2px solid #334155; padding: 18px; 
            border-radius: 15px; color: white; width: 100%; 
            font-size: 1.4rem; text-align: center; margin: 20px 0; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="token-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span id="top-balance">0</span>
    </div>

    <div id="home" class="page active">
        <h1 style="color: var(--accent); font-size: 2.2rem; font-weight: 900; margin-top: 20px;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="match-card">
            <p style="color: var(--gold); font-weight: 800; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 10px;">UPCOMING / LIVE</p>
            <h2 style="font-size: 2rem; margin-bottom: 5px;">CSK vs MI</h2>
            <p style="color: #64748b; font-weight: 600; margin-bottom: 30px;">IPL 2026 FINAL</p>
            <button class="action-btn" onclick="nav('arena')">ENTER ARENA</button>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="score-box">
            <p id="batting-team" style="color: var(--accent); font-weight: 800; font-size: 0.8rem; letter-spacing: 2px;">MATCH UPDATES</p>
            <div id="live-score">0/0</div>
        </div>

        <div class="question-card">
            <div id="q-text">Waiting for next ball...</div>
            <div id="options-box" class="opt-grid"></div>
            <button id="lock-btn" class="action-btn lock-btn" style="display:none;" onclick="confirmBet()">CONFIRM PREDICTION</button>
            <div id="lock-msg" style="display:none; margin-top:20px; font-weight:900; color:var(--accent); font-size:1.1rem;"></div>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="wallet-card">
            <p style="font-weight: 800; color: #64748b;">CURRENT BALANCE</p>
            <div id="wallet-balance" style="font-size: 4rem; font-weight: 900; color: var(--gold);">0</div>
            <div style="margin-top: 10px;">
                <input type="number" id="recharge-amt" class="wallet-input" placeholder="Amount (₹)">
                <button class="action-btn" style="background:var(--gold);" onclick="purchaseTokens()">BUY TOKENS</button>
                <p style="color: #64748b; font-size: 0.7rem; margin-top: 15px;">MINIMUM RECHARGE: ₹50</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-item" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-item" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = parseInt(localStorage.getItem('tks')) || 0;
    let selectedPick = "";

    db.ref("currentQuestion").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        const qText = document.getElementById('q-text');
        const box = document.getElementById('options-box');
        
        // Reset for new questions
        const qID = data.question + data.timestamp;
        if(window.lastQ !== qID) {
            window.lastQ = qID;
            localStorage.setItem('isLocked', 'false');
            localStorage.setItem('myPick', '');
            localStorage.setItem('paid', 'false');
            document.getElementById('lock-msg').style.display = 'none';
            document.getElementById('lock-btn').style.display = 'none';
        }

        if (!data.active) {
            qText.innerText = "Waiting for next ball...";
            box.innerHTML = "";
            return;
        }

        qText.innerText = data.question;
        document.getElementById('live-score').innerText = data.matchScore || "0/0";

        box.innerHTML = "";
        data.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            if(data.result === o) { b.style.background = "#22c55e"; b.style.borderColor = "#22c55e"; b.style.color="white"; }
            b.onclick = () => {
                if(localStorage.getItem('isLocked') === 'true') return;
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedPick = o;
                document.getElementById('lock-btn').style.display = "block";
            };
            box.appendChild(b);
        });

        // Instant Payout Logic
        const myPick = localStorage.getItem('myPick');
        const alreadyPaid = localStorage.getItem('paid');
        if(data.result && myPick === data.result && alreadyPaid === 'false') {
            tokens += 20;
            localStorage.setItem('tks', tokens);
            localStorage.setItem('paid', 'true');
            updateUI();
            alert("🎯 CORRECT! You won 20 Tokens!");
        }
    });

    function confirmBet() {
        if(tokens < 10) return alert("Insufficient balance!");
        tokens -= 10;
        localStorage.setItem('tks', tokens);
        localStorage.setItem('isLocked', 'true');
        localStorage.setItem('myPick', selectedPick);
        localStorage.setItem('paid', 'false');
        updateUI();
        document.getElementById('lock-btn').style.display = "none";
        document.getElementById('lock-msg').style.display = "block";
        document.getElementById('lock-msg').innerText = "LOCKED: " + selectedPick;
    }

    function purchaseTokens() {
        const amt = parseInt(document.getElementById('recharge-amt').value);
        if(amt >= 50) {
            tokens += (amt * 2);
            localStorage.setItem('tks', tokens);
            updateUI();
            alert("Purchase Successful!");
            document.getElementById('recharge-amt').value = "";
        } else alert("Minimum ₹50 required");
    }

    function updateUI() {
        document.getElementById('top-balance').innerText = tokens;
        document.getElementById('wallet-balance').innerText = tokens;
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
