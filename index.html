<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #06090f;
            --surface: #121826;
            --accent: #00d2ff;
            --success: #00f2a6;
            --error: #ff4b5c;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #06090f);
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
        }

        .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); }
        #scoreBox {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            color: var(--accent);
        }

        /* Match Scoreboard */
        .scoreboard {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .sb-label { font-size: 0.6rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .sb-main { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .sb-team { font-size: 1.1rem; font-weight: 800; }
        .sb-score { font-size: 1.8rem; font-weight: 900; color: white; }

        /* Prediction Card */
        .card {
            background: var(--surface);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        #question {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 25px;
            min-height: 50px;
        }

        /* Timer bar */
        .timer-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timerFill { height: 100%; background: linear-gradient(90deg, var(--accent), #a855f7); width: 0%; transition: width 1s linear; }

        /* Dynamic Options Grid */
        #optionsContainer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .btn-opt {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 18px 10px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-opt:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-opt.selected { border: 2.5px solid var(--accent); background: rgba(0, 210, 255, 0.1); }
        .btn-opt.correct { background: var(--success) !important; color: #064e3b !important; border: none; }
        .btn-opt.wrong { background: var(--error) !important; opacity: 0.4 !important; border: none; }

        footer { text-align: center; font-size: 0.65rem; color: var(--text-dim); margin-top: auto; padding: 20px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">PREDICT<span>LIVE</span></div>
        <div id="scoreBox">0 PTS</div>
    </header>

    <div class="scoreboard">
        <span class="sb-label">LIVE MATCH CENTER</span>
        <div class="sb-main">
            <span id="battingTeam" class="sb-team">TOSS</span>
            <span id="liveScore" class="sb-score">PENDING</span>
        </div>
    </div>

    <div class="card">
        <div id="question">Connecting to pitch...</div>
        <div class="timer-bg"><div id="timerFill"></div></div>
        <div id="optionsContainer"></div>
    </div>

    <footer>REAL-TIME SPORTS SYNC ACTIVE</footer>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "PASTE_YOUR_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "PASTE",
        appId: "PASTE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    let score = parseInt(localStorage.getItem("c_score")) || 0;
    let myChoice = null;
    let timer;

    document.getElementById("scoreBox").innerText = score + " PTS";

    qRef.on("value", (snap) => {
        const val = snap.val();
        if (!val) {
            document.getElementById("question").innerText = "Waiting for next question...";
            document.getElementById("optionsContainer").innerHTML = "";
            return;
        }

        // Update Scoreboard
        document.getElementById("liveScore").innerText = val.matchScore || "--";
        document.getElementById("battingTeam").innerText = val.battingTeam || "TOSS";
        document.getElementById("question").innerText = val.question;

        // Generate Buttons
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        if (val.options) {
            val.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-opt";
                btn.innerText = opt;
                btn.id = "opt-" + opt;
                btn.onclick = () => submitVote(opt);
                container.appendChild(btn);
            });
        }

        // State Check
        if (!val.result) {
            myChoice = null;
            if (val.status === "open") startTimer(val.endTime);
            else lockAll();
        } else {
            revealResult(val.result, val.options);
        }
    });

    function startTimer(endTime) {
        clearInterval(timer);
        timer = setInterval(() => {
            const diff = endTime - Date.now();
            const sec = Math.max(0, Math.floor(diff / 1000));
            document.getElementById("timerFill").style.width = Math.min(100, (sec * 5)) + "%";
            if (sec <= 0) { clearInterval(timer); lockAll(); }
        }, 1000);
    }

    function submitVote(choice) {
        if (myChoice) return;
        myChoice = choice;
        if (navigator.vibrate) navigator.vibrate(50);
        document.getElementById("opt-" + choice).classList.add("selected");
        lockAll();
    }

    function revealResult(correct, options) {
        clearInterval(timer);
        lockAll();
        options.forEach(opt => {
            const btn = document.getElementById("opt-" + opt);
            if (opt === correct) btn.classList.add("correct");
            else if (opt === myChoice) btn.classList.add("wrong");
        });

        if (myChoice === correct) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            score += 100;
            localStorage.setItem("c_score", score);
            document.getElementById("scoreBox").innerText = score + " PTS";
            myChoice = "done";
        }
    }

    function lockAll() {
        document.querySelectorAll(".btn-opt").forEach(b => b.disabled = true);
    }
</script>
</body>
</html>
