<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --bg: #020617; --accent: #38bdf8; --gold: #fbbf24; --card: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }

        .shell { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }
        
        /* Navigation */
        .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; 
                 background: #0f172a; display: flex; justify-content: space-around; padding: 20px; border-top: 2px solid #1e293b; z-index: 1000; }
        .nav-btn { color: #64748b; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .nav-btn.active { color: var(--accent); }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.3s; }
        .page.active { display: flex; }

        /* Match Card */
        .card { background: var(--card); border-radius: 35px; padding: 35px; width: 100%; border: 1px solid #1e293b; margin-top: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .logo-circle { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #000; border: 4px solid rgba(255,255,255,0.1); }
        .csk { background: #F9CD05; } .mi { background: #004BA0; color: white; }

        /* Text Sizes */
        #qText { font-size: 1.8rem; font-weight: 700; margin: 25px 0; color: #f8fafc; line-height: 1.3; }
        .score-val { font-size: 3.5rem; font-weight: 900; margin: 10px 0; }
        
        /* Buttons */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .opt-btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 25px; border-radius: 20px; font-weight: 700; font-size: 1.2rem; cursor: pointer; }
        .opt-btn.selected { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .main-btn { background: var(--accent); color: #082f49; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; font-size: 1.2rem; margin-top: 20px; }

        /* Debug Logger */
        #debug { position: fixed; top: 0; left: 0; font-size: 10px; color: lime; background: rgba(0,0,0,0.7); padding: 5px; pointer-events: none; z-index: 2000; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="debug">System: Initializing...</div>

<div class="shell">
    <div id="home" class="page active">
        <h1 style="font-size: 2.8rem; font-weight: 900; color: var(--accent); margin-bottom: 20px;">PREDICT<span style="color:white">LIVE</span></h1>
        <div class="card">
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <div class="logo-circle csk">CSK</div>
                <div style="font-weight:900; opacity:0.2; font-size: 1.5rem;">VS</div>
                <div class="logo-circle mi">MI</div>
            </div>
            <h2 style="margin: 25px 0;">IPL FINALS 2026</h2>
            <button class="main-btn" onclick="goTo('arena')">ENTER ARENA</button>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="card">
            <p style="color:var(--accent); font-weight:800; font-size:0.9rem; letter-spacing:2px;">LIVE SCOREBOARD</p>
            <div id="batTeam" style="font-weight:800; margin-top:10px; font-size:1.2rem;">FETCHING...</div>
            <div id="liveScore" class="score-val">0/0</div>
        </div>

        <div class="card">
            <div id="qText">Waiting for ball...</div>
            <div id="optGrid" class="opt-grid"></div>
            <button id="lockBtn" class="main-btn" style="display:none;" onclick="confirmBet()">LOCK BET (10 Tokens)</button>
            <p id="lockStatus" style="display:none; margin-top:20px; font-weight:900; color:var(--accent); font-size:1.3rem;"></p>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="card" style="border-color: var(--gold);">
            <p style="font-weight:800; color:#64748b;">WALLET BALANCE</p>
            <div id="tokenText" style="font-size:4rem; font-weight:900; color:var(--gold);">0</div>
            <input type="number" id="cashIn" placeholder="Enter Amount (₹)" style="width:100%; padding:20px; border-radius:15px; border:2px solid #334155; background:#020617; color:white; margin-top:20px; text-align:center; font-size:1.2rem;">
            <button class="main-btn" style="background:var(--gold);" onclick="buyTokens()">RECHARGE NOW</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" id="n-home" onclick="goTo('home')">HOME</div>
        <div class="nav-btn" id="n-arena" onclick="goTo('arena')">ARENA</div>
        <div class="nav-btn" id="n-wallet" onclick="goTo('wallet')">WALLET</div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const log = (msg) => document.getElementById('debug').innerText = "System: " + msg;

    // 2. STATE
    let tokens = parseInt(localStorage.getItem("tk_val")) || 0;
    let mySelection = null;
    let lastQ = "";

    function syncTokens() {
        document.getElementById('tokenText').innerText = tokens;
        localStorage.setItem("tk_val", tokens);
    }
    syncTokens();

    function goTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    function buyTokens() {
        const amt = parseInt(document.getElementById('cashIn').value);
        if(amt >= 50) { tokens += (amt*3); syncTokens(); alert("Recharge successful!"); }
        else { alert("Min ₹50 required"); }
    }

    // 3. THE FORCE-SYNC LISTENER
    // We listen to the ROOT of the database to see exactly what is changing
    db.ref().on("value", (snapshot) => {
        const rootData = snapshot.val();
        log("Data Found: " + (rootData ? "YES" : "NO"));
        
        if(!rootData || !rootData.currentQuestion) {
            document.getElementById('qText').innerText = "No live question at the moment.";
            return;
        }

        const data = rootData.currentQuestion;
        
        // Reset if it's a new question
        const qID = data.question + data.status;
        if(lastQ !== qID) {
            lastQ = qID;
            resetArena();
        }

        document.getElementById('liveScore').innerText = data.matchScore || "0/0";
        document.getElementById('batTeam').innerText = data.battingTeam || "LIVE";
        document.getElementById('qText').innerText = data.question;

        if(!data.result) {
            renderOptions(data.options);
        } else {
            showResult(data.result, data.options);
        }
    });

    function renderOptions(opts) {
        const grid = document.getElementById('optGrid');
        grid.innerHTML = "";
        (opts || []).forEach(o => {
            if(o === "DRAW") return;
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            if(mySelection === o) btn.classList.add('selected');
            btn.innerText = o;
            btn.onclick = () => {
                if(localStorage.getItem("locked") === "true") return;
                mySelection = o;
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('lockBtn').style.display = "block";
            };
            grid.appendChild(btn);
        });
    }

    function confirmBet() {
        if(tokens < 10) return alert("Insufficient tokens!");
        tokens -= 10; syncTokens();
        localStorage.setItem("locked", "true");
        localStorage.setItem("pick", mySelection);
        document.getElementById('lockBtn').style.display = "none";
        document.getElementById('lockStatus').innerText = "LOCKED ON: " + mySelection;
        document.getElementById('lockStatus').style.display = "block";
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    }

    function resetArena() {
        mySelection = null;
        localStorage.setItem("locked", "false");
        document.getElementById('lockStatus').style.display = "none";
        document.getElementById('lockBtn').style.display = "none";
    }

    function showResult(win, opts) {
        const pick = localStorage.getItem("pick");
        const grid = document.getElementById('optGrid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = o;
            if(o === win) btn.style.background = "#22c55e";
            else if(o === pick) btn.style.background = "#ef4444";
            grid.appendChild(btn);
        });
        if(pick === win && localStorage.getItem("winID") !== lastQ) {
            confetti({ particleCount: 100 });
            tokens += 30; syncTokens();
            localStorage.setItem("winID", lastQ);
        }
    }
</script>
</body>
</html>
