<!DOCTYPE html>
<html>
<head>

<title>Cricket Prediction</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui,Arial;
}

body{
background:#0e1117;
display:flex;
justify-content:center;
color:white;
}

/* APP */

.app{
width:420px;
min-height:100vh;
background:#0e1117;
}

/* HEADER */

.header{
padding:16px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #222;
}

/* MATCH HEADER */

.match-header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
}

.team{
width:45px;
}

.vs{
font-size:14px;
opacity:0.7;
}

/* CARD */

.card{
background:#151a22;
margin:15px;
padding:22px;
border-radius:12px;
}

/* QUESTION */

#question{
font-size:20px;
margin-bottom:15px;
line-height:1.4;
}

/* TIMER */

.timer{
font-size:13px;
color:#ff4757;
margin-bottom:10px;
}

/* TIMER BAR */

.timer-bar{
height:6px;
background:#333;
border-radius:5px;
margin-bottom:18px;
overflow:hidden;
}

.timer-fill{
height:100%;
background:#ff4757;
width:100%;
transition:width 1s linear;
}

/* BUTTONS */

.buttons{
display:flex;
gap:12px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

/* YES */

.yes{
background:#2ed573;
color:black;
}

.yes:hover{
transform:translateY(-2px);
}

/* NO */

.no{
background:#ff4757;
color:white;
}

.no:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="app">

<div class="header">
🏏 Cricket Prediction
</div>

<div class="match-header">

<img src="https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg" class="team">

<div class="vs">VS</div>

<img src="https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg" class="team">

</div>

<div class="card">

<div id="question">
Waiting for host question...
</div>

<div class="timer" id="timer">
Time left: 10
</div>

<div class="timer-bar">
<div class="timer-fill" id="timerFill"></div>
</div>

<div class="buttons">

<button class="yes" onclick="answer('YES')">
YES
</button>

<button class="no" onclick="answer('NO')">
NO
</button>

</div>

</div>

</div>

<script>

/* Firebase config */

const firebaseConfig = {

apiKey:"PASTE_API_KEY",

authDomain:"cricket-web-predict.firebaseapp.com",

databaseURL:"https://cricket-web-predict-default-rtdb.firebaseio.com",

projectId:"cricket-web-predict",

storageBucket:"cricket-web-predict.appspot.com",

messagingSenderId:"PASTE",

appId:"PASTE"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

const questionRef=db.ref("currentQuestion");

let timerInterval;

/* Listen for question */

questionRef.on("value",(snapshot)=>{

const data=snapshot.val();

if(data){

document.getElementById("question").innerText=data.question;

startTimer(data.startTime);

enableButtons();

}

});

/* Timer */

function startTimer(startTime){

clearInterval(timerInterval);

let duration=10;

timerInterval=setInterval(()=>{

let elapsed=Math.floor((Date.now()-startTime)/1000);

let remaining=duration-elapsed;

if(remaining<=0){

remaining=0;

clearInterval(timerInterval);

}

document.getElementById("timer").innerText="Time left: "+remaining;

let percent=(remaining/duration)*100;

document.getElementById("timerFill").style.width=percent+"%";

},1000);

}

/* Answer */

function answer(choice){

document.querySelectorAll("button").forEach(btn=>{
btn.disabled=true;
btn.style.opacity="0.5";
});

alert("You selected: "+choice);

}

/* Re-enable buttons for next question */

function enableButtons(){

document.querySelectorAll("button").forEach(btn=>{
btn.disabled=false;
btn.style.opacity="1";
});

}

</script>

</body>
</html>
