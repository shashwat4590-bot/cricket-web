<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root {
            --bg: #04070d; --card: #111827; --accent: #00d2ff;
            --success: #00f2a6; --error: #ff4b5c; --gold: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #111827;
            display: flex; justify-content: space-around; padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { color: #94a3b8; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--accent); }

        .page { display: none; padding: 20px; padding-bottom: 80px; animation: fadeIn 0.3s; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* --- HOME PAGE --- */
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1000');
            background-size: cover; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px;
            border: 1px solid rgba(255,255,255,0.1); margin-top: 20px;
        }
        .team-box { display: flex; justify-content: space-around; align-items: center; margin: 25px 0; }
        .team-box img { width: 70px; height: 70px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* --- WALLET PAGE --- */
        .wallet-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 25px; padding: 25px; border: 1px solid #334155; }
        .token-balance { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .input-group { margin-top: 20px; width: 100%; }
        input { background: #04070d; border: 1px solid #334155; padding: 15px; border-radius: 12px; color: white; width: 100%; font-size: 1rem; margin-bottom: 10px; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; }

        /* --- ARENA --- */
        .scoreboard { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; border: 1px solid #334155; margin-bottom: 15px; text-align: center; }
        .predict-card { background: var(--card); border-radius: 25px; padding: 30px 20px; width: 100%; border: 1px solid #334155; text-align: center; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .opt-btn { background: #1f2937; border: 1px solid #374151; color: white; padding: 20px 10px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { border: 2px solid var(--accent); background: rgba(0,210,255,0.1); }
        .opt-btn.correct { background: var(--success) !important; color: #064e3b !important; }
        .opt-btn.wrong { background: var(--error) !important; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h2 style="color:var(--accent); margin-top:10px;">PREDICT<span style="color:white">LIVE</span></h2>
        <div class="hero-banner">
            <span style="color:var(--gold); font-weight:800; letter-spacing:2px; font-size:0.7rem;">UPCOMING MATCH</span>
            <div class="team-box">
                <div>
                    <img src="https://creativereview.imgix.net/content/uploads/2019/04/IPL_Logo.png?auto=compress,format&q=60&w=1200&h=675" id="logo1">
                    <p style="font-weight:900;">CSK</p>
                </div>
                <div style="font-weight:900; opacity:0.3;">VS</div>
                <div>
                    <img src="https://creativereview.imgix.net/content/uploads/2019/04/IPL_Logo.png?auto=compress,format&q=60&w=1200&h=675" id="logo2">
                    <p style="font-weight:900;">MI</p>
                </div>
            </div>
            <button onclick="nav('arena')" style="background:var(--accent); color:black; border:none; padding:15px; border-radius:12px; font-weight:900; width:100%; cursor:pointer;">JOIN ARENA</button>
        </div>
    </div>

    <div id="wallet" class="page">
        <h2 style="margin-bottom:20px;">MY WALLET</h2>
        <div class="wallet-card">
            <p style="font-size:0.8rem; color:#94a3b8;">Available Tokens</p>
            <div class="token-balance" id="balanceText">0</div>
            <div class="input-group">
                <label style="font-size:0.7rem; color:var(--gold);">ENTER AMOUNT (₹)</label>
                <input type="number" id="cashInput" placeholder="Min ₹50" min="50">
                <p style="font-size:0.7rem; color:#94a3b8; margin-bottom:10px;">You will receive: <span id="tokenPreview" style="color:white">0</span> Tokens</p>
                <button class="buy-btn" onclick="processBuy()">BUY TOKENS</button>
            </div>
        </div>
    </div>

    <div id="arena" class="page">
        <div class="scoreboard">
            <span style="font-size:0.6rem; color:var(--accent); font-weight:800; letter-spacing:2px;">LIVE MATCH DATA</span>
            <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-top:10px;">
                <span id="batTeam" style="font-weight:900; font-size:1.1rem;">--</span>
                <span id="liveScore" style="font-size:2rem; font-weight:900;">0/0</span>
            </div>
        </div>
        <div class="predict-card">
            <div id="question" style="font-weight:800;">Waiting for host...</div>
            <div id="optionsContainer" class="options-grid"></div>
            <div id="lockedMsg" style="display:none; margin-top:20px; color:var(--accent); font-size:0.8rem;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" id="nav-home" onclick="nav('home')">🏠<br>HOME</div>
        <div class="nav-item" id="nav-arena" onclick="nav('arena')">🏏<br>ARENA</div>
        <div class="nav-item" id="nav-wallet" onclick="nav('wallet')">💰<br>WALLET</div>
    </div>

<script>
    // --- FIREBASE CONFIG (CRITICAL: MUST MATCH HOST) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    // --- NAVIGATION LOGIC ---
    function nav(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
    }

    // --- WALLET LOGIC ---
    let tokens = parseInt(localStorage.getItem("user_tokens")) || 0;
    document.getElementById('balanceText').innerText = tokens;

    document.getElementById('cashInput').addEventListener('input', (e) => {
        const val = e.target.value || 0;
        document.getElementById('tokenPreview').innerText = val * 3;
    });

    function processBuy() {
        const amt = parseInt(document.getElementById('cashInput').value);
        if(amt < 50) { alert("Minimum purchase is ₹50"); return; }
        tokens += (amt * 3);
        localStorage.setItem("user_tokens", tokens);
        document.getElementById('balanceText').innerText = tokens;
        alert("Tokens added successfully!");
    }

    // --- LOGO RECOVERY ---
    // Using backup images if primary fails
    const cskLogo = "https://hatchpro.club/images/csk.png"; 
    const miLogo = "https://hatchpro.club/images/mi.png";
    document.getElementById('logo1').src = cskLogo;
    document.getElementById('logo2').src = miLogo;

    // --- LIVE ARENA SYNC ---
    let myChoice = null;
    
    qRef.on("value", (snap) => {
        const data = snap.val();
        if (!data) return;

        // Force Question Deployment
        document.getElementById("liveScore").innerText = data.matchScore || "LIVE";
        document.getElementById("batTeam").innerText = data.battingTeam || "TOSS";
        document.getElementById("question").innerText = data.question;

        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        
        if (data.options) {
            // Remove "DRAW" and map buttons
            data.options.filter(o => o !== "DRAW").forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.id = "btn-" + opt;
                btn.onclick = () => handlePredict(opt);
                container.appendChild(btn);
            });
        }

        if (!data.result) {
            if (myChoice) {
                applySelectionUI();
            } else {
                document.getElementById('lockedMsg').style.display = "none";
            }
        } else {
            revealResult(data.result, data.options);
        }
    });

    function handlePredict(choice) {
        if(tokens < 10) { alert("Insufficient tokens!"); return; }
        myChoice = choice;
        tokens -= 10;
        localStorage.setItem("user_tokens", tokens);
        document.getElementById('balanceText').innerText = tokens;
        applySelectionUI();
    }

    function applySelectionUI() {
        const btn = document.getElementById("btn-" + myChoice);
        if(btn) btn.classList.add("selected");
        document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
        const lock = document.getElementById('lockedMsg');
        lock.style.display = "block";
        lock.innerText = `Prediction Locked: ${myChoice}. Waiting for result...`;
    }

    function revealResult(win, opts) {
        document.getElementById('lockedMsg').style.display = "none";
        opts.forEach(o => {
            const b = document.getElementById("btn-" + o);
            if(b) {
                if(o === win) b.classList.add("correct");
                else if(o === myChoice) b.classList.add("wrong");
            }
        });

        if(myChoice === win) {
            confetti({ particleCount: 100, spread: 70 });
            tokens += 30; // 3x return
            localStorage.setItem("user_tokens", tokens);
            document.getElementById('balanceText').innerText = tokens;
        }
        myChoice = null; // Reset for next ball
    }
</script>
</body>
</html>
