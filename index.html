<!DOCTYPE html>
<html>
<head>
<title>Cricket Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f4f8;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:15px;
font-weight:bold;
}

/* MATCH TITLE */

.match{
padding:15px;
background:white;
border-bottom:1px solid #ddd;
font-size:16px;
}

/* CARD */

.card{
background:white;
margin:12px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card-title{
font-weight:bold;
margin-bottom:12px;
}

/* ROW */

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

/* TEAM */

.team{
width:60%;
font-size:14px;
}

/* BUTTONS */

.options{
display:flex;
gap:10px;
}

.btn{
padding:10px 14px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
}

.yes{
background:#6bb6ff;
color:white;
}

.no{
background:#ff9aa2;
color:white;
}

.btn:hover{
opacity:0.85;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
🏏 Cricket Prediction
</div>

<div class="match">
Karachi Region Whites vs Bahawalpur Region
</div>

<div class="card">

<div class="card-title">
Over 1.5 Runs off Delivery
</div>

<div class="row">

<div class="team">
Karachi Region Whites
</div>

<div class="options">
<button class="btn yes">Yes</button>
<button class="btn no">No</button>
</div>

</div>

<div class="row">

<div class="team">
Bahawalpur Region
</div>

<div class="options">
<button class="btn yes">Yes</button>
<button class="btn no">No</button>
</div>

</div>

</div>

<div class="card">

<div class="card-title">
Over 3.5 Runs off Delivery
</div>

<div class="row">

<div class="team">
Karachi Region Whites
</div>

<div class="options">
<button class="btn yes">Yes</button>
<button class="btn no">No</button>
</div>

</div>

<div class="row">

<div class="team">
Bahawalpur Region
</div>

<div class="options">
<button class="btn yes">Yes</button>
<button class="btn no">No</button>
</div>

</div>

</div>

</div>

</body>
</html>
