<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictLive Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root {
            --bg: #04070d; --card: #111827; --accent: #00d2ff;
            --success: #00f2a6; --error: #ff4b5c; --gold: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; }

        /* --- LOBBY/HOME --- */
        #lobbyScreen { display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; width: 100%; max-width: 500px; border-radius: 30px; padding: 40px 20px;
            border: 1px solid rgba(255,255,255,0.1); margin-top: 20px;
        }
        .token-wallet {
            background: rgba(245, 158, 11, 0.1); border: 1px solid var(--gold);
            padding: 15px 25px; border-radius: 20px; margin: 20px 0; display: inline-block;
        }
        .buy-tokens-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .buy-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #334155; cursor: pointer; }

        /* --- GAME ARENA --- */
        #gameScreen { display: none; padding: 15px; width: 100%; max-width: 430px; margin: 0 auto; flex-direction: column; }
        .status-msg { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 0.9rem; color: var(--accent); display: none; }
        
        /* Stats Bar */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .token-pill { background: #1e293b; padding: 8px 15px; border-radius: 50px; border: 1px solid var(--gold); color: var(--gold); font-weight: 800; font-size: 0.8rem; }

        .scoreboard { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; }
        .predict-card { background: var(--card); border-radius: 30px; padding: 30px 20px; border: 1px solid #334155; text-align: center; }
        
        .timer-bg { height: 5px; background: #000; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }

        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .opt-btn { background: #1f2937; border: 1px solid #374151; color: white; padding: 20px 10px; border-radius: 18px; font-weight: 700; cursor: pointer; }
        .opt-btn:disabled { opacity: 0.3; }
        .opt-btn.selected { border: 2px solid var(--accent); background: rgba(0,210,255,0.1); }
        .opt-btn.correct { background: var(--success) !important; color: #064e3b !important; }
        .opt-btn.wrong { background: var(--error) !important; }

        .team-logo { width: 60px; height: 60px; object-fit: contain; }
    </style>
</head>
<body>

    <div id="lobbyScreen">
        <div class="hero-banner">
            <span style="color:var(--gold); font-weight:900; letter-spacing:3px;">LIVE MATCH DAY</span>
            <div style="display:flex; justify-content:space-around; align-items:center; margin:30px 0;">
                <div>
                    <img class="team-logo" src="https://hatchpro.club/images/csk.png">
                    <p style="font-weight:900; margin-top:5px;">CSK</p>
                </div>
                <div style="font-style:italic; opacity:0.5; font-weight:900;">VS</div>
                <div>
                    <img class="team-logo" src="https://hatchpro.club/images/mi.png">
                    <p style="font-weight:900; margin-top:5px;">MI</p>
                </div>
            </div>
            <button onclick="enterArena()" style="background:var(--accent); color:black; border:none; padding:18px 40px; border-radius:15px; font-weight:900; cursor:pointer;">ENTER ARENA</button>
        </div>

        <div class="token-wallet">
            <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:5px;">YOUR BALANCE</p>
            <h2 id="lobbyTokens">0 TOKENS</h2>
        </div>

        <h3 style="margin-top:20px;">EXCHANGE FOR TOKENS</h3>
        <p style="font-size:0.8rem; color:var(--text-dim);">Min Purchase: ₹50 (150 Tokens)</p>
        
        <div class="buy-tokens-grid">
            <div class="buy-card" onclick="buyTokens(50)"><b>₹50</b><br><span style="color:var(--gold)">150 Tokens</span></div>
            <div class="buy-card" onclick="buyTokens(100)"><b>₹100</b><br><span style="color:var(--gold)">300 Tokens</span></div>
            <div class="buy-card" onclick="buyTokens(200)"><b>₹200</b><br><span style="color:var(--gold)">600 Tokens</span></div>
            <div class="buy-card" onclick="buyTokens(500)"><b>₹500</b><br><span style="color:var(--gold)">1500 Tokens</span></div>
        </div>
    </div>

    <div id="gameScreen">
        <div class="top-nav">
            <h2 style="color:var(--accent)">PREDICT<span style="color:white">LIVE</span></h2>
            <div class="token-pill" id="gameTokens">0 TOKENS</div>
        </div>

        <div class="scoreboard">
            <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
                <span id="batTeam" style="font-weight:900;">--</span>
                <span id="liveScore" style="font-size:2rem; font-weight:900;">--</span>
            </div>
        </div>

        <div class="predict-card">
            <div id="question">Waiting for match updates...</div>
            <div class="timer-bg"><div id="progressBar"></div></div>
            <div id="optionsContainer" class="options-grid"></div>
            <div id="waitingMsg" class="status-msg"></div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { /* PASTE YOUR KEYS */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const qRef = db.ref("currentQuestion");

    // --- ECONOMY LOGIC ---
    let tokens = parseInt(localStorage.getItem("user_tokens")) || 0;
    const PREDICTION_COST = 10;

    function updateWallet() {
        localStorage.setItem("user_tokens", tokens);
        document.getElementById("lobbyTokens").innerText = tokens + " TOKENS";
        document.getElementById("gameTokens").innerText = tokens + " TOKENS";
    }
    updateWallet();

    function buyTokens(amt) {
        const received = amt * 3;
        tokens += received;
        updateWallet();
        alert(`Success! You added ${received} tokens.`);
    }

    function enterArena() {
        document.getElementById("lobbyScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "flex";
        initLiveSync();
    }

    // --- GAME LOGIC ---
    let myChoice = null;
    let timer;

    function initLiveSync() {
        qRef.on("value", (snap) => {
            const data = snap.val();
            if (!data) return;

            document.getElementById("liveScore").innerText = data.matchScore || "LIVE";
            document.getElementById("batTeam").innerText = data.battingTeam || "TOSS";
            document.getElementById("question").innerText = data.question;

            const grid = document.getElementById("optionsContainer");
            grid.innerHTML = "";
            
            // FILTER OPTIONS: Remove "DRAW" from Toss if it exists in data
            const filteredOptions = data.options ? data.options.filter(o => o !== "DRAW") : [];

            filteredOptions.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.id = "btn-" + opt;
                btn.onclick = () => handleVote(opt);
                grid.appendChild(btn);
            });

            if (!data.result) {
                if (!myChoice) {
                    document.getElementById("waitingMsg").style.display = "none";
                    if (data.status === "open") startTimer(data.endTime);
                } else {
                    showSelectedState();
                }
            } else {
                revealResult(data.result, filteredOptions);
            }
        });
    }

    function handleVote(choice) {
        if (tokens < PREDICTION_COST) {
            alert("Insufficient Tokens! Please go back and recharge.");
            return;
        }
        
        myChoice = choice;
        tokens -= PREDICTION_COST;
        updateWallet();
        showSelectedState();
    }

    function showSelectedState() {
        const btn = document.getElementById("btn-" + myChoice);
        if (btn) btn.classList.add("selected");
        document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
        
        const wait = document.getElementById("waitingMsg");
        wait.style.display = "block";
        wait.innerText = `Prediction Locked: ${myChoice}. Waiting for match to start...`;
    }

    function startTimer(endTime) {
        clearInterval(timer);
        timer = setInterval(() => {
            const diff = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
            document.getElementById("progressBar").style.width = (diff * 2) + "%";
            if (diff <= 0) { clearInterval(timer); document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true); }
        }, 1000);
    }

    function revealResult(win, opts) {
        clearInterval(timer);
        document.getElementById("waitingMsg").style.display = "none";
        opts.forEach(o => {
            const b = document.getElementById("btn-" + o);
            if (b) {
                if (o === win) b.classList.add("correct");
                else if (o === myChoice) b.classList.add("wrong");
            }
        });

        if (myChoice === win) {
            confetti({ particleCount: 150, spread: 70 });
            tokens += 30; // Win 3x reward
            updateWallet();
            myChoice = "processed";
        }
    }
</script>
</body>
</html>
