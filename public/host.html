<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PredictLive Admin | Triple Management</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid #1e293b; }
        .bank-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; cursor: pointer; margin: 5px; font-size: 0.8rem; }
        .bank-btn:hover { border-color: #38bdf8; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #020617; color: white; border: 1px solid #334155; }
        .btn-push { background: #38bdf8; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .active-card { background: #020617; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid #fbbf24; position: relative; }
        .res-btn { background: #fbbf24; color: black; border: none; padding: 5px 10px; border-radius: 4px; margin: 5px 5px 0 0; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="panel">
            <h3>🏦 Question Bank</h3>
            <div id="bank">
                <button class="bank-btn" onclick="setQ('Toss Winner','CSK, MI', 1.9)">Toss Winner</button>
                <button class="bank-btn" onclick="setQ('Next Ball Run','0, 1, 4, 6', 3.0)">Next Ball Run</button>
                <button class="bank-btn" onclick="setQ('Runs in Next 5 Overs','0-30, 31-45, 46-60, 60+', 2.5)">5 Over Runs</button>
                <button class="bank-btn" onclick="setQ('Wickets in Next 5 Overs','0, 1, 2, 3+', 4.0)">5 Over Wickets</button>
                <button class="bank-btn" onclick="setQ('Next Over Boundary?','Yes, No', 2.0)">Boundary in Over?</button>
                <button class="bank-btn" onclick="setQ('Next Batter Out','Batter 1, Batter 2', 2.2)">Next Out</button>
                <button class="bank-btn" onclick="setQ('Method of Dismissal','Catch, Bowled, LBW, Other', 5.0)">Dismissal Mode</button>
                <button class="bank-btn" onclick="setQ('Powerplay Score','0-40, 41-55, 56-70, 70+', 2.1)">Powerplay Score</button>
                <button class="bank-btn" onclick="setQ('Total Match Sixes','0-10, 11-15, 16-20, 20+', 2.8)">Total Sixes</button>
                <button class="bank-btn" onclick="setQ('Winner of Match','CSK, MI', 1.8)">Match Winner</button>
            </div>
            <hr style="opacity:0.1; margin:20px 0;">
            <input type="text" id="q-text" placeholder="Question">
            <input type="text" id="q-opts" placeholder="Options (comma separated)">
            <input type="number" id="q-mult" placeholder="Multiplier" value="2.0">
            <input type="text" id="q-score" placeholder="Score (Optional)">
            <button class="btn-push" onclick="deploy()">DEPLOY TO ARENA</button>
        </div>

        <div class="panel">
            <h3>📡 Active Arena Questions</h3>
            <div id="active-list"></div>
            <button onclick="clearAll()" style="background:none; color:grey; border:none; cursor:pointer; margin-top:20px;">Wipe All Arena</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setQ(q, o, m) {
        document.getElementById('q-text').value = q;
        document.getElementById('q-opts').value = o;
        document.getElementById('q-mult').value = m;
    }

    function deploy() {
        const q = document.getElementById('q-text').value;
        const o = document.getElementById('q-opts').value.split(',').map(s=>s.trim());
        const m = document.getElementById('q-mult').value;
        const s = document.getElementById('q-score').value;

        db.ref("questions").push({
            question: q, options: o, multiplier: m, matchScore: s,
            timestamp: Date.now(), active: true, result: null
        });
    }

    db.ref("questions").on("value", (snap) => {
        const list = document.getElementById('active-list');
        const data = snap.val();
        list.innerHTML = "";
        if(!data) return;

        Object.keys(data).forEach(id => {
            const q = data[id];
            const div = document.createElement('div');
            div.className = "active-card";
            div.innerHTML = `<strong>${q.question}</strong><br>`;
            
            if(!q.result) {
                q.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = "res-btn";
                    b.innerText = opt;
                    b.onclick = () => db.ref("questions/"+id).update({result: opt});
                    div.appendChild(b);
                });
            } else {
                div.innerHTML += `<span style="color:#38bdf8">Result: ${q.result}</span>`;
            }

            const del = document.createElement('button');
            del.className = "btn-del"; del.innerText = "X";
            del.onclick = () => db.ref("questions/"+id).remove();
            div.appendChild(del);
            list.appendChild(div);
        });
    });

    function clearAll() { db.ref("questions").remove(); }
</script>
</body>
</html>
