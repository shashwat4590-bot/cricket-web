<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh; 
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            background-attachment: fixed;
        }

        /* --- ELITE GLASSMORPHISM --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        /* --- HEADER --- */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px); z-index: 2000;
            border-bottom: 1px solid var(--border);
        }
        .token-pill {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid var(--gold);
            padding: 8px 16px; border-radius: 50px; 
            font-weight: 800; color: var(--gold);
            display: flex; align-items: center; gap: 8px;
        }

        .container { padding: 90px 20px 120px; max-width: 450px; margin: 0 auto; }
        .page { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INPUTS & BUTTONS --- */
        .input-group {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            margin: 15px 0;
        }
        input {
            width: 100%; background: transparent; border: none; 
            color: white; font-size: 1.2rem; text-align: center; outline: none;
            font-weight: 600;
        }
        
        .btn-elite {
            background: var(--accent); color: #020617;
            border: none; padding: 18px; border-radius: 16px;
            font-weight: 800; width: 100%; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        .btn-elite:active { transform: scale(0.98); }

        /* --- NAV --- */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 15px; 
            border-radius: 25px; border: 1px solid var(--border); z-index: 1000; 
        }
        .nav-link { color: #64748b; font-weight: 700; font-size: 0.7rem; cursor: pointer; text-align: center; }
        .nav-link.active { color: var(--accent); }

        .txn-item {
            background: var(--surface);
            padding: 12px 18px; border-radius: 14px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:800; font-size:1.2rem; letter-spacing: -0.5px;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">
            <span style="font-size: 0.7rem; opacity: 0.8;">BAL</span>
            <span id="pill-bal">0</span>
        </div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="glass-card" style="background: linear-gradient(135deg, #0ea5e9, #6366f1); border:none; margin-bottom:20px;">
                <p style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.9;">Featured Match</p>
                <h2 style="font-size: 2rem; margin: 10px 0;">CSK vs MI</h2>
                <button class="btn-elite" style="background:white; color:#6366f1;" onclick="nav('arena')">Join Arena</button>
            </div>
            <div class="glass-card" style="text-align: center;">
                <button class="nav-link" style="width:100%; background:none; border:none;" onclick="logout()">Sign Out of Account</button>
            </div>
        </div>

        <div id="arena" class="page">
            <h3 style="margin-bottom: 20px;">Active Predictions</h3>
            <div id="questions-list"></div>
        </div>

        <div id="wallet" class="page">
            <div class="glass-card" style="text-align:center; padding: 40px 24px;">
                <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 600;">AVAILABLE CREDITS</p>
                <h1 id="wall-bal" style="font-size:3.5rem; color:var(--gold); margin: 10px 0;">0</h1>
                
                <div class="input-group">
                    <input id="buy-amt" type="number" placeholder="Enter Amount (₹)">
                </div>
                <button class="btn-elite" style="background: var(--gold);" onclick="addMoney()">Top Up Wallet</button>
            </div>

            <h4 style="margin: 25px 0 15px; font-size: 0.9rem; color: #94a3b8;">TRANSACTION HISTORY</h4>
            <div id="transactions"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" id="n-home" onclick="nav('home')">HOME</div>
        <div class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</div>
        <div class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</div>
    </nav>

<script>
    // --- CONFIGURATION ---
    const supabaseClient = supabase.createClient(
        "https://rogxkddufkmjexekwzzr.supabase.co",
        "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt"
    );

    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = 0;

    // --- CORE LOGIC ---
   async function checkUser() {
    console.log("Checking user session..."); // Add this line
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
        console.log("No session found, redirecting to login...");
        window.location.href = "login.html";
    } else {
        console.log("User logged in:", session.user.id);
        loadBalance();
        loadTransactions();
        renderArena();
    }
}

    async function loadBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        // Use .maybeSingle() to avoid errors if no wallet exists yet
        const { data, error } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).maybeSingle();
        
        if (data) {
            tokens = data.balance;
        } else {
            tokens = 0;
            // Create initial wallet if it doesn't exist
            await supabaseClient.from("wallets").insert([{ user_id: user.id, balance: 0 }]);
        }
        
        updateUIBalance();
    }

    function updateUIBalance() {
        document.getElementById('pill-bal').innerText = tokens;
        document.getElementById('wall-bal').innerText = tokens;
    }

   async function addMoney() {
    const amountInput = document.getElementById("buy-amt");
    const amount = parseInt(amountInput.value);

    if (!amount || amount < 50) {
        return alert("Minimum top-up is ₹50");
    }

    const { data: { user } } = await supabaseClient.auth.getUser();

    // 🔥 Call your backend
    const res = await fetch("https://ipl-web-ten.vercel.app/api/create-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: user.id,
            amount: amount
        })
    });

    const data = await res.json();

    if (!data.payment_session_id) {
        alert("Payment init failed");
        console.error(data);
        return;
    }

    // 💳 Open Cashfree checkout
    const cashfree = Cashfree({ mode: "sandbox" });

    const cashfree = Cashfree({ mode: "sandbox" });

cashfree.checkout({
  paymentSessionId: data.payment_session_id,
  redirectTarget: "_self"
});

// ⏳ wait for user to come back then refresh
setTimeout(() => {
    refreshBalance();
}, 5000);
}

    async function loadTransactions() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data } = await supabaseClient.from("transactions").select("*").eq("user_id", user.id).order("created_at", { ascending: false });
        
        let html = "";
        data?.forEach(t => {
            html += `<div class="txn-item">
                <span style="font-weight:600; font-size:0.8rem;">${t.type}</span>
                <span style="color:var(--gold); font-weight:800;">+${t.amount} CR</span>
            </div>`;
        });
        document.getElementById("transactions").innerHTML = html || "<p style='text-align:center; color:grey; font-size:0.8rem;'>No history found</p>";
    }

    function renderArena() {
        db.ref("questions").on("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val();
            list.innerHTML = "";
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const q = data[id];
                list.innerHTML += `
                    <div class="glass-card" style="margin-bottom: 15px;">
                        <h4 style="margin-bottom:15px; line-height:1.4;">${q.question}</h4>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            ${q.options.map(o => `<button class="btn-elite" style="background:var(--surface); color:white; border:1px solid var(--border); font-size:0.8rem; padding:12px;">${o}</button>`).join('')}
                        </div>
                    </div>`;
            });
        });
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "login.html";
    }
    async function refreshBalance() {
    await loadBalance();
    await loadTransactions();
}
</script>
</body>
</html>
