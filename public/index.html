<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh; 
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .header-bar {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px); z-index: 2000;
            border-bottom: 1px solid var(--border);
        }

        .token-pill {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1.5px solid var(--gold);
            padding: 8px 18px; border-radius: 50px; 
            font-weight: 800; color: var(--gold);
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        /* --- ARENA SPECIFIC --- */
        .bet-control {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .slider-label {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; font-weight: 700; color: var(--accent);
            margin-bottom: 10px; text-transform: uppercase;
        }

        input[type=range] {
            width: 100%; height: 6px; border-radius: 5px;
            background: var(--border); outline: none; -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        .live-tag {
            background: #ef4444; color: white; font-size: 0.6rem;
            padding: 2px 8px; border-radius: 4px; font-weight: 900;
            position: absolute; top: 24px; right: 24px;
        }

        /* --- LAYOUT --- */
        .container { padding: 100px 20px 130px; max-width: 480px; margin: 0 auto; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-elite {
            background: var(--accent); color: #020617;
            border: none; padding: 16px; border-radius: 16px;
            font-weight: 800; width: 100%; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn-elite:active { transform: scale(0.96); opacity: 0.9; }

        .nav-bar { 
            position: fixed; bottom: 25px; left: 50%; 
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(24px);
            display: flex; justify-content: space-around; padding: 18px; 
            border-radius: 30px; border: 1px solid var(--border); z-index: 1000;
        }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; border: none; background: none; }
        .nav-link.active { color: var(--accent); text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.3rem; letter-spacing: -1px;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill">
            <span style="font-size: 0.65rem; opacity: 0.7;">CREDITS</span>
            <span id="pill-bal">0</span>
        </div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="glass-card" style="background: linear-gradient(135deg, #0ea5e9, #6366f1); border:none;">
                <p style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; opacity: 0.8;">Live Feature</p>
                <h2 style="font-size: 2.2rem; margin: 8px 0 20px;">IPL: CSK vs MI</h2>
                <button class="btn-elite" style="background:white; color:#1e293b;" onclick="nav('arena')">Enter Stadium</button>
            </div>
            
            <div class="glass-card" style="text-align: center; padding: 20px;">
                <button class="nav-link" style="color:#ef4444; font-size: 0.8rem;" onclick="logout()">Secure Logout</button>
            </div>
        </div>

        <div id="arena" class="page">
            <h3 style="margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px;">
                <span style="width:8px; height:8px; background:#ef4444; border-radius:50%;"></span>
                STADIUM LIVE
            </h3>
            <div id="questions-list"></div>
        </div>

        <div id="wallet" class="page">
            <div class="glass-card" style="text-align:center; padding: 45px 24px;">
                <p style="color: #94a3b8; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;">TOTAL ASSETS</p>
                <h1 id="wall-bal" style="font-size:4rem; color:var(--gold); margin: 10px 0; font-weight: 900;">0</h1>
                
                <div style="background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; margin: 25px 0;">
                    <input id="buy-amt" type="number" placeholder="Enter Amount (₹)" style="width:100%; background:transparent; border:none; color:white; text-align:center; font-size:1.5rem; font-weight:800; outline:none;">
                </div>
                <button class="btn-elite" style="background: var(--gold); color: #000;" onclick="addMoney()">Top Up Wallet</button>
            </div>

            <h4 style="margin: 30px 0 15px; font-size: 0.8rem; font-weight: 800; color: #64748b;">LATEST ACTIVITY</h4>
            <div id="transactions"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-link active" id="n-home" onclick="nav('home')">HOME</button>
        <button class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</button>
        <button class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</button>
    </nav>

<script>
    // --- CONFIGURATION ---
    const supabaseClient = supabase.createClient(
        "https://rogxkddufkmjexekwzzr.supabase.co",
        "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt"
    );

    const firebaseConfig = {
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict",
        storageBucket: "cricket-web-predict.firebasestorage.app",
        messagingSenderId: "500705236300",
        appId: "1:500705236300:web:1d28b90643d9288700abe9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tokens = 0;

    // --- CORE INITIALIZATION ---
    window.onload = () => {
        checkUser();
    };

    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
        } else {
            loadBalance();
            loadTransactions();
            renderArena();
        }
    }

    async function loadBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).maybeSingle();
        
        if (data) {
            tokens = data.balance;
        } else {
            tokens = 0;
            await supabaseClient.from("wallets").insert([{ user_id: user.id, balance: 0 }]);
        }
        updateUIBalance();
    }

    function updateUIBalance() {
        document.getElementById('pill-bal').innerText = tokens;
        document.getElementById('wall-bal').innerText = tokens;
    }

    async function addMoney() {
        const amount = parseInt(document.getElementById("buy-amt").value);
        if (!amount || amount < 50) return alert("Minimum top-up is ₹50");

        const { data: { user } } = await supabaseClient.auth.getUser();

        try {
            const res = await fetch("https://ipl-web-ten.vercel.app/api/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: user.id, amount: amount })
            });

            const data = await res.json();
            if (!data.payment_session_id) throw new Error("API Failure");

            const cashfree = Cashfree({ mode: "sandbox" });
            cashfree.checkout({ paymentSessionId: data.payment_session_id, redirectTarget: "_self" });

            setTimeout(refreshBalance, 5000);
        } catch (e) {
            alert("Payment gateway error. Please try again.");
        }
    }

    function renderArena() {
        db.ref("questions").on("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val();
            list.innerHTML = "";
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const q = data[id];
                list.innerHTML += `
                    <div class="glass-card">
                        <span class="live-tag">LIVE</span>
                        <h4 style="margin-bottom:20px; padding-right: 40px; line-height:1.5; font-size:1.1rem;">${q.question}</h4>
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                            ${q.options.map(o => `
                                <button class="btn-elite" 
                                    style="background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); font-size:0.85rem;"
                                    onclick="placeBet('${id}', '${o}')">
                                    ${o}
                                </button>`).join('')}
                        </div>

                        <div class="bet-control">
                            <div class="slider-label">
                                <span>Wager Amount</span>
                                <span style="color:var(--gold)">₹<span id="val-${id}">10</span></span>
                            </div>
                            <input type="range" min="10" max="50" value="10" step="5" 
                                oninput="document.getElementById('val-${id}').innerText = this.value" id="bet-${id}">
                        </div>
                    </div>`;
            });
        });
    }

    async function placeBet(qId, option) {
        const amount = document.getElementById(`bet-${qId}`).value;
        if (tokens < amount) return alert("Insufficient balance!");
        
        // Add your Supabase betting logic here
        alert(`Prediction Locked: ₹${amount} on ${option}`);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "login.html";
    }

    async function refreshBalance() {
        await loadBalance();
        loadTransactions();
    }

    async function loadTransactions() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data } = await supabaseClient.from("transactions").select("*").eq("user_id", user.id).order("created_at", { ascending: false });
        
        let html = "";
        data?.forEach(t => {
            html += `<div style="background:var(--surface); padding:15px; border-radius:16px; margin-bottom:10px; display:flex; justify-content:space-between; border-left:4px solid var(--accent);">
                <span style="font-weight:700; font-size:0.8rem;">${t.type.toUpperCase()}</span>
                <span style="color:var(--gold); font-weight:900;">+${t.amount} CR</span>
            </div>`;
        });
        document.getElementById("transactions").innerHTML = html || "<p style='text-align:center; color:grey; font-size:0.8rem; margin-top:20px;'>No Recent Transactions</p>";
    }
</script>
</body>
</html>
