<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --accent: #38bdf8; --gold: #fbbf24; --surface: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --glass: rgba(15, 23, 42, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #020617); background-attachment: fixed; }
        .header-bar { position: fixed; top: 0; width: 100%; height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); z-index: 2000; border-bottom: 1px solid var(--border); }
        .token-pill { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1.5px solid var(--gold); padding: 8px 18px; border-radius: 50px; font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .container { padding: 100px 20px 130px; max-width: 460px; margin: 0 auto; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 26px; margin-bottom: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        .btn-elite { background: var(--accent); color: #020617; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-option { background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--border); padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 8px; transition: 0.3s; }
        .btn-option.selected { background: #38bdf8 !important; color: #020617 !important; border: 2px solid white !important; }
        .btn-option.correct { background: #22c55e !important; color: white !important; border: 2px solid #4ade80 !important; }
        .btn-option.wrong { background: #ef4444 !important; color: white !important; border: 2px solid #f87171 !important; opacity: 0.7; }
        .slider-box { margin-top: 22px; padding: 18px; background: rgba(0,0,0,0.25); border-radius: 18px; border: 1px solid var(--border); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 16px; border-radius: 30px; border: 1px solid var(--border); z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; background: none; border: none; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>
    <header class="header-bar">
        <div style="font-weight:900; font-size:1.3rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill" onclick="refreshBalance()"><span style="font-size: 0.65rem; opacity: 0.7;">CR</span><span id="pill-bal">...</span></div>
    </header>
    <div class="container">
        <div id="home" class="page active"><div class="glass-card" style="background: linear-gradient(135deg, #38bdf8, #6366f1); border:none; padding: 35px 26px;"><h2 style="font-size: 2.2rem; margin-bottom: 20px;">CSK vs MI</h2><button class="btn-elite" onclick="nav('arena')">Join Stadium</button></div></div>
        <div id="arena" class="page"><h3 style="margin-bottom: 25px; font-weight: 800;">LIVE ARENA</h3><div id="questions-list"></div></div>
        <div id="wallet" class="page"><div class="glass-card" style="text-align:center;"><p style="color: #94a3b8; font-size: 0.75rem; font-weight: 800;">TOTAL CREDITS</p><h1 id="wall-bal" style="font-size:4.2rem; color:var(--gold); margin: 10px 0; font-weight: 900;">0</h1><input id="buy-amt" type="number" placeholder="₹ Amount" style="width:100%; background:rgba(0,0,0,0.2); border:1px solid var(--border); padding:18px; border-radius:16px; color:white; text-align:center; outline:none;"><button class="btn-elite" style="background: var(--gold); color: #000; margin-top:15px;" onclick="addMoney()">Add to Wallet</button></div></div>
    </div>
    <nav class="nav-bar"><button class="nav-link active" id="n-home" onclick="nav('home')">HOME</button><button class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</button><button class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</button></nav>

<script>
    const supabaseClient = supabase.createClient("https://rogxkddufkmjexekwzzr.supabase.co", "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt");
    firebase.initializeApp({ apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE", authDomain: "cricket-web-predict.firebaseapp.com", databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com", projectId: "cricket-web-predict" });
    const db = firebase.database();
    let tokens = 0;
    let userBets = JSON.parse(localStorage.getItem('userBets') || '{}');

    window.onload = checkUser;

    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return window.location.href = "login.html";
        await refreshBalance();
        renderArena();
    }

    async function refreshBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: wallet } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).order('created_at', { ascending: false }).limit(1).maybeSingle();
        if (wallet) { tokens = wallet.balance; document.getElementById('pill-bal').innerText = tokens; document.getElementById('wall-bal').innerText = tokens; }
    }

    function renderArena() {
        db.ref("questions").on("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val(); if(!data) return;
            list.innerHTML = "";
            Object.keys(data).reverse().forEach(id => {
                const q = data[id];
                const myBet = userBets[id] ? userBets[id].option : null;
                const myAmt = userBets[id] ? userBets[id].amount : 0;
                const result = q.result; // Linked to Host Panel

                list.innerHTML += `<div class="glass-card">
                    <h4 style="margin-bottom:20px;">${q.question}</h4>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        ${q.options.map(o => {
                            let cls = "";
                            if (myBet === o) cls = "selected";
                            if (result) { if (o === result) cls = "correct"; else if (myBet === o) cls = "wrong"; }
                            return `<button class="btn-option ${cls}" ${myBet || result ? 'disabled' : ''} onclick="placeBet('${id}', '${o}')">${o}</button>`;
                        }).join('')}
                    </div>
                    ${!myBet && !result ? `<div class="slider-box"><div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:800; color:var(--accent); margin-bottom:10px;"><span>BET</span><span style="color:var(--gold);">₹<span id="v-${id}">10</span></span></div><input type="range" min="10" max="50" value="10" step="5" oninput="document.getElementById('v-${id}').innerText=this.value" id="s-${id}"></div>` : ''}
                </div>`;
                if (result && myBet === result && !userBets[id + '_paid']) payoutUser(id, myAmt, q.multiplier);
            });
        });
    }

    async function placeBet(qid, opt) {
        const betAmt = parseInt(document.getElementById(`s-${qid}`).value);
        if (tokens < betAmt) return alert("Insufficient Credits!");
        userBets[qid] = { option: opt, amount: betAmt };
        localStorage.setItem('userBets', JSON.stringify(userBets));
        renderArena();
        const { data: { user } } = await supabaseClient.auth.getUser();
        await supabaseClient.from("wallets").update({ balance: tokens - betAmt }).eq("user_id", user.id);
        refreshBalance();
    }

    async function payoutUser(id, amt, mult) {
        userBets[id + '_paid'] = true; localStorage.setItem('userBets', JSON.stringify(userBets));
        const { data: { user } } = await supabaseClient.auth.getUser();
        const win = Math.floor(amt * (mult || 2));
        const { data: w } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).maybeSingle();
        await supabaseClient.from("wallets").update({ balance: (w ? w.balance : tokens) + win }).eq("user_id", user.id);
        refreshBalance();
    }

    async function addMoney() {
        const amt = parseInt(document.getElementById("buy-amt").value);
        if (!amt || amt < 50) return alert("Min ₹50");
        const { data: { user } } = await supabaseClient.auth.getUser();
        const res = await fetch("https://ipl-web-ten.vercel.app/api/create-order", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ user_id: user.id, amount: amt }) });
        const d = await res.json();
        if (d.payment_session_id) { const cf = Cashfree({ mode: "production" }); cf.checkout({ paymentSessionId: d.payment_session_id, redirectTarget: "_self" }); }
    }

    function nav(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('n-'+id).classList.add('active'); }
</script>
</body>
</html>
