<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --accent: #38bdf8; --gold: #fbbf24; --red: #ef4444; --glass: rgba(15, 23, 42, 0.9); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #020617); background-attachment: fixed; }
        
        /* Navigation & Header */
        .header-bar { position: fixed; top: 0; width: 100%; height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); z-index: 2000; border-bottom: 1px solid var(--border); }
        .token-pill { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1.5px solid var(--gold); padding: 8px 18px; border-radius: 50px; font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 16px; border-radius: 30px; border: 1px solid var(--border); z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; background: none; border: none; }
        .nav-link.active { color: var(--accent); }

        /* Content */
        .container { padding: 100px 20px 130px; max-width: 460px; margin: 0 auto; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 28px; padding: 26px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Scoreboard */
        .scoreboard-mini { background: #1e293b; border-radius: 20px; padding: 15px; display: flex; justify-content: space-around; margin-bottom: 20px; border: 1px solid var(--accent); }
        .score-item { text-align: center; }
        .score-item p { font-size: 0.6rem; color: #94a3b8; font-weight: 800; }
        .score-item h2 { font-size: 1.1rem; }

        /* Bet UI */
        .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-bet { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-bet.selected { background: var(--accent) !important; color: #020617 !important; border-color: white; }
        .btn-bet.correct { background: #22c55e !important; color: white !important; }
        .btn-bet.wrong { background: #ef4444 !important; opacity: 0.6; }
        
        .amt-row { display: flex; justify-content: space-between; margin: 15px 0; gap: 5px; }
        .amt-chip { flex: 1; background: #0f172a; border: 1px solid var(--border); padding: 8px; border-radius: 10px; text-align: center; font-size: 0.8rem; font-weight: 800; cursor: pointer; }
        .amt-chip.active { background: var(--gold); color: #000; }

        .timer-bar { height: 4px; background: var(--accent); width: 100%; border-radius: 2px; margin-top: 10px; transition: width 1s linear; }
        .btn-place { background: var(--accent); color: black; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; border: none; cursor: pointer; margin-top: 10px; }
        .btn-place:disabled { background: #334155; color: #64748b; }
    </style>
</head>
<body>
    <header class="header-bar">
        <div style="font-weight:900; font-size:1.3rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill" onclick="refreshBalance()">
            <span style="font-size: 0.65rem; opacity: 0.7;">CR</span>
            <span id="pill-bal">...</span>
        </div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="glass-card" style="background: linear-gradient(135deg, #38bdf8, #6366f1); border:none; padding: 35px 26px;">
                <h2 style="font-size: 2.2rem; margin-bottom: 20px;">CSK vs MI</h2>
                <button class="btn-place" style="background: white;" onclick="nav('arena')">Join Stadium</button>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="arena" class="page">
            <div id="arena-content">
                <div style="text-align:center; padding: 50px 0; color: #64748b;">
                    <h3>Connecting to Match...</h3>
                    <p style="font-size:0.8rem; margin-top:10px;">Waiting for host to push next ball</p>
                </div>
            </div>
        </div>

        <div id="wallet" class="page">
            <div class="glass-card" style="text-align:center;">
                <p style="color: #94a3b8; font-size: 0.75rem; font-weight: 800;">TOTAL CREDITS</p>
                <h1 id="wall-bal" style="font-size:4.2rem; color:var(--gold); margin: 10px 0; font-weight: 900;">0</h1>
                <input id="buy-amt" type="number" placeholder="₹ Amount" style="width:100%; background:rgba(0,0,0,0.2); border:1px solid var(--border); padding:18px; border-radius:16px; color:white; text-align:center; outline:none; margin-bottom:15px;">
                <button class="btn-place" style="background: var(--gold);" onclick="addMoney()">Add to Wallet</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-link active" id="n-home" onclick="nav('home')">HOME</button>
        <button class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</button>
        <button class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</button>
    </nav>

<script>
    const supabaseClient = supabase.createClient("https://rogxkddufkmjexekwzzr.supabase.co", "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt");
    firebase.initializeApp({ apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE", authDomain: "cricket-web-predict.firebaseapp.com", databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com", projectId: "cricket-web-predict" });
    const db = firebase.database();
    
    let tokens = 0, selOpt = null, selAmt = 100, curQid = null, timerVal = 10;
    let userBets = JSON.parse(localStorage.getItem('userBets') || '{}');

    window.onload = checkUser;

    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return window.location.href = "login.html";
        await refreshBalance();
        initArena();
    }

    async function refreshBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: wallet } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).order('created_at', { ascending: false }).limit(1).maybeSingle();
        if (wallet) { 
            tokens = wallet.balance; 
            document.getElementById('pill-bal').innerText = tokens; 
            document.getElementById('wall-bal').innerText = tokens; 
        }
    }

    function initArena() {
        db.ref("questions").on("value", snap => {
            const data = snap.val();
            const arena = document.getElementById('arena-content');
            if(!data) {
                arena.innerHTML = `<div style="text-align:center; padding:50px; color:#64748b;"><h3>Connecting to Match...</h3></div>`;
                return;
            }
            const qid = Object.keys(data).pop();
            const q = data[qid];
            if(curQid !== qid) { curQid = qid; selOpt = null; startTimer(); }
            renderMatch(q, qid);
        });
    }

    function renderMatch(q, qid) {
        const myBet = userBets[qid] ? userBets[qid].option : null;
        const res = q.result;
        
        document.getElementById('arena-content').innerHTML = `
            <div class="scoreboard-mini">
                <div class="score-item"><p>SCORE</p><h2>${q.matchScore || '152/3'}</h2></div>
                <div class="score-item"><p>OVER</p><h2>${q.matchOver || '15.2'}</h2></div>
                <div class="score-item"><p>TARGET</p><h2>180</h2></div>
            </div>
            <div class="glass-card">
                <h3 style="text-align:center;">${q.question}</h3>
                ${!myBet && !res ? `<div id="timer-txt" style="text-align:center; color:var(--gold); font-weight:800; font-size:0.8rem; margin:10px 0;">⏱ 10s LEFT</div><div class="timer-bar" id="t-bar"></div>` : ''}
                <div class="bet-grid">
                    ${q.options.map(o => {
                        let cls = "";
                        if(myBet === o) cls = "selected";
                        if(res) { if(o === res) cls = "correct"; else if(myBet === o) cls = "wrong"; }
                        return `<button class="btn-bet ${cls}" onclick="selOptBtn('${o}')" ${myBet || res ? 'disabled' : ''}>${o}</button>`;
                    }).join('')}
                </div>
                ${!myBet && !res ? `
                <div class="amt-row">
                    ${[50, 100, 250, 500].map(a => `<div class="amt-chip ${selAmt==a?'active':''}" onclick="selAmtBtn(${a})">₹${a}</div>`).join('')}
                </div>
                <button class="btn-place" id="place-btn" onclick="placeBet('${qid}', ${q.multiplier || 2})">PLACE BET</button>` : ''}
            </div>`;
            
            if(res && myBet === res && !userBets[qid + '_paid']) payout(qid, userBets[qid].amount, q.multiplier);
    }

    function selOptBtn(o) { selOpt = o; initArena(); }
    function selAmtBtn(a) { selAmt = a; initArena(); }

    async function placeBet(qid, mult) {
        if(!selOpt) return alert("Select an option!");
        if(tokens < selAmt) return alert("Low Balance!");
        const { data: { user } } = await supabaseClient.auth.getUser();
        await supabaseClient.from("wallets").update({ balance: tokens - selAmt }).eq("user_id", user.id);
        userBets[qid] = { option: selOpt, amount: selAmt };
        localStorage.setItem('userBets', JSON.stringify(userBets));
        refreshBalance();
        initArena();
    }

    async function payout(qid, amt, mult) {
        userBets[qid + '_paid'] = true;
        localStorage.setItem('userBets', JSON.stringify(userBets));
        const { data: { user } } = await supabaseClient.auth.getUser();
        await supabaseClient.from("wallets").update({ balance: tokens + (amt * mult) }).eq("user_id", user.id);
        refreshBalance();
        alert("🔥 WINNER! YOU WON ₹" + (amt * mult));
    }

    function startTimer() {
        timerVal = 10;
        const interval = setInterval(() => {
            timerVal--;
            const txt = document.getElementById('timer-txt');
            const bar = document.getElementById('t-bar');
            if(txt) txt.innerText = `⏱ ${timerVal}s LEFT`;
            if(bar) bar.style.width = (timerVal * 10) + "%";
            if(timerVal <= 0 || !txt) { clearInterval(interval); if(document.getElementById('place-btn')) document.getElementById('place-btn').disabled = true; }
        }, 1000);
    }

    async function addMoney() {
        const amt = parseInt(document.getElementById("buy-amt").value);
        if(!amt || amt < 50) return alert("Min ₹50");
        const { data: { user } } = await supabaseClient.auth.getUser();
        const res = await fetch("https://ipl-web-ten.vercel.app/api/create-order", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ user_id: user.id, amount: amt }) });
        const d = await res.json();
        if (d.payment_session_id) { const cf = Cashfree({ mode: "production" }); cf.checkout({ paymentSessionId: d.payment_session_id, redirectTarget: "_self" }); }
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }
</script>
</body>
</html>
