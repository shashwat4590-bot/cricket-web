<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); color: white; min-height: 100vh; 
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            background-attachment: fixed;
        }

        /* --- HEADER --- */
        .header-bar {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px); z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .token-pill {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid var(--gold); padding: 8px 16px; border-radius: 50px; 
            font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 8px;
        }

        /* --- CARDS & UI --- */
        .container { padding: 100px 20px 120px; max-width: 450px; margin: 0 auto; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 24px; padding: 24px;
            margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* --- INPUTS & BUTTONS --- */
        .btn-elite {
            background: var(--accent); color: #020617; border: none; padding: 16px;
            border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-elite:active { transform: scale(0.97); }
        .btn-option {
            background: var(--surface); color: white; border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer;
        }

        /* --- SLIDER --- */
        .slider-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 16px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* --- NAV --- */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--glass); 
            display: flex; justify-content: space-around; padding: 15px; 
            border-radius: 25px; border: 1px solid var(--border); z-index: 1000;
        }
        .nav-link { color: #64748b; font-weight: 800; font-size: 0.75rem; cursor: pointer; background: none; border: none; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="font-weight:900; font-size:1.2rem;">PREDICT<span style="color:var(--accent)">LIVE</span></div>
        <div class="token-pill" onclick="refreshBalance()" style="cursor: pointer;">
            <span style="font-size: 0.6rem; opacity: 0.8;">CREDITS</span>
            <span id="pill-bal">...</span>
        </div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div class="glass-card" style="background: linear-gradient(135deg, #0ea5e9, #6366f1); border:none;">
                <h2 style="font-size: 1.8rem; margin-bottom: 15px;">IPL 2026 Live</h2>
                <button class="btn-elite" style="background:white; color:#6366f1;" onclick="nav('arena')">Play Now</button>
            </div>
            <div class="glass-card" style="text-align: center;">
                <button class="nav-link" style="color:#ef4444" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <div id="arena" class="page">
            <h3 style="margin-bottom: 20px; font-weight: 800; color: var(--accent);">LIVE ARENA</h3>
            <div id="questions-list"></div>
        </div>

        <div id="wallet" class="page">
            <div class="glass-card" style="text-align:center;">
                <p style="color: #94a3b8; font-size: 0.7rem; font-weight: 800;">TOTAL BALANCE</p>
                <h1 id="wall-bal" style="font-size:3.5rem; color:var(--gold); margin: 10px 0;">0</h1>
                
                <input id="buy-amt" type="number" placeholder="₹ Amount" style="width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border); padding:15px; border-radius:12px; color:white; text-align:center; font-size:1.2rem; margin-bottom:15px; outline:none;">
                <button class="btn-elite" style="background: var(--gold); color: black;" onclick="addMoney()">Add Credits</button>
            </div>
            <h4 style="margin: 20px 0 10px; font-size: 0.8rem; color: #64748b;">HISTORY</h4>
            <div id="transactions"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-link active" id="n-home" onclick="nav('home')">HOME</button>
        <button class="nav-link" id="n-arena" onclick="nav('arena')">ARENA</button>
        <button class="nav-link" id="n-wallet" onclick="nav('wallet')">WALLET</button>
    </nav>

<script>
    // --- CONFIG ---
    const supabaseClient = supabase.createClient("https://rogxkddufkmjexekwzzr.supabase.co", "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt");
    
    firebase.initializeApp({
        apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE",
        authDomain: "cricket-web-predict.firebaseapp.com",
        databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com",
        projectId: "cricket-web-predict"
    });
    const db = firebase.database();
    let tokens = 0;

    // --- INITIALIZE ---
    window.onload = checkUser;

    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return window.location.href = "login.html";
        refreshBalance();
        renderArena();
    }

    // --- UPDATING BALANCE LOGIC ---
    async function refreshBalance() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        // 1. Fetch Latest Wallet Balance
        const { data: wallet, error: wErr } = await supabaseClient
            .from("wallets")
            .select("balance")
            .eq("user_id", user.id)
            .maybeSingle();

        if (wallet) {
            tokens = wallet.balance;
            document.getElementById('pill-bal').innerText = tokens;
            document.getElementById('wall-bal').innerText = tokens;
        }

        // 2. Load Transactions
        const { data: txns } = await supabaseClient
            .from("transactions")
            .select("*")
            .eq("user_id", user.id)
            .order("created_at", { ascending: false });

        let html = "";
        txns?.forEach(t => {
            html += `<div style="background:var(--surface); padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; font-size:0.8rem; border-left:3px solid var(--gold);">
                <span>${t.type.toUpperCase()}</span>
                <span style="color:var(--gold); font-weight:800;">+${t.amount}</span>
            </div>`;
        });
        document.getElementById("transactions").innerHTML = html || "No history";
    }

    async function addMoney() {
        const amt = document.getElementById("buy-amt").value;
        if (amt < 50) return alert("Min ₹50");

        const { data: { user } } = await supabaseClient.auth.getUser();
        const res = await fetch("https://ipl-web-ten.vercel.app/api/create-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: user.id, amount: parseInt(amt) })
        });

        const data = await res.json();
        if (data.payment_session_id) {
            const cf = Cashfree({ mode: "sandbox" });
            cf.checkout({ paymentSessionId: data.payment_session_id, redirectTarget: "_self" });
            
            // Re-check balance after a delay in case they return
            setTimeout(refreshBalance, 3000);
        }
    }

    // --- ARENA ---
    function renderArena() {
        db.ref("questions").on("value", (snap) => {
            const list = document.getElementById('questions-list');
            const data = snap.val();
            if(!data) return;
            list.innerHTML = "";
            Object.keys(data).reverse().forEach(id => {
                const q = data[id];
                list.innerHTML += `
                    <div class="glass-card">
                        <h4 style="margin-bottom:15px; font-weight:600;">${q.question}</h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            ${q.options.map(o => `<button class="btn-option" onclick="placeBet('${id}', '${o}')">${o}</button>`).join('')}
                        </div>
                        <div class="slider-box">
                            <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; color:var(--accent); margin-bottom:8px;">
                                <span>WAGER</span>
                                <span style="color:var(--gold);">₹<span id="v-${id}">10</span></span>
                            </div>
                            <input type="range" min="10" max="50" value="10" step="5" oninput="document.getElementById('v-${id}').innerText=this.value" id="s-${id}">
                        </div>
                    </div>`;
            });
        });
    }

    function placeBet(qid, opt) {
        const amt = document.getElementById(`s-${qid}`).value;
        if(tokens < amt) return alert("Insufficient Credits!");
        alert(`Prediction: ₹${amt} on ${opt}`);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }

    async function logout() { await supabaseClient.auth.signOut(); window.location.href="login.html"; }
</script>
</body>
</html>
