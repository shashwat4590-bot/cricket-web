<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PredictLive Elite | Official Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --accent: #38bdf8; --gold: #fbbf24; --red: #ef4444; --glass: rgba(15, 23, 42, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #020617); background-attachment: fixed; }
        
        .scoreboard { background: linear-gradient(135deg, #1e293b, #020617); padding: 20px; border-bottom: 2px solid var(--accent); text-align: center; }
        .score-row { display: flex; justify-content: space-around; margin-top: 10px; }
        .live-tag { background: var(--red); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; animation: blink 1s infinite; display: inline-block; }
        @keyframes blink { 50% { opacity: 0; } }

        .container { padding: 20px; max-width: 460px; margin: 0 auto 100px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 26px; margin-bottom: 20px; }
        
        .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 18px; font-weight: 700; cursor: pointer; position: relative; }
        .btn-bet.selected { border: 2px solid var(--accent); background: rgba(56, 189, 248, 0.1); }
        .btn-bet.correct { background: #22c55e !important; border: none; }
        .btn-bet.wrong { background: #ef4444 !important; opacity: 0.5; border: none; }

        .amt-row { display: flex; justify-content: space-between; margin: 20px 0; gap: 8px; }
        .amt-chip { flex: 1; background: #1e293b; padding: 10px; border-radius: 12px; text-align: center; font-weight: 800; cursor: pointer; }
        .amt-chip.active { background: var(--gold); color: black; }

        .btn-place { background: var(--accent); color: black; width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; border: none; cursor: pointer; }
        .btn-place:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .timer-bar { height: 4px; background: var(--accent); width: 100%; border-radius: 2px; margin-top: 15px; transition: width 1s linear; }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div class="live-tag">LIVE</div>
        <h2 style="margin-top:5px;">CSK <span style="color:var(--gold)">vs</span> MI</h2>
        <div class="score-row">
            <div><p style="font-size:0.7rem; color:#94a3b8;">SCORE</p><h2 id="live-score">152/3</h2></div>
            <div><p style="font-size:0.7rem; color:#94a3b8;">OVER</p><h2 id="live-over">15.2</h2></div>
            <div><p style="font-size:0.7rem; color:#94a3b8;">TARGET</p><h2 id="live-target">180</h2></div>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <h3 style="text-align:center;">NEXT BALL KYA HOGA?</h3>
            <div id="timer-text" style="text-align:center; color:var(--gold); font-weight:800; margin: 10px 0;">⏱ 10s LEFT</div>
            <div class="timer-bar" id="t-bar"></div>

            <div class="bet-grid">
                <button class="btn-bet" onclick="setOpt('DOT BALL')">🟢 DOT (2x)</button>
                <button class="btn-bet" onclick="setOpt('SINGLE')">🔵 SINGLE (1.5x)</button>
                <button class="btn-bet" onclick="setOpt('FOUR')">🟡 FOUR (3x)</button>
                <button class="btn-bet" onclick="setOpt('SIX')">🔴 SIX (5x)</button>
                <button class="btn-bet" onclick="setOpt('WICKET')" style="grid-column: span 2;">⚫ WICKET (4x)</button>
            </div>

            <div class="amt-row">
                <div class="amt-chip" onclick="setAmt(50)">₹50</div>
                <div class="amt-chip" onclick="setAmt(100)">₹100</div>
                <div class="amt-chip" onclick="setAmt(250)">₹250</div>
                <div class="amt-chip active" onclick="setAmt(500)">₹500</div>
            </div>
            <button class="btn-place" id="place-btn" onclick="confirmBet()">PLACE BET</button>
        </div>
    </div>

<script>
    const supabaseClient = supabase.createClient("https://rogxkddufkmjexekwzzr.supabase.co", "sb_publishable_XSvlPxPfiuGIXA-8VSwJGg__yNSNjTt");
    firebase.initializeApp({ apiKey: "AIzaSyBwRNVxTLetigZ-JmGD0vse-kBUzR3U3OE", authDomain: "cricket-web-predict.firebaseapp.com", databaseURL: "https://cricket-web-predict-default-rtdb.firebaseio.com", projectId: "cricket-web-predict" });
    const db = firebase.database();
    
    let selOpt = null, selAmt = 500, curQid = null, timerVal = 10;

    window.onload = () => {
        db.ref("questions").on("value", snap => {
            const data = snap.val(); if(!data) return;
            const qid = Object.keys(data).pop();
            const q = data[qid];
            if(curQid !== qid) { curQid = qid; resetArena(); startTimer(); }
            document.getElementById('live-score').innerText = q.matchScore || "152/3";
            if(q.result) handleResult(q.result);
        });
    };

    function setOpt(o) { selOpt = o; document.querySelectorAll('.btn-bet').forEach(b => b.classList.toggle('selected', b.innerText.includes(o))); }
    function setAmt(a) { selAmt = a; document.querySelectorAll('.amt-chip').forEach(c => c.classList.toggle('active', c.innerText.includes(a))); }

    async function confirmBet() {
        if(!selOpt) return alert("Select an option!");
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: w } = await supabaseClient.from("wallets").select("balance").eq("user_id", user.id).maybeSingle();
        if(w.balance < selAmt) return alert("Low Balance!");

        await supabaseClient.from("wallets").update({ balance: w.balance - selAmt }).eq("user_id", user.id);
        document.getElementById('place-btn').disabled = true;
        document.getElementById('place-btn').innerText = "LOCKED";
        localStorage.setItem('lastBet', JSON.stringify({ qid: curQid, opt: selOpt, amt: selAmt }));
    }

    function startTimer() {
        timerVal = 10;
        const interval = setInterval(() => {
            timerVal--;
            document.getElementById('timer-text').innerText = `⏱ ${timerVal}s LEFT`;
            document.getElementById('t-bar').style.width = (timerVal * 10) + "%";
            if(timerVal <= 0) { clearInterval(interval); document.getElementById('place-btn').disabled = true; }
        }, 1000);
    }

    function handleResult(res) {
        document.querySelectorAll('.btn-bet').forEach(b => {
            if(b.innerText.includes(res)) b.classList.add('correct');
            else b.classList.add('wrong');
        });
        const bet = JSON.parse(localStorage.getItem('lastBet'));
        if(bet && bet.qid === curQid && bet.opt === res) {
            alert("🔥 BOOM! YOU WON ₹" + (bet.amt * 2));
        }
    }

    function resetArena() {
        document.getElementById('place-btn').disabled = false;
        document.getElementById('place-btn').innerText = "PLACE BET";
        document.querySelectorAll('.btn-bet').forEach(b => b.className = "btn-bet");
    }

    async function addMoney() {
        // ... Same logic as before, but set mode: "production" ...
        const cf = Cashfree({ mode: "production" });
    }
</script>
</body>
</html>
